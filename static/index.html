    const data = await get('/api/stats/wydajnosc_raport?data_od=' + od + '&data_do=' + do_);
    printRaportWydajnosc(data, od, do_, typ);
  } catch(e) {
    alert('Błąd generowania raportu: ' + e.message);
  }
}

function printRaportWydajnosc(data, od, doDt, typ) {
  const pr = data.pracownicy || [];
  const ZMIANA_MIN = 450;
  const fmtPLNr = v => (parseFloat(v)||0).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' zł';

  let tabelaHtml = '';
  if (typ === 'skrocony') {
    tabelaHtml += `
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#2e3548;color:#fff">
        <th style="padding:8px 10px;text-align:left">Pracownik</th>
        <th style="padding:8px 10px;text-align:center">Czas roboczy (min)</th>
        <th style="padding:8px 10px;text-align:center">Zbrojenie (min)</th>
        <th style="padding:8px 10px;text-align:center">Nieprodukcyjny (min)</th>
        <th style="padding:8px 10px;text-align:center">Razem (min)</th>
        <th style="padding:8px 10px;text-align:center">Zmian (×450 min)</th>
        <th style="padding:8px 10px;text-align:center">Koszt łączny</th>
        <th style="padding:8px 10px;text-align:center">Efektywność</th>
      </tr></thead><tbody>`;
    pr.forEach((p,i) => {
      const razem = p.min_roboczy + p.min_zbrojenie + p.min_nieproduktywny;
      const zmiany = razem > 0 ? (razem / ZMIANA_MIN).toFixed(2) : '0';
      const kosztTotal = (p.koszt_total || 0);
      // Efektywność: % czasu spędzonego na pracy produkcyjnej vs łącznego czasu zarejestrowanego
      // Jeśli brak czasu nieproduktywnego/zbrojenia – pokazuj na podstawie norm
      const normy_ok = p.normy_ok || 0;
      const normy_total = p.normy_total || 0;
      const efektNormy = normy_total > 0 ? Math.round(normy_ok / normy_total * 100) : null;
      const efektCzas = razem > 0 ? Math.round(p.min_roboczy / razem * 100) : null;
      // Pokaż efektywność norm jeśli dostępna, inaczej efektywność czasu
      const efekt = efektNormy !== null ? efektNormy : (efektCzas !== null ? efektCzas : 0);
      const efLabel = efektNormy !== null ? efekt + '% norm' : (efektCzas !== null ? efekt + '% czasu' : '—');
      const efKolor = efekt >= 80 ? '#1e8a4c' : efekt >= 60 ? '#e67e00' : '#c0392b';
      tabelaHtml += `<tr style="background:${i%2?'#fff':'#f9fafb'}">
        <td style="padding:7px 10px;border:1px solid #e0e0e0;font-weight:600">${p.full_name}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;color:#1a73e8">${Math.round(p.min_roboczy)}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;color:#e67e00">${Math.round(p.min_zbrojenie)}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;color:#888">${Math.round(p.min_nieproduktywny)}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:700">${Math.round(razem)}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center">${zmiany}</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:600;color:#1e8a4c">${kosztTotal.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})} zł</td>
        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:700;color:${efKolor}">${efLabel}</td>
      </tr>`;
    });
    tabelaHtml += `</tbody></table>`;
  } else {
    // PEŁNY raport
    pr.forEach(p => {
      const razem = p.min_roboczy + p.min_zbrojenie + p.min_nieproduktywny;
      const zmiany = razem > 0 ? (razem / ZMIANA_MIN).toFixed(2) : '0';
      const normy_ok2 = p.normy_ok || 0;
      const normy_total2 = p.normy_total || 0;
      const efektNormy2 = normy_total2 > 0 ? Math.round(normy_ok2 / normy_total2 * 100) : null;
      const efektCzas2 = razem > 0 ? Math.round(p.min_roboczy / razem * 100) : null;
      const efekt = efektNormy2 !== null ? efektNormy2 : (efektCzas2 !== null ? efektCzas2 : 0);
      const efLabel2 = efektNormy2 !== null ? efekt + '% norm (' + normy_ok2 + '/' + normy_total2 + ')' : (efektCzas2 !== null ? efekt + '% czasu' : '—');
      const efKolor = efekt >= 80 ? '#1e8a4c' : efekt >= 60 ? '#e67e00' : '#c0392b';
      tabelaHtml += `
      <div style="border:1px solid #ddd;border-radius:6px;margin-bottom:16px;break-inside:avoid;overflow:hidden">
        <div style="background:#2e3548;color:#fff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;font-size:14px">${p.full_name}</span>
          <span style="font-size:12px">${p.sesji} sesji | ${p.sztuki} szt. | efektywność: <b style="color:${efKolor}">${efLabel2}</b></span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #ddd">
          <div style="padding:7px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">ROBOCZY</div><b style="color:#1a73e8">${Math.round(p.min_roboczy)} min</b></div>
          <div style="padding:7px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">ZBROJENIE</div><b style="color:#e67e00">${Math.round(p.min_zbrojenie)} min</b></div>
          <div style="padding:7px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">NIEPRODUKTYWNY</div><b style="color:#888">${Math.round(p.min_nieproduktywny)} min</b></div>
          <div style="padding:7px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">ZMIANY (${ZMIANA_MIN} min)</div><b>${zmiany}</b></div>
          <div style="padding:7px 12px;font-size:12px"><div style="color:#888;font-size:10px">KOSZT ŁĄCZNY</div><b style="color:#1e8a4c">${(p.koszt_total||0).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})} zł</b></div>
        </div>`;
      if (p.sesje && p.sesje.length) {
        tabelaHtml += `<div style="padding:8px 14px">
          <table style="width:100%;border-collapse:collapse;font-size:11px">
            <thead><tr style="background:#f5f7fa">
              <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Operacja / Typ</th>
              <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Zlecenie</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Data</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Czas (min/szt.)</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Szt.</th>
            </tr></thead><tbody>`;
        p.sesje.forEach((s,i) => {
          const sztuk = s.ilosc_sztuk || 1;
          const avgMin = sztuk > 0 ? (parseFloat(s.czas_min)/sztuk).toFixed(1) : s.czas_min;
          tabelaHtml += `<tr style="background:${i%2?'#fff':'#f9fafb'}">
            <td style="padding:3px 8px;border:1px solid #eee">${s.op_nazwa}</td>
            <td style="padding:3px 8px;border:1px solid #eee">${s.zl_numer}</td>
            <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${s.data}</td>
            <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${avgMin} min/szt.</td>
            <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${s.ilosc_sztuk||'—'}</td>
          </tr>`;
        });
        tabelaHtml += `</tbody></table></div>`;
      }
      tabelaHtml += `</div>`;
    });
  }

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Raport wydajności ${od} – ${doDt}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; color: #222; }
    @media print { body { padding: 0; } }
  </style>
  </head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #222;padding-bottom:10px;margin-bottom:18px">
    <div>
      <div style="font-size:22px;font-weight:700">Raport wydajności pracowników</div>
      <div style="font-size:13px;color:#555">${typ==='skrocony'?'Raport skrócony':'Raport pełny'} | Okres: ${od} – ${doDt} | Wygenerowano: ${new Date().toLocaleString('pl-PL')}</div>
    </div>
    <div style="text-align:right;font-size:13px">Pracowników: <b>${pr.length}</b> | Zmiana = <b>${ZMIANA_MIN} min</b></div>
  </div>
  ${tabelaHtml}
  </body></html>`;

  const w = window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}


function renderMajsterPodsumowanie(stats) {
  const aktywne  = (stats?.zlecenia || []);
  const hist     = (stats?.wszystkie_zlecenia || []);
  const zakonczone = hist.filter(z => z.status === 'zakonczone');
  const anulowane  = hist.filter(z => z.status === 'anulowane');

  const ro = state.raportOkres;
  let html = '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--blue)">' + aktywne.length + '</div><div class="stat-lbl">Aktywnych</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--green)">' + zakonczone.length + '</div><div class="stat-lbl">Zakończonych</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--red)">' + anulowane.length + '</div><div class="stat-lbl">Anulowanych</div></div>'
    + '<div class="stat-box"><div class="stat-val">' + (stats.dzis_sztuk||0) + '</div><div class="stat-lbl">Sztuk dziś</div></div>'
    + '</div>';

  // Raport PDF zleceń
  html += '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">'
        + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">📄 Raport PDF zleceń</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:end">'
        + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Od</div>'
        + '<input type="date" id="raport-od" value="' + (ro.od||getTodayMinus(30)) + '" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
        + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Do</div>'
        + '<input type="date" id="raport-do" value="' + (ro.do||getToday()) + '" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
        + '<button class="btn btn-accent" style="padding:8px 14px;white-space:nowrap" onclick="generateRaportZleceniaPDF()">📥 Generuj PDF</button>'
        + '</div></div>';

  html += '<div class="section-hdr">📋 Historia zleceń – kliknij po szczegóły</div>';

  const wszystkie = [...aktywne, ...zakonczone, ...anulowane]
    .filter((z,i,a) => a.findIndex(x=>x.id===z.id)===i)
    .sort((a,b) => (b.id||0)-(a.id||0));

  if (!wszystkie.length) {
    html += '<div class="empty">Brak zleceń</div>';
  } else {
    wszystkie.forEach(z => {
      const isZak = z.status === 'zakonczone';
      const isAnu = z.status === 'anulowane';
      const przet = z.termin && new Date(z.termin) < new Date() && !isZak && !isAnu;
      const prog  = z.op_total > 0 ? Math.round((z.op_done/z.op_total)*100) : 0;
      const wartosc = (z.cena_brutto_szt||0)*(z.ilosc_sztuk||0);
      const border  = przet ? 'var(--red)' : isZak ? 'var(--green)' : isAnu ? 'var(--dim)' : '';
      html += '<div class="card" style="cursor:pointer;' + (border?'border-color:'+border+';':'') + '"'
            + ' onclick="openZlecenieModal(' + z.id + ')">'
            + '<div class="card-header">'
            + '<div style="flex:1;min-width:0">'
            + '<div class="card-title">' + z.numer + (przet ? ' <span class="badge badge-red">⚠</span>' : '') + '</div>'
            + '<div class="card-sub">' + z.nazwa + '</div>'
            + (z.termin ? '<div class="card-sub">📅 ' + fmtDate(z.termin) + '</div>' : '')
            + '</div>'
            + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px">'
            + statusBadge(z.status)
            + '<span style="font-size:11px;color:var(--dim)">' + (z.op_done||0) + '/' + (z.op_total||0) + ' op.</span>'
            + (wartosc ? '<span style="font-size:11px;color:var(--accent)">' + fmtPLN(wartosc) + '</span>' : '')
            + '</div></div>'
            + '<div class="progress-wrap" style="margin-top:6px">'
            + '<div class="progress-bar" style="width:' + prog + '%;background:' + (isZak?'var(--green)':prog>=100?'var(--green)':'var(--accent)') + '"></div>'
            + '</div>'
            + '<div style="font-size:11px;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between">'
            + '<span>' + prog + '% · ' + (z.sztuki_wykonane||0) + '/' + z.ilosc_sztuk + ' szt.</span>'
            + '<span style="color:var(--accent)">▶ szczegóły</span>'
            + '</div></div>';
    });
  }

  // Modal szczegółów zlecenia
  if (state.zlecenieModal) {
    const m = state.zlecenieModal;
    html += '<div class="modal-overlay" onclick="if(event.target===this)setState({zlecenieModal:null})">'
          + '<div class="modal" style="max-height:85vh;overflow-y:auto">'
          + '<button class="modal-close" onclick="setState({zlecenieModal:null})">×</button>'
          + '<div style="font-size:16px;font-weight:700;margin-bottom:4px">' + (m.numer||'') + '</div>'
          + '<div style="color:var(--dim);font-size:13px;margin-bottom:14px">' + (m.nazwa||'') + '</div>';

    if (m.loading) {
      html += '<div style="text-align:center;padding:20px;color:var(--dim)">⏳ Ładowanie...</div>';
    } else {
      if (m.koszt_total != null) {
        const kosztProd = m.koszt_produktow || 0;
        const kosztZbr = m.koszt_zbrojenia || 0;
        const kosztTotal = (m.koszt_total||0) + kosztProd + kosztZbr;
        const zysk = (m.wartosc||0) - kosztTotal;
        const kolor = zysk >= 0 ? 'var(--green)' : 'var(--red)';
        html += '<div style="background:var(--entry);border-radius:8px;padding:12px;margin-bottom:14px">'
              + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">💰 Podsumowanie finansowe</div>'
              + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">'
              + '<span style="color:var(--dim)">Wartość zlecenia</span><span style="color:var(--accent);font-weight:700">' + fmtPLN(m.wartosc||0) + '</span>'
              + '<span style="color:var(--dim)">Koszt pracy</span><span>' + fmtPLN(m.koszt_total||0) + '</span>'
              + (kosztZbr > 0 ? '<span style="color:var(--orange)">⚙ Koszt zbrojenia</span><span style="color:var(--orange)">' + fmtPLN(kosztZbr) + '</span>' : '')
              + (kosztProd > 0 ? '<span style="color:var(--dim)">Koszt produktów</span><span>' + fmtPLN(kosztProd) + '</span>' : '')
              + (kosztTotal !== (m.koszt_total||0) ? '<span style="color:var(--dim)">Koszt łącznie</span><span style="font-weight:700">' + fmtPLN(kosztTotal) + '</span>' : '')
              + '<span style="color:var(--dim)">Zysk</span><span style="color:' + kolor + ';font-weight:700">' + fmtPLN(zysk) + '</span>'
              + '</div></div>';
        // Tabela produktów zlecenia
        if (m.produkty && m.produkty.length) {
          html += '<div style="background:var(--entry);border-radius:8px;padding:12px;margin-bottom:14px">'
                + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">🛒 Produkty / Zakupy</div>';
          m.produkty.forEach(p => {
            const w = (parseFloat(p.ilosc)||0)*(parseFloat(p.cena)||0);
            html += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(46,53,72,.3)">'
                  + '<span>' + p.nazwa + '</span>'
                  + '<span style="color:var(--dim)">' + p.ilosc + ' szt. × ' + fmtPLN(p.cena) + '</span>'
                  + '<span style="color:var(--accent);font-weight:600">' + fmtPLN(w) + '</span>'
                  + '</div>';
          });
          html += '</div>';
        }
      }

      const sesje = m.sesje || [];
      if (sesje.length) {
        const ops = {};
        sesje.forEach(s => {
          const k = (s.kolejnosc||999) + '::' + (s.op_nazwa||'Inne');
          if (!ops[k]) ops[k] = {sesje:[], total_sec:0, total_szt:0, kolejnosc:s.kolejnosc||999, nazwa:s.op_nazwa||'Inne'};
          let el = 0;
          if (s.start_time && s.end_time) {
            el = (parseServerDT(s.end_time)-parseServerDT(s.start_time))/1000;
            (JSON.parse(s.pauzy||'[]')).forEach(p=>{if(p.koniec)el-=(parseServerDT(p.koniec)-parseServerDT(p.start))/1000;});
            el = Math.max(0, el);
          }
          ops[k].sesje.push({...s, elapsed_sec:el});
          ops[k].total_sec += el;
          ops[k].total_szt += s.ilosc_sztuk||0;
        });

        Object.values(ops).sort((a,b)=>a.kolejnosc-b.kolejnosc).forEach(op => {
          const normMin = op.sesje[0]?.czas_norma||null;
          const wydPct = normMin && op.total_szt>0 ? Math.round((normMin*op.total_szt)/(op.total_sec/60)*100) : null;
          const wKolor = wydPct===null?'var(--dim)':wydPct>=90?'var(--green)':wydPct>=70?'var(--orange)':'var(--red)';
          const kosztOp = op.sesje.reduce((a,s)=>a+(s.koszt_sesji||0),0);
          html += '<div style="margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden">'
                + '<div style="background:var(--entry);padding:8px 12px;display:flex;justify-content:space-between;align-items:center">'
                + '<div style="font-weight:600;font-size:13px">' + (op.kolejnosc<999?op.kolejnosc+'. ':'') + op.nazwa + '</div>'
                + '<div style="font-size:11px;color:var(--dim);text-align:right">'
                + fmtTime(Math.round(op.total_sec)) + ' · ' + op.total_szt + ' szt.'
                + (wydPct!==null?' · <span style="color:'+wKolor+'">'+wydPct+'%</span>':'')
                + (kosztOp?' · <span style="color:var(--accent)">'+fmtPLN(kosztOp)+'</span>':'')
                + '</div></div>';
          op.sesje.forEach(s => {
            const dt = s.end_time ? (s.end_time||'').substring(0,16).replace('T',' ') : '—';
            const normMin = s.czas_norma || op.sesje[0]?.czas_norma || 0;
            const sztuk = s.ilosc_sztuk || 1;
            const elapsedMin = s.elapsed_sec / 60;
            // norma = czas na 1 szt. – porównujemy śr. czas/szt z normą
            const avgSecPerPiece = Math.round(s.elapsed_sec / sztuk);
            const avgMinPerPiece = elapsedMin / sztuk;
            const czasPrzekroczony = normMin > 0 && avgMinPerPiece > normMin;
            const timeColor = czasPrzekroczony ? 'var(--red)' : 'var(--green)';
            const rowBg = czasPrzekroczony ? 'background:rgba(231,76,60,0.08);' : '';
            html += '<div style="padding:7px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;' + rowBg + '">'
                  + '<div><div style="font-size:13px;font-weight:500">' + (s.full_name||'—') + (czasPrzekroczony?' <span style="font-size:10px;color:var(--red);font-weight:700">⚠ PRZEKROCZONO</span>':'') + '</div>'
                  + '<div style="font-size:11px;color:var(--dim)">🕐 ' + dt + '</div>'
                  + (s.uwagi?'<div style="font-size:11px;color:var(--orange)">💬 '+s.uwagi+'</div>':'')
                  + '</div><div style="text-align:right">'
                  + '<div style="font-family:Consolas;color:' + timeColor + ';font-size:14px;font-weight:700">' + fmtTime(avgSecPerPiece) + '<span style="font-family:inherit;font-size:10px;color:var(--dim);font-weight:400"> /szt.</span></div>'
                  + '<div style="font-size:11px;color:var(--dim)">łącznie: ' + fmtTime(Math.round(s.elapsed_sec)) + ' · ' + sztuk + ' szt.</div>'
                  + (normMin?'<div style="font-size:10px;color:var(--dim)">norma: ' + normMin + ' min/szt.</div>':'')
                  + (s.koszt_sesji?'<div style="font-size:11px;color:var(--accent)">'+fmtPLN(s.koszt_sesji)+'</div>':'')
                  + '</div></div>';
          });
          html += '</div>';
        });
      } else {
        html += '<div class="empty">Brak zarejestrowanych sesji dla tego zlecenia</div>';
      }
    }
    const canDelete = state.user?.role === 'admin' || state.user?.role === 'majster';
    html += '<div style="display:flex;gap:8px;margin-top:12px">';
    if (canDelete) {
      html += '<button class="btn btn-red" style="flex:1" onclick="deleteZlecenieFromModal(' + m.id + ')">🗑 Usuń zlecenie</button>';
    }
    html += '<button class="btn btn-outline" style="flex:1" onclick="setState({zlecenieModal:null})">Zamknij</button>';
    html += '</div></div></div>';
  }

  return html;
}

async function deleteZlecenieFromModal(zid) {
  if (!confirm('Na pewno usunąć to zlecenie? Zostaną usunięte wszystkie sesje i operacje!')) return;
  try {
    await del('/api/zlecenia/' + zid);
    setState({zlecenieModal: null});
    await loadMajster();
    alert('Zlecenie zostało usunięte.');
  } catch(e) {
    alert('Błąd usuwania: ' + e.message);
  }
}


async function openZlecenieModal(zid) {
  const all = [...(state.majsterStats?.zlecenia||[]), ...(state.majsterStats?.wszystkie_zlecenia||[])];
  const z = all.find(x=>x.id===zid) || {id:zid, numer:'#'+zid, nazwa:'', cena_brutto_szt:0, ilosc_sztuk:0};
  setState({zlecenieModal:{id:zid, numer:z.numer, nazwa:z.nazwa,
    wartosc:(z.cena_brutto_szt||0)*(z.ilosc_sztuk||0), loading:true, sesje:null, koszt_total:null}});
  try {
    const data = await get('/api/zlecenia/' + zid + '/szczegoly');
    setState({zlecenieModal:{...state.zlecenieModal, loading:false,
      sesje:data.sesje, koszt_total:data.koszt_total, koszt_produktow:data.koszt_produktow||0,
      koszt_zbrojenia:data.koszt_zbrojenia||0,
      produkty:data.produkty||[], wartosc:data.wartosc||state.zlecenieModal.wartosc}});
  } catch(e) {
    setState({zlecenieModal:{...state.zlecenieModal, loading:false, sesje:[]}});
  }
}


function renderMajsterWydajnosc() {
  const w = state.wydajnoscMajster;
  const okres = state.wydajnoscOkres;
  const okresLabels = {dzis:'Dziś', tydzien:'7 dni', miesiac:'30 dni'};
  const rwo = state.raportWydOkres;

  let html = `
  <div class="chip-row">
    ${Object.entries(okresLabels).map(([k,v]) =>
      `<div class="chip ${okres===k?'active':''}" onclick="loadWydajnoscMajster('${k}')">${v}</div>`
    ).join('')}
  </div>`;

  // Raport PDF wydajności
  html += '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">'
        + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">📄 Raport PDF wydajności</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end">'
        + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Od</div>'
        + '<input type="date" id="rwd-od" value="' + (rwo.od||getTodayMinus(7)) + '" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
        + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Do</div>'
        + '<input type="date" id="rwd-do" value="' + (rwo.do||getToday()) + '" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
        + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Typ raportu</div>'
        + '<select id="rwd-typ" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px">'
        + '<option value="skrocony" ' + (state.raportWydTyp==='skrocony'?'selected':'') + '>Skrócony</option>'
        + '<option value="pelny" ' + (state.raportWydTyp==='pelny'?'selected':'') + '>Pełny</option>'
        + '</select></div>'
        + '<button class="btn btn-accent" style="padding:8px 14px;white-space:nowrap" onclick="generateRaportWydajnoscPDF()">📥 Generuj PDF</button>'
        + '</div></div>';

  if (!w) {
    html += `<div class="empty">⏳ Ładowanie danych wydajności...</div>`;
    return html;
  }

  if (w.error) {
    html += `<div class="error-banner">⚠ Błąd ładowania danych: ${w.error}</div>`;
    html += `<button class="btn-outline" onclick="loadWydajnoscMajster()">🔄 Spróbuj ponownie</button>`;
    return html;
  }

  if (!w.pracownicy.length) {
    html += `<div class="empty">Brak danych za wybrany okres</div>`;
    return html;
  }

  html += `<div class="section-hdr">🏆 Ranking pracowników – ${okresLabels[okres]}</div>`;

  w.pracownicy.forEach((p, idx) => {
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const wydPct = p.normy_total > 0 ? Math.round(p.normy_ok/p.normy_total*100) : null;
    const barColor = wydPct===null ? 'var(--dim)' : wydPct>=90 ? 'var(--green)' : wydPct>=70 ? 'var(--orange)' : 'var(--red)';
    const expanded = state.majsterExpandedUser === p.user_id;

    html += `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer"
           onclick="setState({majsterExpandedUser: ${expanded ? 'null' : p.user_id}})">
        <div>
          <div style="font-weight:700">${medal} ${p.full_name}</div>
          <div style="font-size:12px;color:var(--dim)">
            ${p.sesji} sesji | ${p.sztuki} szt. | ${p.godz}h
            ${wydPct!==null ? ` | normy: <span style="color:${barColor}">${wydPct}%</span>` : ''}
            ${p.koszt_total ? ` | koszt: <span style="color:var(--green);font-weight:600">${(p.koszt_total).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})} zł</span>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${wydPct !== null ? `
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700;color:${barColor}">${wydPct}%</div>
            <div style="font-size:10px;color:var(--dim)">${p.normy_ok}/${p.normy_total} norm</div>
          </div>` : ''}
          <span style="color:var(--dim)">${expanded?'▲':'▼'}</span>
        </div>
      </div>
      ${wydPct !== null ? `
      <div class="wyd-bar-wrap" style="margin-top:8px">
        <div class="wyd-bar" style="width:${wydPct}%;background:${barColor}"></div>
      </div>` : ''}
      ${expanded && p.sesje.length ? `
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Sesje (${p.sesje.length}):</div>
        ${p.sesje.slice(0,15).map(s => {
          const wColor = s.wyd_pct===null ? 'var(--dim)' : s.wyd_pct>=90 ? 'var(--green)' : s.wyd_pct>=70 ? 'var(--orange)' : 'var(--red)';
          const avgMin = s.ilosc_sztuk > 0 ? (s.czas_min / s.ilosc_sztuk).toFixed(1) : s.czas_min;
          return `
          <div style="padding:6px 0;border-bottom:1px solid rgba(46,53,72,.3)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.op_nazwa}</div>
                <div style="font-size:11px;color:var(--accent)">📋 ${s.zl_numer}${s.zl_nazwa && s.zl_nazwa!==s.zl_numer ? ' – '+s.zl_nazwa : ''}</div>
                <div style="font-size:11px;color:var(--dim)">📅 ${s.data||'—'} | 🏭 ${s.stanowisko||'—'} | 📦 ${s.ilosc_sztuk||0} szt.</div>
              </div>
              <div style="text-align:right;margin-left:8px;white-space:nowrap">
                <div style="font-family:Consolas;font-size:13px;font-weight:700;color:var(--text)">${avgMin}<span style="font-size:10px;color:var(--dim);font-weight:400"> min/szt</span></div>
                ${s.norma_min?`<div style="font-size:10px;color:var(--dim)">norma: ${s.norma_min} min</div>`:''}
                ${s.wyd_pct!==null?`<div style="font-weight:700;font-size:14px;color:${wColor}">${s.wyd_pct}%</div>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  });

  return html;
}

      <div style="color:var(--green);font-size:16px;font-weight:600">Brak operacji do transportu</div>

// ══════════════════════════════════════════════════════════════
//  TAB: ZLECENIA (planowanie)
// ══════════════════════════════════════════════════════════════
function renderZlecenia() {
  if (state.loading) return '<div class="spinner">⏳</div>';

  const role = state.user?.role;
  const canEdit = ['admin','technolog','majster'].includes(role);

  let html = '';
  if (canEdit) {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({zlecenieModal:{}})">+ Nowe zlecenie</button>`;
  }

  const zl = state.zlecenia || [];
  if (!zl.length) {
    html += `<div class="empty">Brak zleceń</div>`;
  } else {
    zl.forEach(z => {
      const przeterminowane = z.termin && new Date(z.termin) < new Date() && z.status !== 'zakonczone';
      html += `
      <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
        <div class="card-header">
          <div>
            <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">TERMIN!</span>':''}</div>
            <div class="card-sub">${z.nazwa}</div>
            ${z.termin ? `<div class="card-sub">📅 ${fmtDate(z.termin)}</div>` : ''}
            ${(() => { if (!z.pozostale_min || z.status==='zakonczone') return ''; const est = new Date(Date.now() + z.pozostale_min*60*1000); return `<div class="card-sub" style="color:var(--blue)">🕐 Szac. koniec: ${fmtEstimatedKoniec(est)}</div>`; })()}
            <div class="card-sub">📦 ${z.ilosc_sztuk} szt. ${z.cena_brutto_szt ? '| '+fmtPLN(z.cena_brutto_szt)+'/szt' : ''}</div>
          </div>
          ${statusBadge(z.status)}
        </div>
        ${canEdit ? `
        <div class="btn-row" style="margin-top:8px;flex-wrap:wrap;gap:6px">
          <button class="btn-sm btn-blue" onclick="openEditZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">✏ Edytuj</button>
          <button class="btn-sm btn-accent" onclick="openOperacje(${JSON.stringify(z).replace(/"/g,'&quot;')})">🔧 Operacje</button>
          <button class="btn-sm btn-green" onclick="loadKoszty(${z.id})">💰 Koszty</button>
          <select style="background:var(--entry);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px"
                  onchange="changeZlecenieStatus(${z.id},this.value);this.value='${z.status}'">
            <option value="${z.status}" disabled selected>▶ Status</option>
            <option value="nowe">nowe</option>
            <option value="w_toku">w_toku</option>
            <option value="zakonczone">zakonczone</option>
            <option value="anulowane">anulowane</option>
          </select>
          <button class="btn-sm btn-accent" onclick="showQRForZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">📷 QR</button>
          <button class="btn-sm btn-green" onclick="printZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">🖨 Karta</button>
          <button class="btn-sm btn-red" onclick="deleteZlecenie(${z.id})">🗑</button>
        </div>` : ''}
      </div>`;
    });
  }

  // Modal QR gen
  html += renderQRGenModal();

  // Modal drukuj kartę
  html += renderPrintModal();

  // Modal zlecenie
  if (state.zlecenieModal !== null) {
    const z = state.zlecenieModal;
    const isNew = !z.id;
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({zlecenieModal:null})">×</button>
        <h3>${z.id ? '✏ Edytuj zlecenie' : '+ Nowe zlecenie'}</h3>
        ${isNew ? `
        <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">
          <div style="font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">
            📂 Wczytaj istniejące zlecenie (autouzupełnienie)
          </div>
          <div style="display:flex;gap:8px">
            <input id="zl-search" type="text" placeholder="Wpisz numer lub nazwę..." 
                   style="flex:1;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;outline:none"
                   oninput="filterZleceniaSearch(this.value)"
                   onfocus="filterZleceniaSearch(this.value)">
          </div>
          <div id="zl-search-results" style="margin-top:6px"></div>
          ${state.autofillOperacje && state.autofillOperacje.length ? `
          <div style="margin-top:8px;background:rgba(39,174,96,0.08);border:1px solid var(--green);border-radius:6px;padding:8px 10px;">
            <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px">
              ✅ Zostaną skopiowane operacje (${state.autofillOperacje.length}):
            </div>
            ${state.autofillOperacje.map(op =>
              `<div style="font-size:12px;padding:2px 0;border-bottom:1px solid rgba(39,174,96,0.2)">
                <span style="color:var(--dim)">${op.kolejnosc}.</span>
                <span style="margin-left:6px">${op.nazwa}</span>
                ${op.stanowisko ? `<span style="color:var(--dim);margin-left:6px">| ${op.stanowisko}</span>` : ''}
                ${op.czas_norma ? `<span style="color:var(--accent);margin-left:6px">| ${op.czas_norma} min/szt</span>` : ''}
              </div>`
            ).join('')}
          </div>` : ''}
        </div>` : ''}
        <div class="field"><label>Numer</label><input id="zl-numer" type="text" value="${z.numer||''}"></div>
        <div class="field"><label>Nazwa</label><input id="zl-nazwa" type="text" value="${z.nazwa||''}"></div>
        <div class="field"><label>Opis</label><textarea id="zl-opis">${z.opis||''}</textarea></div>
        <div class="field"><label>Termin</label><input id="zl-termin" type="date" value="${z.termin||''}"></div>
        <div class="field"><label>Ilość sztuk</label><input id="zl-ilosc" type="number" value="${z.ilosc_sztuk||1}" min="1"></div>
        <div class="field"><label>Cena brutto/szt (zł)</label><input id="zl-cena" type="number" step="0.01" value="${z.cena_brutto_szt||0}"></div>
        <div class="field">
          <label>Materiał od klienta</label>
          <select id="zl-mat">
            <option value="0" ${!z.material_od_klienta?'selected':''}>Nie</option>
            <option value="1" ${z.material_od_klienta?'selected':''}>Tak</option>
          </select>
        </div>
        ${z.id ? renderProduktyZleceniaForm(z.id) : '<div style="background:var(--entry);border:1px dashed var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--dim)">💡 Zapisz zlecenie, aby móc dodać produkty/zakupy</div>'}
        <button class="btn btn-accent" onclick="saveZlecenieForm(${z.id||0})">💾 Zapisz</button>
      </div>
    </div>`;
  }

  // Modal operacje
  if (state.operacjeModal) {
    html += renderOperacjeModal();
  }

  // Modal koszty
  if (state.zlecenieKoszty) {
    html += renderKosztyModal();
  }

  return html;
}

function filterZleceniaSearch(query) {
  const container = document.getElementById('zl-search-results');
  if (!container) return;
  const q = query.trim().toLowerCase();
  const zl = state.zlecenia || [];
  const filtered = q.length < 1 ? [] : zl.filter(z =>
    z.numer.toLowerCase().includes(q) || z.nazwa.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!filtered.length) { container.innerHTML = ''; return; }
  container.innerHTML = filtered.map(z => `
    <div onclick="autofillZlecenie(${z.id})"
         style="padding:8px 10px;cursor:pointer;border-radius:6px;border:1px solid var(--border);
                background:var(--panel);margin-bottom:4px;font-size:13px;
                display:flex;justify-content:space-between;align-items:center"
         onmouseover="this.style.borderColor='var(--accent)'"
         onmouseout="this.style.borderColor='var(--border)'">
      <div>
        <span style="font-weight:700;color:var(--accent)">${z.numer}</span>
        <span style="color:var(--dim);margin-left:8px">${z.nazwa}</span>
      </div>
      <span style="font-size:11px;color:var(--dim)">📋 wczytaj</span>
    </div>`).join('');
}

function autofillZlecenie(id) {
  const z = (state.zlecenia||[]).find(x => x.id === id);
  if (!z) return;
  // Numer: sugeruj nowy numer na podstawie wzorca (z sufiksem -K + pełny timestamp)
  const baseNumer = (z.numer || '').replace(/-K\d+$/, '');
  const numerSufx = baseNumer + '-K' + Date.now();
  // Zapisz dane autouzupełnienia do state.zlecenieModal – dzięki temu
  // po re-renderze (np. po załadowaniu operacji) pola nie zostaną wyczyszczone
  const autofillData = {
    numer: numerSufx,
    nazwa: z.nazwa || '',
    opis: z.opis || '',
    termin: z.termin ? z.termin.substring(0,10) : '',
    ilosc_sztuk: z.ilosc_sztuk || 1,
    cena_brutto_szt: z.cena_brutto_szt || 0,
    material_od_klienta: z.material_od_klienta || 0,
  };
  // Aktualizuj zlecenieModal (bez id – to nowe zlecenie) tak aby re-render
  // użył tych wartości zamiast pustych
  setState({
    zlecenieModal: autofillData,
    autofillSourceId: id,
    autofillOperacje: [],
  });
  // Focus na polu numeru po renderze
  setTimeout(() => { const el = document.getElementById('zl-numer'); if (el) { el.focus(); el.select(); } }, 80);
  // Załaduj operacje z wzorcowego zlecenia
  fetchAutofillOperacje(id);
}

let _autofillToken = 0;

async function fetchAutofillOperacje(zid) {
  const myToken = ++_autofillToken;
  try {
    const ops = await get(`/api/zlecenia/${zid}/operacje`);
    // Ignoruj wynik jeśli w międzyczasie wybrano inne zlecenie do autofill
    if (myToken !== _autofillToken) return;
    setState({autofillOperacje: ops});
  } catch(e) {
    if (myToken !== _autofillToken) return;
    setState({autofillOperacje: []});
  }
}

function renderProduktyZleceniaForm(zid) {
  const produkty = state.produktyZlecenia || [];
  const koszt = produkty.reduce((a, p) => a + (parseFloat(p.ilosc)||0)*(parseFloat(p.cena)||0), 0);
  let html = '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🛒 Produkty / Zakupy pod zlecenie</div>';
  if (produkty.length) {
    produkty.forEach(p => {
      const wartosc = (parseFloat(p.ilosc)||0)*(parseFloat(p.cena)||0);
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px">'
        + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + p.nazwa + '</span>'
        + '<span style="color:var(--dim);white-space:nowrap">' + p.ilosc + ' szt. × ' + fmtPLN(p.cena) + '</span>'
        + '<span style="color:var(--accent);font-weight:700;white-space:nowrap;min-width:70px;text-align:right">' + fmtPLN(wartosc) + '</span>'
        + '<button class="btn-sm btn-red" style="padding:2px 7px;font-size:11px" onclick="deleteProduktZlecenia(' + zid + ',' + p.id + ')">✕</button>'
        + '</div>';
    });
    html += '<div style="border-top:1px solid var(--border);padding-top:6px;font-size:12px;display:flex;justify-content:space-between">'
      + '<span style="color:var(--dim)">Łączny koszt produktów:</span>'
      + '<span style="color:var(--accent);font-weight:700">' + fmtPLN(koszt) + '</span>'
      + '</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--dim);margin-bottom:8px">Brak dodanych produktów</div>';
  }
  html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:6px;margin-top:10px;align-items:end">'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Nazwa produktu</div>'
    + '<input id="pr-zl-nazwa" type="text" placeholder="np. Frez R4, Wiertło..." style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Ilość</div>'
    + '<input id="pr-zl-ilosc" type="number" value="1" min="0.01" step="0.01" style="width:70px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px"></div>'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Cena (zł)</div>'
    + '<input id="pr-zl-cena" type="number" value="0" min="0" step="0.01" style="width:80px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px"></div>'
    + '</div>'
    + '<button class="btn btn-green" style="margin-top:8px;padding:8px" onclick="addProduktZlecenia(' + zid + ')">+ Dodaj produkt</button>'
    + '</div>';
  return html;
}

async function loadProduktyZlecenia(zid) {
  try {
    const data = await get('/api/zlecenia/' + zid + '/produkty');
    setState({produktyZlecenia: data});
  } catch(e) { setState({produktyZlecenia: []}); }
}

async function addProduktZlecenia(zid) {
  const nazwa = document.getElementById('pr-zl-nazwa')?.value?.trim();
  if (!nazwa) { alert('Podaj nazwę produktu'); return; }
  const ilosc = parseFloat(document.getElementById('pr-zl-ilosc')?.value)||1;
  const cena = parseFloat(document.getElementById('pr-zl-cena')?.value)||0;
  try {
    await post('/api/zlecenia/' + zid + '/produkty', {zlecenie_id: zid, nazwa, ilosc, cena});
    await loadProduktyZlecenia(zid);
  } catch(e) { alert('Błąd: ' + e.message); }
}

async function deleteProduktZlecenia(zid, pid) {
  if (!confirm('Usunąć produkt?')) return;
  try {
    await del('/api/zlecenia/' + zid + '/produkty/' + pid);
    await loadProduktyZlecenia(zid);
  } catch(e) { alert('Błąd: ' + e.message); }
}


function saveZlecenieForm(id) {
  const data = {
    numer: document.getElementById('zl-numer').value.trim(),
    nazwa: document.getElementById('zl-nazwa').value.trim(),
    opis: document.getElementById('zl-opis').value,
    termin: document.getElementById('zl-termin').value || null,
    ilosc_sztuk: parseInt(document.getElementById('zl-ilosc').value)||1,
    cena_brutto_szt: parseFloat(document.getElementById('zl-cena').value)||0,
    material_od_klienta: parseInt(document.getElementById('zl-mat').value)||0,
  };
  if (!data.numer||!data.nazwa) { alert('Numer i nazwa są wymagane'); return; }
  if (id) data.id = id;
  saveZlecenie(data);
}

async function openEditZlecenie(z) {
  if (z && z.id) {
    await loadProduktyZlecenia(z.id);
  }
  setState({zlecenieModal: z});
}

async function openOperacje(zlecenie) {
  setState({operacjeModal:{zlecenie, operacje:[], loading:true}});
  try {
    const ops = await get(`/api/zlecenia/${zlecenie.id}/operacje`);
    setState({operacjeModal:{zlecenie, operacje:ops, loading:false}});
  } catch(e) { alert(e.message); }
}

function renderOperacjeModal() {
  const m = state.operacjeModal;
  if (!m) return '';
  const zl = m.zlecenie;
  const ops = m.operacje || [];
  let html = `
  <div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="setState({operacjeModal:null})">×</button>
      <h3>🔧 Operacje – ${zl.numer}</h3>
      <p style="color:var(--dim);font-size:13px;margin-bottom:16px">${zl.nazwa}</p>`;

  if (m.loading) {
    html += `<div class="spinner">⏳</div>`;
  } else {
    ops.forEach((op,i) => {

function drawQRCanvas(kod) {
  // Simple QR rendering via server fetch with auth header, drawn onto canvas
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
  fetch(url, {headers: {'x-api-key': API_KEY}})
    .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.blob(); })
    .then(blob => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        URL.revokeObjectURL(img.src);
      };
      img.src = URL.createObjectURL(blob);
    })
    .catch(() => {
      canvas.style.display = 'none';
      const err = document.getElementById('qr-err');
      if (err) err.style.display = 'block';
    });
}

function editOperacja(op) {
  const n = document.getElementById('op-nazwa');
  const k = document.getElementById('op-kol');
  const s = document.getElementById('op-stan');
  const norma = document.getElementById('op-norma');
  const opis = document.getElementById('op-opis');
  const zbr = document.getElementById('op-zbrojenie');
  const zbrWrap = document.getElementById('zbrojenie-field-wrap');
  if (n) n.value = op.nazwa;
  if (k) k.value = op.kolejnosc;
  if (s) { s.value = op.stanowisko || ''; }
  if (norma) norma.value = op.czas_norma || 0;
  if (opis) opis.value = op.opis_czynnosci || '';
  if (zbr) zbr.value = op.czas_zbrojenia_min || 0;
  // show zbrojenie field if this stanowisko has zbrojenie active
  if (zbrWrap && s) {
    const selOpt = s.options[s.selectedIndex];
    const zbrAkt = selOpt ? selOpt.getAttribute('data-zbr') : '0';
    zbrWrap.style.display = (zbrAkt === '1' || op.czas_zbrojenia_min > 0) ? 'block' : 'none';
  }
  // swap button to update
  const addBtn = document.querySelector('[onclick^="addOperacja"]');
  if (addBtn) {
    addBtn.textContent = '💾 Zapisz zmiany';
    addBtn.setAttribute('onclick', `updateOperacja(${op.id}, ${state.operacjeModal.zlecenie.id})`);
  }
}

                `<option value="${r}" ${u.role===r?'selected':''}>${roleName(r)}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>${u.id?'Nowe hasło (puste = bez zmiany)':'Hasło'}</label><input id="u-pass" type="password"></div>
          <button class="btn btn-accent" onclick="saveUserForm(${u.id||0})">💾 Zapisz</button>
        </div>
      </div>`;
    }
  }

  if (state.adminTab === 'stawki') {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({stawkaModal:{}})">+ Nowa stawka</button>`;
    (state.stawki||[]).forEach(s => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${s.stanowisko}</div>
            <div class="card-sub">${fmtPLN(s.stawka_godz)}/h</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-blue" onclick="setState({stawkaModal:${JSON.stringify(s).replace(/"/g,'&quot;')}})">✏</button>
            <button class="btn-sm btn-red" onclick="deleteStawka(${s.id})">🗑</button>
          </div>
        </div>
        ${s.zbrojenie_aktywne ? `<div style="margin-top:6px;font-size:12px;color:var(--orange)">⚙ Zbrojenie: ${fmtPLN(s.zbrojenie_stawka_godz)}/h</div>` : ''}
      </div>`;
    });
    if (state.stawkaModal !== null) {
      const s = state.stawkaModal;
      const zbrAkt = s.zbrojenie_aktywne ? true : false;
      html += `
      <div class="modal-overlay">
        <div class="modal">
          <button class="modal-close" onclick="setState({stawkaModal:null})">×</button>
          <h3>${s.id?'✏ Edytuj stawkę':'+ Nowa stawka'}</h3>
          <div class="field"><label>Stanowisko</label><input id="st-stan" type="text" value="${s.stanowisko||''}"></div>
          <div class="field"><label>Stawka (zł/h)</label><input id="st-stawka" type="number" step="0.5" value="${s.stawka_godz||0}"></div>
          <div class="field"><label>Opis</label><input id="st-opis" type="text" value="${s.opis||''}"></div>
          <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <input type="checkbox" id="st-zbr-akt" ${zbrAkt?'checked':''} onchange="document.getElementById('zbr-stawka-wrap').style.display=this.checked?'block':'none'" style="width:18px;height:18px;cursor:pointer">
              <label for="st-zbr-akt" style="font-size:14px;cursor:pointer">⚙ Aktywuj zbrojenie</label>
            </div>
            <div id="zbr-stawka-wrap" style="display:${zbrAkt?'block':'none'}">
              <div class="field" style="margin-bottom:0"><label>Stawka zbrojenia (zł/h)</label><input id="st-zbr-stawka" type="number" step="0.5" min="0" value="${s.zbrojenie_stawka_godz||0}"></div>
            </div>
          </div>
          <button class="btn btn-accent" onclick="saveStawkaForm(${s.id||0})">💾 Zapisz</button>
        </div>
      </div>`;
    }
  }

  if (state.adminTab === 'katalog') {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({produktModal:{}})">+ Nowy produkt</button>`;
    (state.katalog||[]).forEach(p => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${p.nazwa}</div>
            <div class="card-sub">${p.opis||'—'} | ${fmtPLN(p.cena_szt)}/szt | domyślnie: ${p.ilosc_domyslna} szt.</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-blue" onclick="setState({produktModal:${JSON.stringify(p).replace(/"/g,'&quot;')}})">✏</button>
            <button class="btn-sm btn-red" onclick="deleteProdukt(${p.id})">🗑</button>
          </div>
        </div>
      </div>`;
    });
    if (state.produktModal !== null) {
      const p = state.produktModal;
      html += `
      <div class="modal-overlay">
        <div class="modal">
          <button class="modal-close" onclick="setState({produktModal:null})">×</button>
          <h3>${p.id?'✏ Edytuj produkt':'+ Nowy produkt'}</h3>
          <div class="field"><label>Nazwa</label><input id="pr-nazwa" type="text" value="${p.nazwa||''}"></div>
          <div class="field"><label>Opis</label><textarea id="pr-opis">${p.opis||''}</textarea></div>
          <div class="field"><label>Ilość domyślna</label><input id="pr-ilosc" type="number" value="${p.ilosc_domyslna||1}" min="1"></div>
          <div class="field"><label>Cena (zł/szt)</label><input id="pr-cena" type="number" step="0.01" value="${p.cena_szt||0}"></div>
          <button class="btn btn-accent" onclick="saveProduktForm(${p.id||0})">💾 Zapisz</button>
        </div>
      </div>`;
    }
  }

  return html;
}

function saveUserForm(id) {
  const data = {
    full_name: document.getElementById('u-name')?.value?.trim(),
    role: document.getElementById('u-role')?.value,
    password: document.getElementById('u-pass')?.value || undefined,
  };
  if (!data.full_name) { alert('Podaj imię i nazwisko'); return; }
  if (id) { data.id = id; }
  else { data.username = document.getElementById('u-login')?.value?.trim(); data.password = document.getElementById('u-pass')?.value; }
  saveUser(data);
}
function saveStawkaForm(id) {
  const zbrAkt = document.getElementById('st-zbr-akt')?.checked ? 1 : 0;
  const data = {
    stanowisko: document.getElementById('st-stan')?.value?.trim(),
    stawka_godz: parseFloat(document.getElementById('st-stawka')?.value)||0,
    opis: document.getElementById('st-opis')?.value||'',
    zbrojenie_aktywne: zbrAkt,
    zbrojenie_stawka_godz: zbrAkt ? (parseFloat(document.getElementById('st-zbr-stawka')?.value)||0) : 0,
  };
  if (!data.stanowisko) { alert('Podaj nazwę stanowiska'); return; }
  if (id) data.id = id;
  saveStawka(data);
}
function saveProduktForm(id) {
  const data = {
    nazwa: document.getElementById('pr-nazwa')?.value?.trim(),
    opis: document.getElementById('pr-opis')?.value||'',
    ilosc_domyslna: parseInt(document.getElementById('pr-ilosc')?.value)||1,
    cena_szt: parseFloat(document.getElementById('pr-cena')?.value)||0,
  };
  if (!data.nazwa) { alert('Podaj nazwę produktu'); return; }
  if (id) data.id = id;
  saveProdukt(data);
}

// ══════════════════════════════════════════════════════════════
//  TAB: USTAWIENIA
// ══════════════════════════════════════════════════════════════
function renderUstawienia() {
  return `
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">⚙ Połączenie</div>
    <div style="font-size:13px;color:var(--dim);word-break:break-all;margin-bottom:8px">
      Serwer: <span style="color:var(--text)">${SERVER_URL||'(nie ustawiony)'}</span>
    </div>
    <button class="btn btn-blue" onclick="setState({screen:'config'})">🔧 Zmień serwer</button>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="card-title" style="margin-bottom:6px">ℹ O aplikacji</div>
    <div style="font-size:13px;color:var(--dim);line-height:2">
      System Zarządzania Produkcją v4.0<br>
      Wielokrotne sesje równoległe ✅<br>
      Pauzy sesji ✅<br>
      Skaner QR ✅<br>
      Praca nieprodukcyjna ✅<br>
      Alerty norm ✅<br>
      Wydajność pracowników ✅<br>
      Podsumowanie zleceń (majster) ✅<br>
      Wydruk karty zlecenia z QR ✅<br>
      Pełna administracja ✅
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════════════
function renderContent() {
  if (state.screen === 'config') return renderConfig();
  if (state.screen === 'login')  return renderLogin();

  const tabContent = {
    praca:      renderPraca,
    majster:    renderMajster,
    magazyn:    renderMagazyn,
    zlecenia:   renderZlecenia,
    admin:      renderAdmin,
    ustawienia: renderUstawienia,
  }[state.activeTab] || (() => '');

  return `
    ${renderTopbar()}
    <div class="content">
      ${state.error ? `<div class="error-banner">⚠ ${state.error}</div>` : ''}
      ${tabContent()}
    </div>
    ${renderBottomNav()}
    ${renderQRZleceniePickerModal()}`;
}

function render() {
  document.getElementById('app').innerHTML = renderContent();
  _afterRender();
  // Restart timerów po re-render
  for (const [sid, t] of Object.entries(state.timers)) {
    if (t.sesja) startTimerFor(t.sesja);
  }
  // Narysuj QR jeśli modal QR otwarty
  if (state.qrGenModal && state.qrGenKod) {
    setTimeout(() => drawQRCanvas(state.qrGenKod), 50);
  }
  // Narysuj QR na karcie zlecenia jeśli print modal otwarty
  if (state.printModal && state.printModal.zlecenie?.qr_code) {
    setTimeout(() => {
      const canvas = document.getElementById('print-qr-canvas');
      if (!canvas) return;
      const kod = state.printModal.zlecenie.qr_code;
      const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
      fetch(url, {headers: {'x-api-key': API_KEY}})
        .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
        .then(blob => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width; canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            URL.revokeObjectURL(img.src);
          };
          img.src = URL.createObjectURL(blob);
        }).catch(() => {});
    }, 80);
  }
}


// ══════════════════════════════════════════════════════════════
//  CAMERA QR SCANNER
// ══════════════════════════════════════════════════════════════
let _qrStream = null;
let _qrAnimFrame = null;

function stopQRCamera() {
  if (_qrStream) { _qrStream.getTracks().forEach(t => t.stop()); _qrStream = null; }
  if (_qrAnimFrame) { cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
}

async function startQRCamera() {
  const video  = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-cam-canvas');
  const status = document.getElementById('qr-scan-status');
  if (!video) return;
  try {
    if (!window.jsQR) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment'}
    });
    _qrStream = stream;
    video.srcObject = stream;
    await video.play();
    if (status) status.textContent = '🔍 Skanuję...';
    const ctx = canvas.getContext('2d');
    function tick() {
      if (!document.getElementById('qr-video')) { stopQRCamera(); return; }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
        if (code && code.data) {
          stopQRCamera();
          scanQR(code.data);
          return;
        }
      }
      _qrAnimFrame = requestAnimationFrame(tick);
    }
    tick();
  } catch(err) {
    if (status) status.textContent = 'Brak dostępu do aparatu. Wpisz kod ręcznie.';
    setState({qrManualMode: true});
  }
}

// Wywoływane przez render() aby uruchomić kamerę po re-renderze
function _afterRender() {
  stopQRCamera();
  const hasCam = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  if (state.qrScanMode && !state.qrManualMode && hasCam) {
    setTimeout(startQRCamera, 120);
  }
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
// Wczytaj historię QR
state.qrLastCodes = JSON.parse(localStorage.getItem('qr_historia')||'[]');

// Załaduj info produkcji na ekran logowania
let _wh_interval = null;
async function loadWarehouseLoginInfo() {
  if (!SERVER_URL || !API_KEY) return;
  try {
    const data = await get('/api/status/produkcja');
    setState({warehouseInfo: data}, true);
    render();
  } catch(e) {
    try {
      const ops = await get('/api/operacje/zakonczone-do-transportu');
      setState({warehouseInfo: {zakonczone: ops, aktywne:[], nastepne:[], next_map:{}}}, true);
      render();
    } catch(_) {}
  }
}
function startWHRefresh() {
  loadWarehouseLoginInfo();
  if (_wh_interval) clearInterval(_wh_interval);
  _wh_interval = setInterval(loadWarehouseLoginInfo, 120000);
}
function stopWHRefresh() {
  if (_wh_interval) { clearInterval(_wh_interval); _wh_interval = null; }
}
if (SERVER_URL) startWHRefresh();

// Auto-refresh co 30s
setInterval(() => {
  if (state.screen === 'main' && !state.loading) {
    if (state.activeTab === 'majster') loadMajster();
  }
}, 30000);

render();
</script>
