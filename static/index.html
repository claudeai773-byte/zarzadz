<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1f2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚙ Produkcja</title>
<style>
  :root {
    --bg:#1a1f2e;--panel:#242938;--accent:#e8a020;
    --text:#e8eaf0;--dim:#8892a4;--border:#2e3548;
    --green:#27ae60;--red:#e74c3c;--blue:#3498db;
    --orange:#f39c12;--entry:#1e2435;--purple:#9b59b6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
  #app{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{background:var(--panel);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100;}
  .topbar h1{font-family:Consolas,monospace;font-size:18px;color:var(--accent);}
  .topbar .user-info{font-size:12px;color:var(--dim);text-align:right;line-height:1.4;}
  .logout-btn{background:var(--red);color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;}
  .content{flex:1;padding:12px;max-width:640px;margin:0 auto;width:100%;padding-bottom:80px;}
  .login-card{background:var(--panel);border-radius:16px;padding:32px 24px;margin:40px auto;max-width:380px;border:1px solid var(--border);}
  .login-card h2{color:var(--accent);font-family:Consolas,monospace;font-size:22px;text-align:center;margin-bottom:8px;}
  .login-card .subtitle{color:var(--dim);text-align:center;font-size:13px;margin-bottom:28px;}
  .field{margin-bottom:16px;}
  .field label{display:block;color:var(--dim);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .field input,.field select,.field textarea{width:100%;background:var(--entry);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;font-family:inherit;}
  select option{background:var(--panel);}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;text-align:center;}
  .btn:active{opacity:.8;}
  .btn-accent{background:var(--accent);color:#1a1f2e;}
  .btn-green{background:var(--green);color:white;}
  .btn-red{background:var(--red);color:white;}
  .btn-blue{background:var(--blue);color:white;}
  .btn-purple{background:var(--purple);color:white;}
  .btn-sm{padding:8px 14px;width:auto;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim);padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:8px;}
  .btn-row .btn{flex:1;}
  .card{background:var(--panel);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .card-title{font-weight:700;font-size:15px;color:var(--text);}
  .card-sub{color:var(--dim);font-size:12px;margin-top:2px;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .badge-green{background:rgba(39,174,96,.2);color:var(--green);}
  .badge-orange{background:rgba(243,156,18,.2);color:var(--orange);}
  .badge-red{background:rgba(231,76,60,.2);color:var(--red);}
  .badge-blue{background:rgba(52,152,219,.2);color:var(--blue);}
  .badge-dim{background:rgba(136,146,164,.15);color:var(--dim);}
  .badge-purple{background:rgba(155,89,182,.2);color:var(--purple);}
  .tabs{display:flex;background:var(--panel);border-radius:10px;padding:4px;margin-bottom:16px;gap:2px;}
  .tab{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--dim);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
  .tab.active{background:var(--accent);color:#1a1f2e;}
  .timer-card{background:linear-gradient(135deg,#1a2e1a,#1e2e1e);border:2px solid var(--green);border-radius:16px;padding:20px;text-align:center;margin-bottom:10px;}
  .timer-card.paused{border-color:var(--orange);background:linear-gradient(135deg,#2e2a1a,#2e2e1a);}
  .timer-display{font-family:Consolas,monospace;font-size:42px;font-weight:700;color:var(--green);letter-spacing:4px;margin:6px 0;}
  .timer-card.paused .timer-display{color:var(--orange);}
  .timer-label{color:var(--dim);font-size:13px;}
  .timer-op{color:var(--text);font-size:15px;font-weight:600;margin:6px 0;}
  .timer-zl{color:var(--accent);font-size:13px;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stats-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
  .stat-box{background:var(--panel);border-radius:10px;padding:14px 12px;text-align:center;border:1px solid var(--border);}
  .stat-val{font-size:26px;font-weight:700;color:var(--accent);font-family:Consolas,monospace;}
  .stat-lbl{color:var(--dim);font-size:11px;margin-top:4px;}
  .section-hdr{color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .spinner{text-align:center;padding:40px;color:var(--dim);font-size:32px;}
  .empty{text-align:center;padding:40px;color:var(--dim);font-size:14px;}
  .error-banner{background:rgba(231,76,60,.15);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:14px;}
  .alert-banner{background:rgba(243,156,18,.15);border:1px solid var(--orange);color:var(--orange);border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px;}
  .bottom-nav{background:var(--panel);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;}
  .nav-btn{flex:1;padding:8px 4px 12px;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;transition:color .2s;}
  .nav-btn .icon{font-size:20px;}
  .nav-btn.active{color:var(--accent);}
  .progress-wrap{background:var(--border);border-radius:4px;height:6px;margin:8px 0;overflow:hidden;}
  .progress-bar{height:100%;border-radius:4px;background:var(--green);transition:width .3s;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;}
  .modal{background:var(--panel);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;margin-bottom:16px;color:var(--accent);}
  .modal-close{float:right;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;margin-top:-4px;}
  .config-wrap{padding:24px 16px;max-width:420px;margin:0 auto;}
  .config-wrap h2{color:var(--accent);font-family:Consolas,monospace;margin-bottom:6px;}
  .config-wrap p{color:var(--dim);font-size:13px;margin-bottom:24px;}
  .qr-input-row{display:flex;gap:8px;}
  .qr-input-row input{flex:1;}
  .qr-preview{width:100%;border-radius:10px;background:white;padding:10px;display:flex;justify-content:center;margin-top:8px;}
  .qr-preview img{max-width:200px;max-height:200px;}
  .tag{display:inline-block;background:var(--entry);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--dim);margin:2px 2px 0 0;}
  table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.data-table th{color:var(--dim);font-weight:600;padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  table.data-table td{padding:8px 6px;border-bottom:1px solid rgba(46,53,72,.5);}
  .nieprodukcyjna-card{border-color:var(--purple) !important;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--entry);color:var(--dim);}
  .chip.active{background:var(--accent);color:#1a1f2e;border-color:var(--accent);}
  .wyd-bar-wrap{height:10px;background:var(--border);border-radius:5px;overflow:hidden;flex:1;}
  .wyd-bar{height:100%;border-radius:5px;transition:width .4s;}
  .sub-tabs{display:flex;background:var(--entry);border-radius:8px;padding:3px;margin-bottom:14px;gap:2px;}
  .sub-tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--dim);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;}
  .sub-tab.active{background:var(--accent);color:#1a1f2e;}
  @media print{
    body{background:#fff !important;color:#000 !important;}
    .no-print,.bottom-nav,.topbar,#print-overlay .btn-row{display:none !important;}
    #print-overlay{position:fixed;inset:0;background:white;z-index:9999;display:block !important;}
    .modal{border-radius:0;max-height:100vh !important;padding:16px;}
    .modal-close,.btn-row{display:none !important;}
    #print-content{box-shadow:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
let CONFIG = JSON.parse(localStorage.getItem('produkcja_config') || '{}');
let SERVER_URL = CONFIG.server_url || '';
let API_KEY    = CONFIG.api_key    || '';
const HEADERS  = () => ({'Content-Type':'application/json','x-api-key':API_KEY});

async function api(path, opts={}) {
  const url = SERVER_URL.replace(/\/$/, '') + path;
  const res = await fetch(url, {headers: HEADERS(), ...opts});
  if (!res.ok) {
    const t = await res.text().catch(() => 'Błąd serwera');
    let msg = t;
    try { msg = JSON.parse(t).detail || t; } catch(_) {}
    throw new Error(msg);
  }
  return res.json();
}
const get  = p => api(p);
const post = (p,b) => api(p, {method:'POST', body:JSON.stringify(b)});
const put  = (p,b) => api(p, {method:'PUT', body:JSON.stringify(b)});
const del  = p => api(p, {method:'DELETE'});
const patch= (p,b) => api(p, {method:'PATCH', body:JSON.stringify(b)});

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state = {
  screen: SERVER_URL ? 'login' : 'config',
  user: null,
  activeTab: 'praca',
  loading: false,
  error: null,

  // Pracownik
  operacje: [],
  aktywnesje: [],         // wiele sesji równoległych
  timers: {},             // sesja_id -> {sec, interval, paused}
  qrScanMode: false,
  qrLastCodes: [],        // historia QR

  // Majster
  majsterStats: null,
  majsterSubTab: 'live',

  // Magazynier
  transportOps: [],

  // Zlecenia
  zlecenia: [],
  zlecenieModal: null,    // null | 'new' | {edytowane zlecenie}
  operacjeModal: null,    // {zlecenie} | null
  zlecenieKoszty: null,

  // Admin
  adminTab: 'uzytkownicy',
  users: [],
  stawki: [],
  katalog: [],
  userModal: null,
  stawkaModal: null,
  produktModal: null,

  // Modal stop/pauza
  stopModal: null,        // null | {sesja}
  pauzaModal: null,
  nieprodukcyjnaModal: false,

  // QR gen
  qrGenModal: false,
  qrGenKod: '',
  qrGenTitle: '',
  qrZleceniePickerModal: null,

  // Pracownik wydajność
  pracaSubTab: 'praca',   // praca | wydajnosc
  pracaWydajnosc: null,
  pracaWydOkres: 'tydzien',

  // Majster wydajność
  wydajnoscMajster: null,
  wydajnoscOkres: 'dzis',
  majsterExpandedUser: null,

  // Print modal
  printModal: null,
  printOps: [],
};

function setState(p, noRender) {
  state = {...state, ...p};
  if (!noRender) render();
}

// ══════════════════════════════════════════════════════════════
//  TIMERS (multi-sesja)
// ══════════════════════════════════════════════════════════════
function startTimerFor(sesja) {
  if (state.timers[sesja.id]?.interval) clearInterval(state.timers[sesja.id].interval);
  const isPaused = () => {
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
  };
  const update = () => {
    const el = document.getElementById('timer-'+sesja.id);
    if (!el) return;
    const paused = isPaused();
    // calc elapsed minus pauses
    const start = new Date(sesja.start_time);
    let elapsed = Math.floor((Date.now() - start) / 1000);
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    for (const p of pauzy) {
      if (p.koniec) {
        elapsed -= Math.floor((new Date(p.koniec) - new Date(p.start)) / 1000);
      } else {
        elapsed -= Math.floor((Date.now() - new Date(p.start)) / 1000);
      }
    }
    el.textContent = fmtTime(Math.max(0,elapsed));
    el.style.color = paused ? 'var(--orange)' : 'var(--green)';
  };
  update();
  const interval = setInterval(update, 1000);
  state.timers[sesja.id] = {interval, sesja};
}

function stopAllTimers() {
  for (const t of Object.values(state.timers)) {
    if (t.interval) clearInterval(t.interval);
  }
  state.timers = {};
}

function fmtTime(sec) {
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function isPaused(sesja) {
  const pauzy = JSON.parse(sesja.pauzy || '[]');
  return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
}

// ══════════════════════════════════════════════════════════════
//  DATA LOADERS
// ══════════════════════════════════════════════════════════════
async function loadPracownik() {
  setState({loading:true, error:null});
  try {
    const [ops, sesje] = await Promise.all([
      get('/api/operacje/aktywne'),
      get(`/api/sesje/aktywne/${state.user.id}`),
    ]);
    stopAllTimers();
    for (const s of sesje) startTimerFor(s);
    setState({operacje:ops, aktywnesje:sesje, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadMajster() {
  setState({loading:true, error:null});
  try {
    const stats = await get('/api/stats/majster');
    setState({majsterStats:stats, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadMagazynier() {
  setState({loading:true, error:null});
  try {
    const ops = await get('/api/operacje/zakonczone-do-transportu');
    setState({transportOps:ops, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadZlecenia() {
  setState({loading:true, error:null});
  try {
    const zl = await get('/api/zlecenia');
    setState({zlecenia:zl, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadAdmin() {
  setState({loading:true, error:null});
  try {
    const [users, stawki, katalog] = await Promise.all([
      get('/api/users'), get('/api/stawki'), get('/api/katalog')
    ]);
    setState({users, stawki, katalog, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadPracownikWydajnosc(okres) {
  const o = okres || state.pracaWydOkres;
  setState({pracaWydOkres: o});
  try {
    const w = await get(`/api/stats/wydajnosc/${state.user.id}?okres=${o}`);
    setState({pracaWydajnosc: w});
  } catch(e) { alert(e.message); }
}

async function loadWydajnoscMajster(okres) {
  const o = okres || state.wydajnoscOkres;
  setState({wydajnoscOkres: o});
  try {
    const w = await get(`/api/stats/wydajnosc?okres=${o}`);
    setState({wydajnoscMajster: w});
  } catch(e) { alert(e.message); }
}

// ══════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════
async function doLogin(username, password) {
  setState({loading:true, error:null});
  try {
    const user = await post('/api/login', {username, password});
    const tab = defaultTab(user.role);
    setState({user, screen:'main', loading:false, activeTab:tab});
    loadTabData(tab);
  } catch(e) {
    setState({loading:false, error:'Nieprawidłowy login lub hasło'});
  }
}

function defaultTab(role) {
  if (role === 'magazynier') return 'magazyn';
  if (role === 'majster')    return 'majster';
  if (role === 'admin')      return 'admin';
  return 'praca';
}

async function startSesja(operacjaId) {
  try {
    await post('/api/sesje/start', {operacja_id:operacjaId, user_id:state.user.id, typ:'operacja'});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function startNieprodukcyjna(opis) {
  try {
    await post('/api/sesje/start', {user_id:state.user.id, typ:'nieprodukcyjna', opis_nieprodukcyjnej:opis});
    setState({nieprodukcyjnaModal:false});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function togglePauza(sesja) {
  try {
    const paused = isPaused(sesja);
    if (paused) {
      await post('/api/sesje/pauza/stop', {sesja_id:sesja.id});
    } else {
      await post('/api/sesje/pauza/start', {sesja_id:sesja.id, powod:''});
    }
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function stopSesja(sesjaId, ilosc, uwagi) {
  try {
    await post('/api/sesje/stop', {sesja_id:sesjaId, ilosc_sztuk:parseInt(ilosc)||0, uwagi:uwagi||''});
    setState({stopModal:null});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function scanQR(kod) {
  if (!kod.trim()) return;
  try {
    const res = await get('/api/scan/' + encodeURIComponent(kod.trim()));
    // dodaj do historii
    const hist = [kod.trim(), ...state.qrLastCodes.filter(c=>c!==kod.trim())].slice(0,10);
    setState({qrLastCodes: hist, qrScanMode:false});
    localStorage.setItem('qr_historia', JSON.stringify(hist));
    showQRResult(res);
  } catch(e) {
    alert('Nie znaleziono kodu QR: ' + kod);
  }
}

function showQRResult(res) {
  if (res.type === 'operacja') {
    const op = res.data;
    if (confirm(`Operacja: ${op.nazwa}\nZlecenie: ${op.zl_numer}\nStatus: ${op.status}\n\nRozpocząć tę operację?`)) {
      startSesja(op.id);
    }
  } else if (res.type === 'zlecenie') {
    setState({qrZleceniePickerModal: {zlecenie: res.data, operacje: res.operacje}});
  }
}

function renderQRZleceniePickerModal() {
  const m = state.qrZleceniePickerModal;
  if (!m) return '';
  const z = m.zlecenie;
  const ops = m.operacje || [];
  const dostepne = ops.filter(o => o.status !== 'zakonczone' && o.status !== 'anulowane');
  let html = `
  <div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="setState({qrZleceniePickerModal:null})">×</button>
      <h3>📋 ${z.numer}</h3>
      <div style="color:var(--dim);font-size:13px;margin-bottom:16px">${z.nazwa}</div>`;
  if (!dostepne.length) {
    html += `<div class="empty">Brak dostępnych operacji do rozpoczęcia</div>`;
  } else {
    html += `<div style="color:var(--dim);font-size:12px;margin-bottom:10px">Wybierz operację do rozpoczęcia:</div>`;
    dostepne.forEach(op => {
      const czyAktywna = (state.aktywnesje||[]).some(s => s.operacja_id === op.id);
      html += `
      <div class="card" style="padding:12px;margin-bottom:8px;cursor:${czyAktywna?'default':'pointer'}"
           ${czyAktywna?'':'onclick="pickOperacjaFromQR('+op.id+')"'}>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600">${op.kolejnosc}. ${op.nazwa}</div>
            <div style="font-size:12px;color:var(--dim)">${op.stanowisko||'—'}${op.czas_norma?' | norma: '+op.czas_norma+' min':''}</div>
          </div>
          <div>
            ${czyAktywna
              ? `<span class="badge badge-yellow">▶ W toku</span>`
              : `<span class="badge" style="background:var(--accent);color:#000">${statusBadge_txt(op.status)}</span>`}
          </div>
        </div>
      </div>`;
    });
  }
  html += `
      <button class="btn btn-outline" style="margin-top:8px" onclick="setState({qrZleceniePickerModal:null})">Anuluj</button>
    </div>
  </div>`;
  return html;
}

function statusBadge_txt(s) {
  const m = {nowe:'Nowe', w_toku:'W toku', zakonczone:'Zakończone', oczekuje:'Oczekuje', anulowane:'Anulowane'};
  return m[s]||s;
}

async function pickOperacjaFromQR(opId) {
  setState({qrZleceniePickerModal:null});
  await startSesja(opId);
}

function loadTabData(tab) {
  if (tab==='praca')    loadPracownik();
  if (tab==='majster')  loadMajster();
  if (tab==='magazyn')  loadMagazynier();
  if (tab==='zlecenia') loadZlecenia();
  if (tab==='admin')    loadAdmin();
}

function switchTab(tab) {
  setState({activeTab:tab, error:null});
  loadTabData(tab);
}

function logout() {
  // Modal potwierdzenia dla magazyniera
  if (state.user?.role === 'magazynier' && state.transportOps.length > 0) {
    const n = state.transportOps.length;
    if (!confirm(`⚠ Uwaga!\n\nMasz ${n} operacji czekających na transport.\nCzy na pewno chcesz się wylogować?`)) return;
  }
  stopAllTimers();
  setState({user:null, screen:'login', aktywnesje:[], operacje:[], timers:{}});
}

async function saveZlecenie(data) {
  try {
    if (data.id) {
      await put(`/api/zlecenia/${data.id}`, data);
    } else {
      await post('/api/zlecenia', data);
    }
    setState({zlecenieModal:null});
    await loadZlecenia();

    alert('Błąd: ' + e.message);

  if (!confirm('Usunąć zlecenie i wszystkie jego operacje?')) return;
  try {
    await del(`/api/zlecenia/${id}`);
    await loadZlecenia();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function changeZlecenieStatus(id, status) {
  try {

    await loadZlecenia();

    alert('Błąd: ' + e.message);
  }
}

function statusBadge(s) {
  const map = {
    'w_toku':    ['badge-orange','🔄 w toku'],
    'oczekuje':  ['badge-dim',   '⏳ oczekuje'],
    'zakonczona':['badge-green', '✅ ukończona'],

    'nowe':      ['badge-blue',  '🆕 nowe'],
    'anulowane': ['badge-red',   '❌ anulowane'],
  };
  const [cls, label] = map[s] || ['badge-dim', s];
  return `<span class="badge ${cls}">${label}</span>`;
}
function roleName(r) {
  return {admin:'Administrator',technolog:'Technolog',pracownik:'Pracownik',
          magazynier:'Magazynier',majster:'Majster'}[r] || r;

function fmtPLN(n) { return (n||0).toFixed(2)+' zł'; }
function fmtDate(d) { return d ? d.substring(0,10) : '—'; }

function renderPraca() {
  if (state.loading) return '<div class="spinner">⏳</div>';

  </div>`;

  if (state.pracaSubTab === 'wydajnosc') return html + renderPracaWydajnosc();
  return html + renderPracaGlowna();
}

function switchPracaTab(tab) {
  setState({pracaSubTab: tab}, true);
  if (tab === 'wydajnosc' && !state.pracaWydajnosc) {
    loadPracownikWydajnosc(state.pracaWydOkres);
  }
  render();
}

function renderPracaWydajnosc() {
  const w = state.pracaWydajnosc;
  const okres = state.pracaWydOkres;
  const okresLabels = {dzis:'Dziś', tydzien:'7 dni', miesiac:'30 dni'};

  let html = `
  <div class="chip-row">
    ${Object.entries(okresLabels).map(([k,v]) =>
      `<div class="chip ${okres===k?'active':''}" onclick="loadPracownikWydajnosc('${k}')">${v}</div>`
    ).join('')}
  </div>`;

  if (!w) {
    html += `<div class="empty">⏳ Ładowanie wydajności...</div>`;
    return html;
  }

  const wydPct = w.normy_total > 0 ? Math.round(w.normy_ok/w.normy_total*100) : null;
  const barColor = wydPct === null ? 'var(--dim)' : wydPct >= 90 ? 'var(--green)' : wydPct >= 70 ? 'var(--orange)' : 'var(--red)';

  html += `
  <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:14px">
    <div class="stat-box"><div class="stat-val">${w.sesji}</div><div class="stat-lbl">Sesji</div></div>
    <div class="stat-box"><div class="stat-val">${w.sztuki}</div><div class="stat-lbl">Sztuk</div></div>
    <div class="stat-box"><div class="stat-val">${w.godz}h</div><div class="stat-lbl">Godz.</div></div>
  </div>`;

  if (wydPct !== null) {
    html += `
    <div class="card" style="margin-bottom:14px;border-color:${barColor}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--dim)">Realizacja norm (${w.normy_ok}/${w.normy_total})</span>
        <span style="font-weight:700;color:${barColor};font-size:18px">${wydPct}%</span>
      </div>
      <div class="wyd-bar-wrap"><div class="wyd-bar" style="width:${wydPct}%;background:${barColor}"></div></div>
    </div>`;
  }

  html += `<div class="section-hdr">Historia sesji (${w.sesje.length})</div>`;
  if (!w.sesje.length) {
    html += `<div class="empty">Brak danych za wybrany okres</div>`;
  } else {
    w.sesje.forEach(s => {
      const wPct = s.wyd_pct;
      const wColor = wPct===null ? 'var(--dim)' : wPct>=90 ? 'var(--green)' : wPct>=70 ? 'var(--orange)' : 'var(--red)';
      html += `
      <div class="card" style="padding:10px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-weight:600;font-size:13px">${s.op_nazwa}</div>
            <div style="font-size:11px;color:var(--dim)">📋 ${s.zl_numer} | 🏭 ${s.stanowisko||'—'}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px">
              ⏱ ${s.czas_min} min${s.norma_min ? ' | norma: '+s.norma_min+' min' : ''} | 📦 ${s.ilosc_sztuk} szt.
            </div>
          </div>
          ${wPct !== null ? `
          <div style="text-align:right">
            <div style="font-weight:700;font-size:18px;color:${wColor}">${wPct}%</div>
            <div style="font-size:10px;color:var(--dim)">normy</div>
          </div>` : ''}
        </div>
        ${wPct !== null ? `
        <div class="wyd-bar-wrap" style="margin-top:6px">
          <div class="wyd-bar" style="width:${Math.min(100,wPct)}%;background:${wColor}"></div>
        </div>` : ''}
      </div>`;
    });
  }

  html += `<button class="btn-outline" style="margin-top:8px" onclick="loadPracownikWydajnosc()">🔄 Odśwież</button>`;
  return html;
}

function renderPracaGlowna() {

  if (state.qrScanMode) {
    const hist = JSON.parse(localStorage.getItem('qr_historia')||'[]');
    html += `
    <div class="card" style="border-color:var(--blue)">
      <div class="section-hdr" style="margin-bottom:12px">📷 Skaner QR</div>
      <div class="qr-input-row field" style="margin-bottom:10px">
        <input id="qr-input" type="text" placeholder="Skanuj lub wpisz kod QR"
               autofocus onkeydown="if(event.key==='Enter')scanQR(this.value)">
        <button class="btn-sm btn-accent" onclick="scanQR(document.getElementById('qr-input').value)">▶</button>
      </div>
      ${hist.length ? `
      <div class="section-hdr">Historia QR</div>
      ${hist.map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <span class="tag">${c}</span>
          <button class="btn-sm btn-blue" onclick="scanQR('${c}')">Użyj</button>

      ` : ''}
      <button class="btn-outline" style="margin-top:10px" onclick="setState({qrScanMode:false})">✕ Zamknij</button>
    </div>`;
  } else {
    html += `
    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn btn-blue" onclick="setState({qrScanMode:true})">📷 Skanuj QR</button>
      <button class="btn btn-purple" onclick="setState({nieprodukcyjnaModal:true})">⏸ Nieprodukcyjna</button>
    </div>`;
  }

  // Aktywne sesje (wielokrotne)
  if (state.aktywnesje.length) {
    html += `<div class="section-hdr">⏱ Aktywne sesje (${state.aktywnesje.length})</div>`;
    state.aktywnesje.forEach(sesja => {
      const paused = isPaused(sesja);
      const isNieprod = sesja.typ === 'nieprodukcyjna';
      html += `
      <div class="timer-card ${paused?'paused':''} ${isNieprod?'nieprodukcyjna-card':''}">
        <div class="timer-label">${isNieprod ? '⏸ PRACA NIEPRODUKCYJNA' : (paused ? '⏸ PAUZA' : '⏱ AKTYWNA')}</div>
        <div class="timer-display" id="timer-${sesja.id}">00:00:00</div>
        <div class="timer-op">${sesja.op_nazwa || sesja.uwagi || '—'}</div>
        ${sesja.zl_numer ? `<div class="timer-zl">📋 ${sesja.zl_numer} – ${sesja.zl_nazwa}</div>` : ''}
        <div style="color:var(--dim);font-size:12px;margin:4px 0 12px">${sesja.stanowisko||''}</div>
        <div class="btn-row">
          ${!isNieprod ? `<button class="btn ${paused?'btn-green':'btn-accent'}" onclick="togglePauza(${JSON.stringify(sesja).replace(/"/g,'&quot;')})">
            ${paused ? '▶ Wznów' : '⏸ Pauza'}
          </button>` : ''}
          <button class="btn btn-red" onclick="setState({stopModal:${JSON.stringify(sesja).replace(/"/g,'&quot;')}})">
            ⏹ Zakończ
          </button>
        </div>
      </div>`;
    });
  } else {
    html += `
    <div class="card" style="text-align:center;padding:20px">
      <div style="font-size:36px;margin-bottom:8px">⏸</div>
      <div style="color:var(--dim);font-size:14px">Brak aktywnej sesji</div>
    </div>`;
  }

  // Lista operacji
  html += `<div class="section-hdr" style="margin-top:4px">Dostępne operacje</div>`;
  if (!state.operacje.length) {
    html += `<div class="empty">✅ Brak operacji do wykonania</div>`;
  } else {
    state.operacje.forEach(op => {
      const jestAktywna = state.aktywnesje.some(s => s.operacja_id === op.id);
      const prog = op.ilosc_sztuk > 0 ? Math.min(100, Math.round((op.ilosc_wykonana/op.ilosc_sztuk)*100)) : 0;
      html += `
      <div class="card" style="${jestAktywna?'border-color:var(--green)':''}">
        <div class="card-header">
          <div>
            <div class="card-title">${op.kolejnosc}. ${op.nazwa}</div>
            <div class="card-sub">📋 ${op.zl_numer} – ${op.zl_nazwa}</div>
            <div class="card-sub">🏭 ${op.stanowisko||'—'} ${op.czas_norma ? `⏱ norma: ${op.czas_norma}min` : ''}</div>
          </div>
          ${statusBadge(op.status)}
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${prog}%;background:${prog>=100?'var(--green)':'var(--accent)'}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--dim)">${op.ilosc_wykonana}/${op.ilosc_sztuk} szt. (${prog}%)</span>
          ${!jestAktywna && op.status !== 'zakonczona' ? `
          <button class="btn-sm btn-green" onclick="startSesja(${op.id})">▶ Start</button>` : ''}
          ${jestAktywna ? `<span style="color:var(--green);font-size:12px">● AKTYWNA</span>` : ''}
        </div>
      </div>`;
    });
  }

  html += `<button class="btn-outline" style="margin-top:8px" onclick="loadPracownik()">🔄 Odśwież</button>`;

  // Modal stop
  if (state.stopModal) {
    const s = state.stopModal;
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({stopModal:null})">×</button>
        <h3>⏹ Zakończ sesję</h3>
        <p style="color:var(--dim);font-size:13px;margin-bottom:16px">${s.op_nazwa || s.uwagi || '—'}</p>
        ${s.typ !== 'nieprodukcyjna' ? `
        <div class="field">
          <label>Liczba wykonanych sztuk</label>
          <input type="number" id="stop-ilosc" value="1" min="0">
        </div>` : ''}
        <div class="field">
          <label>Uwagi</label>
          <textarea id="stop-uwagi" placeholder="opcjonalnie..."></textarea>
        </div>
        <button class="btn btn-red" onclick="stopSesja(${s.id}, document.getElementById('stop-ilosc')?.value||0, document.getElementById('stop-uwagi').value)">
          ✅ Potwierdź zakończenie
        </button>
      </div>
    </div>`;
  }

  // Modal nieprodukcyjna
  if (state.nieprodukcyjnaModal) {
    const opcje = ['Awaria maszyny','Brak materiału','Szkolenie','Spotkanie','Przerwa obiadowa','Sprzątanie','Inne'];
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({nieprodukcyjnaModal:false})">×</button>
        <h3>⏸ Praca nieprodukcyjna</h3>
        <div class="chip-row">
          ${opcje.map(o => `<div class="chip" onclick="document.getElementById('np-opis').value='${o}'">${o}</div>`).join('')}
        </div>
        <div class="field">
          <label>Opis</label>
          <input id="np-opis" type="text" placeholder="Co się dzieje?">
        </div>
        <button class="btn btn-purple" onclick="startNieprodukcyjna(document.getElementById('np-opis').value)">
          ▶ Rozpocznij rejestrację
        </button>
      </div>
    </div>`;
  }

  return html;
}

  if (state.majsterSubTab === 'live') {
    html += `
    <div class="stats-grid-3">
      <div class="stat-box"><div class="stat-val">${stats.aktywne_sesje.length}</div><div class="stat-lbl">online</div></div>
      <div class="stat-box"><div class="stat-val">${stats.dzis_sztuk}</div><div class="stat-lbl">sztuk dziś</div></div>
      <div class="stat-box"><div class="stat-val">${(stats.dzis_godz||0).toFixed(1)}</div><div class="stat-lbl">godz. dziś</div></div>
    </div>
    <div class="section-hdr">🟢 Pracownicy aktywni</div>`;
    if (!stats.aktywne_sesje.length) {
      html += `<div class="empty" style="padding:20px">Brak aktywnych sesji</div>`;
    } else {
      stats.aktywne_sesje.forEach(s => {
        const elapsed = Math.floor((Date.now() - new Date(s.start_time))/1000);
        const pauzList = JSON.parse(s.pauzy||'[]');
        const hasPauza = pauzList.length > 0 && !pauzList[pauzList.length-1].koniec;
        html += `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">👤 ${s.full_name} ${hasPauza?'<span class="badge badge-orange">PAUZA</span>':''}</div>
              <div class="card-sub">${s.typ==='nieprodukcyjna'?'⏸ Nieprodukcyjna':'🔧 '+s.op_nazwa}</div>
              ${s.zl_numer?`<div class="card-sub">📋 ${s.zl_numer} – ${s.zl_nazwa}</div>`:''}
            </div>
            <div style="text-align:right">
              <div style="font-family:Consolas;color:var(--green);font-size:16px">${fmtTime(elapsed)}</div>
              ${s.czas_norma?`<div style="font-size:11px;color:var(--dim)">norma: ${s.czas_norma}min</div>`:''}
            </div>
          </div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'zlecenia') {
    html += `<div class="section-hdr">📋 Zlecenia w toku</div>`;
    if (!stats.zlecenia.length) {
      html += `<div class="empty">Brak aktywnych zleceń</div>`;
    } else {
      stats.zlecenia.forEach(z => {
        const prog = z.op_total > 0 ? Math.round((z.op_done/z.op_total)*100) : 0;
        const sztProg = z.ilosc_sztuk > 0 ? Math.round(((z.sztuki_wykonane||0)/z.ilosc_sztuk)*100) : 0;
        const przeterminowane = z.termin && new Date(z.termin) < new Date();
        html += `
        <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
          <div class="card-header">
            <div>
              <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">TERMIN!</span>':''}</div>
              <div class="card-sub">${z.nazwa}</div>
              ${z.termin?`<div class="card-sub">📅 Termin: ${fmtDate(z.termin)}</div>`:''}
            </div>
            ${statusBadge(z.status)}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px">
            <span>Operacje: ${z.op_done}/${z.op_total}</span><span>${prog}%</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${prog}%;background:${prog>=100?'var(--green)':'var(--accent)'}"></div>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">
            Sztuki: ${z.sztuki_wykonane||0}/${z.ilosc_sztuk} (${sztProg}%)
          </div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'koszty') {
    html += `<div class="section-hdr">💰 Koszty pracowników dziś</div>`;
    const koszty = stats.koszty_dzis || [];
    if (!koszty.length) {
      html += `<div class="empty">Brak danych</div>`;
    } else {
      let total = 0;
      html += `<table class="data-table"><thead><tr><th>Pracownik</th><th>Stanowisko</th><th>Godz.</th><th>Koszt</th></tr></thead><tbody>`;
      koszty.forEach(k => {
        const koszt = k.koszt || 0;
        total += koszt;
        html += `<tr>
          <td>${k.full_name}</td>
          <td style="font-size:11px">${k.stanowisko||'—'}</td>
          <td>${(k.godz||0).toFixed(1)}</td>
          <td style="color:var(--accent)">${fmtPLN(koszt)}</td>
        </tr>`;
      });
      html += `</tbody></table>
      <div class="card" style="margin-top:10px;text-align:center">
        <div style="font-size:12px;color:var(--dim)">ŁĄCZNIE DZIŚ</div>
        <div style="font-size:28px;font-weight:700;color:var(--accent)">${fmtPLN(total)}</div>
      </div>`;
    }
  }

  if (state.majsterSubTab === 'alerty') {
    const alerty = stats.alerty_norm || [];
    html += `<div class="section-hdr">⚠ Alerty norm (${alerty.length})</div>`;
    if (!alerty.length) {
      html += `<div class="card" style="text-align:center;padding:20px;border-color:var(--green)">
        <div style="font-size:32px">✅</div>
        <div style="color:var(--green);margin-top:8px">Wszystkie operacje w normie</div>
      </div>`;
    } else {
      alerty.forEach(a => {
        html += `
        <div class="alert-banner">
          <div style="font-weight:700">⚠ ${a.pracownik}</div>
          <div>${a.operacja} | ${a.zlecenie}</div>
          <div>Norma: ${a.norma_min} min | Czas: ${a.elapsed_min} min | <strong>+${a.przekroczenie_pct}%</strong></div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'wydajnosc') {
    html += renderMajsterWydajnosc();
  }

  if (state.majsterSubTab === 'podsumowanie') {
    html += renderMajsterPodsumowanie(stats);
  }

  html += `<button class="btn-outline no-print" style="margin-top:8px" onclick="loadMajster()">🔄 Odśwież</button>`;
  return html;
}

function switchMajsterTab(tab) {
  setState({majsterSubTab: tab}, true);
  if (tab === 'wydajnosc' && !state.wydajnoscMajster) {
    loadWydajnoscMajster(state.wydajnoscOkres);
  }
  render();
}

function renderMajsterPodsumowanie(stats) {
  const zlecenia = (stats?.zlecenia || []);
  const wszystkie = state.zlecenia || [];
  const aktywne = zlecenia;
  const zakonczone = wszystkie.filter(z => z.status === 'zakonczone');
  const anulowane = wszystkie.filter(z => z.status === 'anulowane');

  let html = `
  <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-bottom:14px">
    <div class="stat-box"><div class="stat-val" style="color:var(--blue)">${aktywne.length}</div><div class="stat-lbl">Aktywnych</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${zakonczone.length}</div><div class="stat-lbl">Zakończonych</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${anulowane.length}</div><div class="stat-lbl">Anulowanych</div></div>
    <div class="stat-box"><div class="stat-val">${stats.dzis_sztuk||0}</div><div class="stat-lbl">Sztuk dziś</div></div>
  </div>
  <div class="section-hdr">📋 Wszystkie aktywne zlecenia – szczegóły</div>`;

  if (!aktywne.length) {
    html += `<div class="empty">Brak aktywnych zleceń</div>`;
  } else {
    aktywne.forEach(z => {
      const prog = z.op_total > 0 ? Math.round((z.op_done/z.op_total)*100) : 0;
      const sztProg = z.ilosc_sztuk > 0 ? Math.round(((z.sztuki_wykonane||0)/z.ilosc_sztuk)*100) : 0;
      const przeterminowane = z.termin && new Date(z.termin) < new Date();
      const wartość = (z.cena_brutto_szt||0) * (z.ilosc_sztuk||0);

      html += `
      <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
        <div class="card-header">
          <div>
            <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">⚠ TERMIN</span>':''}</div>
            <div class="card-sub">${z.nazwa}</div>
            ${z.termin?`<div class="card-sub">📅 Termin: ${fmtDate(z.termin)}</div>`:''}
          </div>
          ${statusBadge(z.status)}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin:8px 0">
          <span style="color:var(--dim)">Operacje</span>
          <span>${z.op_done||0}/${z.op_total||0} (${prog}%)</span>
          <span style="color:var(--dim)">Sztuki</span>
          <span>${z.sztuki_wykonane||0}/${z.ilosc_sztuk} (${sztProg}%)</span>
          ${wartość ? `<span style="color:var(--dim)">Wartość</span><span style="color:var(--accent)">${fmtPLN(wartość)}</span>` : ''}
        </div>
        <div style="margin-bottom:4px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:2px">
            <span>Operacje</span><span>${prog}%</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${prog}%;background:${prog>=100?'var(--green)':'var(--accent)'}"></div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:2px">
            <span>Sztuki</span><span>${sztProg}%</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${sztProg}%;background:${sztProg>=100?'var(--green)':'var(--blue)'}"></div>
          </div>
        </div>
      </div>`;
    });
  }
  return html;
}

function renderMajsterWydajnosc() {
  const w = state.wydajnoscMajster;
  const okres = state.wydajnoscOkres;
  const okresLabels = {dzis:'Dziś', tydzien:'7 dni', miesiac:'30 dni'};

  let html = `
  <div class="chip-row">
    ${Object.entries(okresLabels).map(([k,v]) =>
      `<div class="chip ${okres===k?'active':''}" onclick="loadWydajnoscMajster('${k}')">${v}</div>`
    ).join('')}
  </div>`;

  if (!w) {
    html += `<div class="empty">⏳ Ładowanie danych wydajności...</div>`;
    return html;
  }

  if (!w.pracownicy.length) {
    html += `<div class="empty">Brak danych za wybrany okres</div>`;
    return html;
  }

  html += `<div class="section-hdr">🏆 Ranking pracowników – ${okresLabels[okres]}</div>`;

  w.pracownicy.forEach((p, idx) => {
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const wydPct = p.normy_total > 0 ? Math.round(p.normy_ok/p.normy_total*100) : null;
    const barColor = wydPct===null ? 'var(--dim)' : wydPct>=90 ? 'var(--green)' : wydPct>=70 ? 'var(--orange)' : 'var(--red)';
    const expanded = state.majsterExpandedUser === p.user_id;

    html += `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer"
           onclick="setState({majsterExpandedUser: ${expanded ? 'null' : p.user_id}})">
        <div>
          <div style="font-weight:700">${medal} ${p.full_name}</div>
          <div style="font-size:12px;color:var(--dim)">
            ${p.sesji} sesji | ${p.sztuki} szt. | ${p.godz}h
            ${wydPct!==null ? ` | normy: <span style="color:${barColor}">${wydPct}%</span>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${wydPct !== null ? `
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700;color:${barColor}">${wydPct}%</div>
            <div style="font-size:10px;color:var(--dim)">${p.normy_ok}/${p.normy_total} norm</div>
          </div>` : ''}
          <span style="color:var(--dim)">${expanded?'▲':'▼'}</span>
        </div>
      </div>
      ${wydPct !== null ? `
      <div class="wyd-bar-wrap" style="margin-top:8px">
        <div class="wyd-bar" style="width:${wydPct}%;background:${barColor}"></div>
      </div>` : ''}
      ${expanded && p.sesje.length ? `
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Ostatnie sesje:</div>
        ${p.sesje.slice(0,10).map(s => {
          const wColor = s.wyd_pct===null ? 'var(--dim)' : s.wyd_pct>=90 ? 'var(--green)' : s.wyd_pct>=70 ? 'var(--orange)' : 'var(--red)';
          return `
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(46,53,72,.3)">
            <div>
              <span>${s.op_nazwa}</span>
              <span style="color:var(--dim)"> | ${s.zl_numer} | ${s.ilosc_sztuk} szt.</span>
            </div>
            <div style="text-align:right">
              <span style="color:var(--dim)">${s.czas_min}min</span>
              ${s.wyd_pct!==null?`<span style="color:${wColor};margin-left:6px;font-weight:700">${s.wyd_pct}%</span>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  });

  return html;
}

// ══════════════════════════════════════════════════════════════
//  TAB: MAGAZYN
// ══════════════════════════════════════════════════════════════
function renderMagazyn() {
  if (state.loading) return '<div class="spinner">⏳</div>';
  let html = `<div class="section-hdr">📦 Operacje zakończone – do transportu (${state.transportOps.length})</div>`;
  if (!state.transportOps.length) {
    html += `<div class="card" style="text-align:center;padding:30px">
      <div style="font-size:40px;margin-bottom:10px">✅</div>
      <div style="color:var(--green);font-size:16px;font-weight:600">Brak operacji do transportu</div>
    </div>`;
  } else {
    state.transportOps.forEach(op => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${op.kolejnosc}. ${op.nazwa}</div>
            <div class="card-sub">📋 ${op.zl_numer} – ${op.zl_nazwa}</div>
          </div>
          <span class="badge badge-green">✅ ukończona</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin-top:6px">
          <span style="color:var(--dim)">🏭 Stanowisko</span><span>${op.stanowisko||'—'}</span>
          <span style="color:var(--dim)">📦 Wykonano</span><span style="color:var(--green);font-weight:600">${op.ilosc_wykonana}/${op.ilosc_sztuk} szt.</span>
        </div>
      </div>`;
    });
  }
  html += `<button class="btn-outline" style="margin-top:8px" onclick="loadMagazynier()">🔄 Odśwież</button>`;
  return html;
}

// ══════════════════════════════════════════════════════════════
//  TAB: ZLECENIA (planowanie)
// ══════════════════════════════════════════════════════════════
function renderZlecenia() {
  if (state.loading) return '<div class="spinner">⏳</div>';

  const role = state.user?.role;
  const canEdit = ['admin','technolog','majster'].includes(role);

  let html = '';
  if (canEdit) {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({zlecenieModal:{}})">+ Nowe zlecenie</button>`;
  }

  const zl = state.zlecenia || [];
  if (!zl.length) {
    html += `<div class="empty">Brak zleceń</div>`;
  } else {
    zl.forEach(z => {
      const przeterminowane = z.termin && new Date(z.termin) < new Date() && z.status !== 'zakonczone';
      html += `
      <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
        <div class="card-header">
          <div>
            <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">TERMIN!</span>':''}</div>
            <div class="card-sub">${z.nazwa}</div>
            ${z.termin ? `<div class="card-sub">📅 ${fmtDate(z.termin)}</div>` : ''}
            <div class="card-sub">📦 ${z.ilosc_sztuk} szt. ${z.cena_brutto_szt ? '| '+fmtPLN(z.cena_brutto_szt)+'/szt' : ''}</div>
          </div>
          ${statusBadge(z.status)}
        </div>
        ${canEdit ? `
        <div class="btn-row" style="margin-top:8px;flex-wrap:wrap;gap:6px">
          <button class="btn-sm btn-blue" onclick="setState({zlecenieModal:${JSON.stringify(z).replace(/"/g,'&quot;')}})">✏ Edytuj</button>
          <button class="btn-sm btn-accent" onclick="openOperacje(${JSON.stringify(z).replace(/"/g,'&quot;')})">🔧 Operacje</button>
          <button class="btn-sm btn-green" onclick="loadKoszty(${z.id})">💰 Koszty</button>
          <select style="background:var(--entry);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px"
                  onchange="changeZlecenieStatus(${z.id},this.value);this.value='${z.status}'">
            <option value="${z.status}" disabled selected>▶ Status</option>
            <option value="nowe">nowe</option>
            <option value="w_toku">w_toku</option>
            <option value="zakonczone">zakonczone</option>
            <option value="anulowane">anulowane</option>
          </select>
          <button class="btn-sm btn-accent" onclick="showQRForZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">📷 QR</button>
          <button class="btn-sm btn-green" onclick="printZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">🖨 Karta</button>
          <button class="btn-sm btn-red" onclick="deleteZlecenie(${z.id})">🗑</button>
        </div>` : ''}
      </div>`;
    });
  }

  // Modal QR gen
  html += renderQRGenModal();

  // Modal drukuj kartę
  html += renderPrintModal();

  // Modal zlecenie
  if (state.zlecenieModal !== null) {
    const z = state.zlecenieModal;
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({zlecenieModal:null})">×</button>
        <h3>${z.id ? '✏ Edytuj zlecenie' : '+ Nowe zlecenie'}</h3>
        <div class="field"><label>Numer</label><input id="zl-numer" type="text" value="${z.numer||''}"></div>
        <div class="field"><label>Nazwa</label><input id="zl-nazwa" type="text" value="${z.nazwa||''}"></div>
        <div class="field"><label>Opis</label><textarea id="zl-opis">${z.opis||''}</textarea></div>
        <div class="field"><label>Termin</label><input id="zl-termin" type="date" value="${z.termin||''}"></div>
        <div class="field"><label>Ilość sztuk</label><input id="zl-ilosc" type="number" value="${z.ilosc_sztuk||1}" min="1"></div>
        <div class="field"><label>Cena brutto/szt (zł)</label><input id="zl-cena" type="number" step="0.01" value="${z.cena_brutto_szt||0}"></div>
        <div class="field">
          <label>Materiał od klienta</label>
          <select id="zl-mat">
            <option value="0" ${!z.material_od_klienta?'selected':''}>Nie</option>
            <option value="1" ${z.material_od_klienta?'selected':''}>Tak</option>
          </select>
        </div>
        <button class="btn btn-accent" onclick="saveZlecenieForm(${z.id||0})">💾 Zapisz</button>
      </div>
    </div>`;
  }

  // Modal operacje
  if (state.operacjeModal) {
    html += renderOperacjeModal();
  }

  // Modal koszty
  if (state.zlecenieKoszty) {
    html += renderKosztyModal();
  }

  return html;
}

function saveZlecenieForm(id) {
  const data = {
    numer: document.getElementById('zl-numer').value.trim(),
    nazwa: document.getElementById('zl-nazwa').value.trim(),
    opis: document.getElementById('zl-opis').value,
    termin: document.getElementById('zl-termin').value || null,
    ilosc_sztuk: parseInt(document.getElementById('zl-ilosc').value)||1,
    cena_brutto_szt: parseFloat(document.getElementById('zl-cena').value)||0,
    material_od_klienta: parseInt(document.getElementById('zl-mat').value)||0,
  };
  if (!data.numer||!data.nazwa) { alert('Numer i nazwa są wymagane'); return; }
  if (id) data.id = id;
  saveZlecenie(data);
}

async function openOperacje(zlecenie) {
  setState({operacjeModal:{zlecenie, operacje:[], loading:true}});
  try {
    const ops = await get(`/api/zlecenia/${zlecenie.id}/operacje`);
    setState({operacjeModal:{zlecenie, operacje:ops, loading:false}});
  } catch(e) { alert(e.message); }
}

function renderOperacjeModal() {
  const m = state.operacjeModal;
  if (!m) return '';
  const zl = m.zlecenie;
  const ops = m.operacje || [];
  let html = `
  <div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="setState({operacjeModal:null})">×</button>
      <h3>🔧 Operacje – ${zl.numer}</h3>
      <p style="color:var(--dim);font-size:13px;margin-bottom:16px">${zl.nazwa}</p>`;

  if (m.loading) {
    html += `<div class="spinner">⏳</div>`;
  } else {
    ops.forEach((op,i) => {
      html += `
      <div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600">${op.kolejnosc}. ${op.nazwa}</div>
            <div style="font-size:12px;color:var(--dim)">${op.stanowisko||'—'} ${op.czas_norma?'| norma: '+op.czas_norma+'min':''}</div>

function drawQRCanvas(kod) {
  // Simple QR rendering via server fetch with auth header, drawn onto canvas
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
  fetch(url, {headers: {'x-api-key': API_KEY}})
    .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.blob(); })
    .then(blob => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        URL.revokeObjectURL(img.src);
      };
      img.src = URL.createObjectURL(blob);
    })
    .catch(() => {
      canvas.style.display = 'none';
      const err = document.getElementById('qr-err');
      if (err) err.style.display = 'block';
    });
}

function doPrint() {

  if (qrCanvas && qrCanvas.width > 0) {
    qrImgSrc = qrCanvas.toDataURL();
  }
  let html = content.innerHTML;
  if (qrImgSrc) {
    html = html.replace(
      'id="print-qr-canvas"',
      `style="display:none" id="print-qr-canvas-hidden"`
    );
    html += `<img src="${qrImgSrc}" style="position:absolute;left:0;top:0" />`;
  }
  const win = window.open('', '_blank', 'width=720,height:1020');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Karta zlecenia – ${state.printModal?.zlecenie?.numer||''}</title>

  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 500);
}

function saveStawkaForm(id) {
  const data = {
    stanowisko: document.getElementById('st-stan')?.value?.trim(),
    stawka_godz: parseFloat(document.getElementById('st-stawka')?.value)||0,
    czas_norma_min: parseFloat(document.getElementById('st-norma')?.value)||0,
    opis: document.getElementById('st-opis')?.value||'',
  };
  if (!data.stanowisko) { alert('Podaj nazwę stanowiska'); return; }
  if (id) data.id = id;
  saveStawka(data);
}
function saveProduktForm(id) {
  const data = {
    nazwa: document.getElementById('pr-nazwa')?.value?.trim(),
    opis: document.getElementById('pr-opis')?.value||'',
    ilosc_domyslna: parseInt(document.getElementById('pr-ilosc')?.value)||1,
    cena_szt: parseFloat(document.getElementById('pr-cena')?.value)||0,
  };
  if (!data.nazwa) { alert('Podaj nazwę produktu'); return; }
  if (id) data.id = id;
  saveProdukt(data);
}

// ══════════════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════════════
function renderContent() {
  if (state.screen === 'config') return renderConfig();
  if (state.screen === 'login')  return renderLogin();

  const tabContent = {
    praca:      renderPraca,
    majster:    renderMajster,
    magazyn:    renderMagazyn,
    zlecenia:   renderZlecenia,
    admin:      renderAdmin,
    ustawienia: renderUstawienia,
  }[state.activeTab] || (() => '');

  return `
    ${renderTopbar()}
    <div class="content">
      ${state.error ? `<div class="error-banner">⚠ ${state.error}</div>` : ''}
      ${tabContent()}
    </div>
    ${renderBottomNav()}
    ${renderQRZleceniePickerModal()}`;
}

function render() {
  document.getElementById('app').innerHTML = renderContent();
  // Restart timerów po re-render
  for (const [sid, t] of Object.entries(state.timers)) {
    if (t.sesja) startTimerFor(t.sesja);
  }
  // Narysuj QR jeśli modal QR otwarty
  if (state.qrGenModal && state.qrGenKod) {
    setTimeout(() => drawQRCanvas(state.qrGenKod), 50);
  }
  // Narysuj QR na karcie zlecenia jeśli print modal otwarty
  if (state.printModal && state.printModal.zlecenie?.qr_code) {
    setTimeout(() => {
      const canvas = document.getElementById('print-qr-canvas');
      if (!canvas) return;
      const kod = state.printModal.zlecenie.qr_code;
      const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
      fetch(url, {headers: {'x-api-key': API_KEY}})
        .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
        .then(blob => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width; canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            URL.revokeObjectURL(img.src);
          };
          img.src = URL.createObjectURL(blob);
        }).catch(() => {});
    }, 80);
  }
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
// Wczytaj historię QR
state.qrLastCodes = JSON.parse(localStorage.getItem('qr_historia')||'[]');

// Auto-refresh co 30s
setInterval(() => {
  if (state.screen === 'main' && !state.loading) {
    if (state.activeTab === 'majster') loadMajster();
  }
}, 30000);

render();
</script>
