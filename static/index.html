}

function printRaportWydajnosc(data, od, doDt, typ) {
  const pr = data.pracownicy || [];
  const ZMIANA_MIN = 450;
  const fmtPLNr = v => (parseFloat(v)||0).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' zł';

  // ── Pomocnicze: oblicz efektywność dla zbioru sesji ──────────────────────────
  function calcEfekt(p) {
    const efektNormy = p.norma_wydajnosc_pct !== null && p.norma_wydajnosc_pct !== undefined
      ? p.norma_wydajnosc_pct : null;
    const normy_ok = p.normy_ok || 0;
    const normy_total = p.normy_total || 0;
    const razem = (p.min_roboczy||0) + (p.min_zbrojenie||0) + (p.min_nieproduktywny||0);
    const efektCzas = razem > 0 ? Math.round((p.min_roboczy||0) / razem * 100) : null;
    const efekt = efektNormy !== null ? efektNormy
                : normy_total > 0 ? Math.round(normy_ok / normy_total * 100)
                : efektCzas !== null ? efektCzas : 0;
    const hasNorma = efektNormy !== null;
    const label = hasNorma
      ? efekt + '% norm (' + Math.round(p.suma_norma_min||0) + '/' + Math.round(p.suma_fakty_min||0) + ' min)'
      : normy_total > 0 ? Math.round(normy_ok/normy_total*100) + '% norm'
      : efektCzas !== null ? efekt + '% czasu' : '—';
    const kolor = efekt >= 80 ? '#1e8a4c' : efekt >= 60 ? '#e67e00' : '#c0392b';
    return {efekt, label, kolor};
  }

  // ── Zbierz wszystkie unikalne daty z sesji pracowników ──────────────────────
  const allDates = new Set();
  pr.forEach(p => (p.sesje||[]).forEach(s => { if (s.data) allDates.add(s.data); }));
  const sortedDates = Array.from(allDates).sort();

  // ── Dla każdego pracownika i każdej daty oblicz agregaty ────────────────────
  // dayStats[data][user_id] = {min_roboczy, min_zbrojenie, min_nieproduktywny, norma_min, fakty_min, sesje}
  const dayStats = {};
  sortedDates.forEach(d => { dayStats[d] = {}; });
  pr.forEach(p => {
    (p.sesje||[]).forEach(s => {
      const d = s.data;
      if (!d) return;
      if (!dayStats[d][p.user_id]) {
        dayStats[d][p.user_id] = {
          full_name: p.full_name, min_roboczy:0, min_zbrojenie:0,
          min_nieproduktywny:0, norma_min:0, fakty_min:0, sesje:[]
        };
      }
      const ds = dayStats[d][p.user_id];
      const m = parseFloat(s.czas_min) || 0;
      if (s.typ === 'zbrojenie') ds.min_zbrojenie += m;
      else if (s.typ === 'nieprodukcyjna') ds.min_nieproduktywny += m;
      else ds.min_roboczy += m;
      if (s.norma_min && s.norma_min > 0 && s.typ !== 'zbrojenie' && s.sesja_glowna !== 0) {
        ds.norma_min += (s.norma_min * (s.ilosc_sztuk || 1));
        ds.fakty_min += m;
      }
      ds.sesje.push(s);
    });
  });

  function fmtDatePL(d) {
    if (!d) return d;
    const [y,m,dd] = d.split('-');
    const dni = ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
    const dow = new Date(d).getDay();
    return `${parseInt(dd,10)}.${parseInt(m,10)}.${y} (${dni[dow]})`;
  }

  // ── Buduj HTML raportu ───────────────────────────────────────────────────────
  let tabelaHtml = '';

  // ────── Sekcje dzienne ──────────────────────────────────────────────────────
  sortedDates.forEach(date => {
    const dzienPracownicy = pr.filter(p => dayStats[date][p.user_id]);
    if (!dzienPracownicy.length) return;

    tabelaHtml += `
    <div style="margin-bottom:4px;margin-top:20px;page-break-inside:avoid">
      <div style="background:#2e3548;color:#fff;padding:8px 14px;border-radius:6px 6px 0 0;font-size:14px;font-weight:700">
        📅 ${fmtDatePL(date)}
      </div>`;

    if (typ === 'skrocony') {
      tabelaHtml += `
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#3d4a63;color:#fff">
          <th style="padding:7px 10px;text-align:left">Pracownik</th>
          <th style="padding:7px 10px;text-align:center">Roboczy (min)</th>
          <th style="padding:7px 10px;text-align:center">Zbrojenie (min)</th>
          <th style="padding:7px 10px;text-align:center">Nieprodukt. (min)</th>
          <th style="padding:7px 10px;text-align:center">Razem (min)</th>
          <th style="padding:7px 10px;text-align:center">Zmian</th>
          <th style="padding:7px 10px;text-align:center">Efektywność</th>
        </tr></thead><tbody>`;
      dzienPracownicy.forEach((p, i) => {
        const ds = dayStats[date][p.user_id];
        const razem = ds.min_roboczy + ds.min_zbrojenie + ds.min_nieproduktywny;
        const zmiany = razem > 0 ? (razem / ZMIANA_MIN).toFixed(2) : '0';
        const efPct = ds.fakty_min > 0 ? Math.round(ds.norma_min / ds.fakty_min * 100) : null;
        const efLabel = efPct !== null ? efPct + '% norm' : (razem > 0 ? Math.round(ds.min_roboczy/razem*100) + '% czasu' : '—');
        const efVal = efPct !== null ? efPct : (razem > 0 ? Math.round(ds.min_roboczy/razem*100) : 0);
        const efKolor = efVal >= 80 ? '#1e8a4c' : efVal >= 60 ? '#e67e00' : '#c0392b';
        tabelaHtml += `<tr style="background:${i%2?'#fff':'#f9fafb'}">
          <td style="padding:6px 10px;border:1px solid #e0e0e0;font-weight:600">${p.full_name}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;color:#1a73e8">${Math.round(ds.min_roboczy)}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;color:#e67e00">${Math.round(ds.min_zbrojenie)}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;color:#888">${Math.round(ds.min_nieproduktywny)}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:700">${Math.round(razem)}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center">${zmiany}</td>
          <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:700;color:${efKolor}">${efLabel}</td>
        </tr>`;
      });
      tabelaHtml += `</tbody></table>`;
    } else {
      // PEŁNY – każdy pracownik z rozpiską sesji dla tego dnia
      dzienPracownicy.forEach(p => {
        const ds = dayStats[date][p.user_id];
        const razem = ds.min_roboczy + ds.min_zbrojenie + ds.min_nieproduktywny;
        const zmiany = razem > 0 ? (razem / ZMIANA_MIN).toFixed(2) : '0';
        const efPct = ds.fakty_min > 0 ? Math.round(ds.norma_min / ds.fakty_min * 100) : null;
        const efLabel = efPct !== null ? efPct + '% norm' : (razem > 0 ? Math.round(ds.min_roboczy/razem*100) + '% czasu' : '—');
        const efVal = efPct !== null ? efPct : (razem > 0 ? Math.round(ds.min_roboczy/razem*100) : 0);
        const efKolor = efVal >= 80 ? '#1e8a4c' : efVal >= 60 ? '#e67e00' : '#c0392b';
        tabelaHtml += `
        <div style="border:1px solid #ddd;margin-bottom:10px;break-inside:avoid;overflow:hidden">
          <div style="background:#4a5568;color:#fff;padding:6px 12px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:13px">${p.full_name}</span>
            <span style="font-size:11px">${Math.round(razem)} min | ${zmiany} zmian | efektywność: <b style="color:${efKolor}">${efLabel}</b></span>
          </div>`;
        if (ds.sesje.length) {
          tabelaHtml += `<table style="width:100%;border-collapse:collapse;font-size:11px">
            <thead><tr style="background:#f5f7fa">
              <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Operacja / Typ</th>
              <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Zlecenie</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Czas/szt.</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Czas łączny</th>
              <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Szt.</th>
            </tr></thead><tbody>`;
          ds.sesje.forEach((s, i) => {
            const sztuk = s.ilosc_sztuk || 1;
            const avgHMS = fmtHMS(parseFloat(s.czas_min) / sztuk);
            const totalHMS = fmtHMS(parseFloat(s.czas_min));
            const isNieprod = s.typ === 'nieprodukcyjna';
            const isInne = s.typ === 'inne_zlecenie';
            const isZbr = s.typ === 'zbrojenie';
            const rowBg = isNieprod ? '#f5f0ff' : isInne ? '#f0f7ff' : (i%2?'#fff':'#f9fafb');
            const typBadge = isNieprod
              ? `<span style="font-size:9px;background:#9b59b6;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px">NIEPRODUKCYJNA</span>`
              : isInne ? `<span style="font-size:9px;background:#2980b9;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px">INNE ZLECENIE</span>`
              : isZbr ? `<span style="font-size:9px;background:#e67e00;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px">ZBROJENIE</span>` : '';
            const opNazwa = s.op_nazwa || (isNieprod ? '⏸ Praca nieprodukcyjna' : isInne ? '🔧 Inne zlecenie' : '—');
            tabelaHtml += `<tr style="background:${rowBg}">
              <td style="padding:3px 8px;border:1px solid #eee">${opNazwa}${typBadge}</td>
              <td style="padding:3px 8px;border:1px solid #eee">${isNieprod ? '—' : (s.zl_numer||'—')}</td>
              <td style="padding:3px 8px;border:1px solid #eee;text-align:center;font-family:monospace">${isNieprod ? totalHMS : avgHMS}</td>
              <td style="padding:3px 8px;border:1px solid #eee;text-align:center;font-family:monospace;color:#888">${isNieprod ? '—' : totalHMS}</td>
              <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${isNieprod ? '—' : (s.ilosc_sztuk||'—')}</td>
            </tr>`;
          });
          tabelaHtml += `</tbody></table>`;
        }
        tabelaHtml += `</div>`;
      });
    }

    tabelaHtml += `</div>`; // koniec sekcji dnia
  });

  // ────── Tabelka podsumowania: pracownicy × dni ──────────────────────────────
  if (sortedDates.length > 0 && pr.length > 0) {
    tabelaHtml += `
    <div style="margin-top:30px;page-break-before:auto">
      <div style="background:#1a2233;color:#fff;padding:9px 14px;border-radius:6px 6px 0 0;font-size:14px;font-weight:700">
        📊 Podsumowanie wydajności — ${od} – ${doDt}
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead>
          <tr style="background:#2e3548;color:#fff">
            <th style="padding:7px 10px;text-align:left;border:1px solid #3d4a63;min-width:120px">Pracownik</th>`;
    sortedDates.forEach(d => {
      const [y,m,dd] = d.split('-');
      tabelaHtml += `<th style="padding:7px 6px;text-align:center;border:1px solid #3d4a63;min-width:68px">${parseInt(dd,10)}.${parseInt(m,10)}</th>`;
    });
    tabelaHtml += `<th style="padding:7px 10px;text-align:center;border:1px solid #3d4a63">Łącznie</th>
          </tr>
        </thead><tbody>`;

    pr.forEach((p, pi) => {
      let totalMin = 0;
      tabelaHtml += `<tr style="background:${pi%2?'#fff':'#f9fafb'}">
        <td style="padding:6px 10px;border:1px solid #e0e0e0;font-weight:600">${p.full_name}</td>`;
      sortedDates.forEach(d => {
        const ds = dayStats[d][p.user_id];
        if (!ds) {
          tabelaHtml += `<td style="padding:6px 6px;border:1px solid #e0e0e0;text-align:center;color:#bbb">—</td>`;
        } else {
          const razem = ds.min_roboczy + ds.min_zbrojenie + ds.min_nieproduktywny;
          totalMin += razem;
          const efPct = ds.fakty_min > 0 ? Math.round(ds.norma_min / ds.fakty_min * 100)
                      : razem > 0 ? Math.round(ds.min_roboczy / razem * 100) : 0;
          const efKolor = efPct >= 80 ? '#1e8a4c' : efPct >= 60 ? '#e67e00' : '#c0392b';
          const zmiany = (razem / ZMIANA_MIN).toFixed(1);
          tabelaHtml += `<td style="padding:6px 6px;border:1px solid #e0e0e0;text-align:center">
            <div style="font-weight:700;color:${efKolor};font-size:12px">${efPct}%</div>
            <div style="font-size:10px;color:#666">${Math.round(razem)} min</div>
            <div style="font-size:10px;color:#999">${zmiany} zm.</div>
          </td>`;
        }
      });
      const totalZmiany = (totalMin / ZMIANA_MIN).toFixed(1);
      tabelaHtml += `<td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center;font-weight:700;background:#f0f4ff">
        <div style="font-size:12px">${Math.round(totalMin)} min</div>
        <div style="font-size:10px;color:#666">${totalZmiany} zmian</div>
      </td></tr>`;
    });

    tabelaHtml += `</tbody></table></div>`;
  }

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Raport wydajności ${od} – ${doDt}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; color: #222; }
    @media print { body { padding: 0; } .no-print { display:none; } }
  </style>
  </head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #222;padding-bottom:10px;margin-bottom:18px">
    <div>
      <div style="font-size:22px;font-weight:700">Raport wydajności pracowników</div>

    </div>
    <div style="text-align:right;font-size:13px">Pracowników: <b>${pr.length}</b> | Zmiana = <b>${ZMIANA_MIN} min</b></div>
  </div>
  ${tabelaHtml}
  </body></html>`;

  const w = window.open('','_blank','width=1000,height=800');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}


// ─── Funkcje backupu danych ───────────────────────────────────────────────────
async function adminBackupNow() {
  const msg = document.getElementById('backup-status-msg');
  if (msg) msg.textContent = '⏳ Tworzenie backupu...';
  try {
    const r = await get('/api/admin/backup');
    const total = Object.values(r.rows||{}).reduce((a,b)=>a+b,0);
    if (msg) msg.innerHTML = `✅ Backup zapisany: <b>${total}</b> rekordów | ${r.ts?.slice(0,19)||''}`;
  } catch(e) {
    if (msg) msg.textContent = '❌ Błąd backupu: ' + e.message;
  }
}

function adminBackupDownload() {
  const msg = document.getElementById('backup-status-msg');
  if (msg) msg.textContent = '⏳ Pobieranie backupu...';
  const a = document.createElement('a');
  a.href = (SERVER_URL.replace(/\/$/, '')) + '/api/admin/backup/download?x-api-key=' + encodeURIComponent(API_KEY);
  a.download = 'produkcja_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if (msg) msg.textContent = '✅ Plik backupu pobrany.';
}

async function adminBackupRestore() {
  const msg = document.getElementById('backup-status-msg');
  const statusR = await get('/api/admin/backup/status').catch(() => null);
  const path = statusR?.backup_path || 'serwer';
  const ts = statusR?.backup_ts?.slice(0,19) || '?';
  if (!confirm(`Przywrócić dane z backupu na serwerze?\n📁 ${path}\n🕐 Ostatni zapis: ${ts}\n\nUwaga: nadpisze istniejące dane!`)) return;
  if (msg) msg.textContent = '⏳ Przywracanie backupu z serwera...';
  try {
    const r = await fetch((SERVER_URL.replace(/\/$/, '')) + '/api/admin/backup/restore', {
      method: 'POST',
      headers: {'x-api-key': API_KEY, 'Content-Type': 'application/json'},
    });
    const d = await r.json();
    if (d.ok) {
      if (msg) msg.innerHTML = '✅ Backup przywrócony ze ścieżki: <b>' + path + '</b><br>Odśwież stronę aby zobaczyć dane.';
    } else {
      if (msg) msg.textContent = '❌ Błąd przywracania: ' + (d.error || 'nieznany');
    }
  } catch(e) {
    if (msg) msg.textContent = '❌ Błąd: ' + e.message;
  }
}

async function adminBackupStatus() {
  const msg = document.getElementById('backup-status-msg');
  try {
    const r = await get('/api/admin/backup/status');
    if (msg) msg.innerHTML = r.backup_exists
      ? `✅ Backup: <b>${r.backup_size_kb} KB</b> | Ostatni: ${r.backup_ts?.slice(0,19)||'?'} | Interwał: co ${r.backup_interval_sec}s<br><span style="color:var(--dim);font-size:10px">📁 ${r.backup_path} (DB: ${r.db_path})</span>`
      : '⚠ Brak pliku backupu – kliknij "Zapisz backup teraz"';
  } catch(e) {
    if (msg) msg.textContent = '❌ ' + e.message;
  }
}

// ─── Wczytaj backup z dysku (plik JSON) ───────────────────────────────────────
function adminBackupRestoreFromDisk() {
  const msg = document.getElementById('backup-status-msg');
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    if (!confirm(`Wczytać backup z pliku:\n📄 ${file.name}\n\nUwaga: nadpisze istniejące dane na serwerze!`)) return;
    if (msg) msg.textContent = '⏳ Wczytywanie pliku...';
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (msg) msg.textContent = '⏳ Wysyłanie do serwera...';
      const r = await fetch((SERVER_URL.replace(/\/$/, '')) + '/api/admin/backup/restore-upload', {
        method: 'POST',
        headers: {'x-api-key': API_KEY, 'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const d = await r.json();
      if (d.ok) {
        const total = Object.values(d.rows||{}).reduce((a,b)=>a+b,0);
        if (msg) msg.innerHTML = `✅ Backup z dysku przywrócony! Wczytano <b>${total}</b> rekordów z pliku <b>${file.name}</b>.<br><button class="btn btn-sm" style="background:var(--accent);color:#1a1f2e;margin-top:4px" onclick="location.reload()">🔄 Odśwież stronę</button>`;
      } else {
        if (msg) msg.textContent = '❌ Błąd przywracania: ' + (d.error || 'nieznany');
      }
    } catch(e) {
      if (msg) msg.textContent = '❌ Błąd: ' + (e.message.includes('JSON') ? 'Nieprawidłowy plik JSON' : e.message);
    }
  };
  input.click();
}

// ─── Auto-monitoring resetu serwera i auto-restore ────────────────────────────
let _serverResetMonitor = null;
let _serverResetDetected = false;
let _autoRestoreInProgress = false;

async function checkServerReset() {
  if (!SERVER_URL || !API_KEY || _autoRestoreInProgress) return;
  try {
    // Pobierz status backupu – jeśli serwer zwraca brak danych lub liczbę użytkowników = 0,
    // to znaczy że dane zostały zresetowane
    const r = await fetch((SERVER_URL.replace(/\/$/, '')) + '/api/admin/backup/status', {
      headers: {'x-api-key': API_KEY}
    });
    if (!r.ok) return; // serwer niedostępny – czekamy
    const d = await r.json();

    // Sprawdź czy serwer ma dane (liczba użytkowników > 0)
    const usersCheck = await fetch((SERVER_URL.replace(/\/$/, '')) + '/api/users', {
      headers: {'x-api-key': API_KEY}
    }).catch(() => null);
    if (!usersCheck || !usersCheck.ok) return;
    const users = await usersCheck.json();

    // Jeśli lista użytkowników jest pusta a backup istnieje → reset wykryty
    if (Array.isArray(users) && users.length === 0 && d.backup_exists) {
      if (!_serverResetDetected && !_autoRestoreInProgress) {
        _serverResetDetected = true;
        await autoRestoreAfterReset(d);
      }
    } else {
      _serverResetDetected = false; // serwer ma dane – wszystko OK
    }
  } catch(e) {
    // Błąd sieci – ignorujemy, spróbujemy za chwilę
  }
}

async function autoRestoreAfterReset(backupStatus) {
  _autoRestoreInProgress = true;
  console.warn('[AUTO-RESTORE] Wykryto reset serwera – automatyczne przywracanie backupu...');

  // Pokaż baner użytkownikowi
  showResetBanner('⏳ Wykryto reset serwera – przywracam dane z backupu...');

  try {
    const r = await fetch((SERVER_URL.replace(/\/$/, '')) + '/api/admin/backup/restore', {
      method: 'POST',
      headers: {'x-api-key': API_KEY, 'Content-Type': 'application/json'},
    });
    const d = await r.json();
    if (d.ok) {
      showResetBanner('✅ Dane przywrócone automatycznie po restarcie serwera! Odświeżam...');
      setTimeout(() => {
        _autoRestoreInProgress = false;
        _serverResetDetected = false;
        hideResetBanner();
        location.reload();
      }, 2500);
    } else {
      showResetBanner('⚠ Auto-restore nie powiódł się: ' + (d.error || 'błąd') + '. Wczytaj backup ręcznie w Ustawieniach → Backup.');
      _autoRestoreInProgress = false;
    }
  } catch(e) {
    showResetBanner('⚠ Błąd auto-restore: ' + e.message + '. Wczytaj backup ręcznie.');
    _autoRestoreInProgress = false;
  }
}

function showResetBanner(msg) {
  let banner = document.getElementById('server-reset-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'server-reset-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#b94600;color:#fff;padding:12px 16px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.5);';
    document.body.prepend(banner);
  }
  banner.textContent = msg;
}

function hideResetBanner() {
  const banner = document.getElementById('server-reset-banner');
  if (banner) banner.remove();
}

function startServerResetMonitor() {
  if (_serverResetMonitor) clearInterval(_serverResetMonitor);
  // Sprawdzaj co 20 sekund
  _serverResetMonitor = setInterval(checkServerReset, 20000);
  // Pierwsze sprawdzenie po 10s od startu (gdy serwer jest już gotowy)
  setTimeout(checkServerReset, 10000);
}

            + '<span>' + prog + '% · ' + (z.sztuki_wykonane||0) + '/' + z.ilosc_sztuk + ' szt.</span>'

        const kosztZbr = m.koszt_zbrojenia || 0;
        const kosztTotal = (m.koszt_total||0) + kosztProd + kosztZbr;
        const zysk = (m.wartosc||0) - kosztTotal;
        const kolor = zysk >= 0 ? 'var(--green)' : 'var(--red)';

              + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">💰 Podsumowanie finansowe</div>'

              + '<span style="color:var(--dim)">Wartość zlecenia</span><span style="color:var(--accent);font-weight:700">' + fmtPLN(m.wartosc||0) + '</span>'
              + '<span style="color:var(--dim)">Koszt pracy</span><span>' + fmtPLN(m.koszt_total||0) + '</span>'
              + (kosztZbr > 0 ? '<span style="color:var(--orange)">⚙ Koszt zbrojenia</span><span style="color:var(--orange)">' + fmtPLN(kosztZbr) + '</span>' : '')
              + (kosztProd > 0 ? '<span style="color:var(--dim)">Koszt produktów</span><span>' + fmtPLN(kosztProd) + '</span>' : '')
              + (kosztTotal !== (m.koszt_total||0) ? '<span style="color:var(--dim)">Koszt łącznie</span><span style="font-weight:700">' + fmtPLN(kosztTotal) + '</span>' : '')
              + '<span style="color:var(--dim)">Zysk</span><span style="color:' + kolor + ';font-weight:700">' + fmtPLN(zysk) + '</span>'
              + '</div></div>';
        // Tabela produktów zlecenia
        if (m.produkty && m.produkty.length) {
          html += '<div style="background:var(--entry);border-radius:8px;padding:12px;margin-bottom:14px">'
                + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">🛒 Produkty / Zakupy</div>';
          m.produkty.forEach(p => {
            const w = (parseFloat(p.ilosc)||0)*(parseFloat(p.cena)||0);
            html += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(46,53,72,.3)">'
                  + '<span>' + p.nazwa + '</span>'
                  + '<span style="color:var(--dim)">' + p.ilosc + ' szt. × ' + fmtPLN(p.cena) + '</span>'
                  + '<span style="color:var(--accent);font-weight:600">' + fmtPLN(w) + '</span>'
                  + '</div>';
          });
          html += '</div>';
        }
      }

      const sesje = m.sesje || [];
      if (sesje.length) {
        const ops = {};
        sesje.forEach(s => {
          const k = (s.kolejnosc||999) + '::' + (s.op_nazwa||'Inne');
          if (!ops[k]) ops[k] = {sesje:[], total_sec:0, total_szt:0, kolejnosc:s.kolejnosc||999, nazwa:s.op_nazwa||'Inne'};
          let el = 0;
          if (s.start_time && s.end_time) {
            el = (parseServerDT(s.end_time)-parseServerDT(s.start_time))/1000;
            (JSON.parse(s.pauzy||'[]')).forEach(p=>{if(p.koniec)el-=(parseServerDT(p.koniec)-parseServerDT(p.start))/1000;});

          ops[k].total_sec += el;
          ops[k].total_szt += s.ilosc_sztuk||0;
        });

        Object.values(ops).sort((a,b)=>a.kolejnosc-b.kolejnosc).forEach(op => {

                + '<div style="font-weight:600;font-size:13px">' + (op.kolejnosc<999?op.kolejnosc+'. ':'') + op.nazwa + '</div>'
                + '<div style="font-size:11px;color:var(--dim);text-align:right">'
                + fmtTime(Math.round(op.total_sec)) + ' · ' + op.total_szt + ' szt.'
                + (wydPct!==null?' · <span style="color:'+wKolor+'">'+wydPct+'%</span>':'')
                + (kosztOp?' · <span style="color:var(--accent)">'+fmtPLN(kosztOp)+'</span>':'')
                + '</div></div>';
          op.sesje.forEach(s => {
            const dt = s.end_time ? (s.end_time||'').substring(0,16).replace('T',' ') : '—';
            const normMin = s.czas_norma || op.sesje[0]?.czas_norma || 0;
            const sztuk = s.ilosc_sztuk || 1;
            const elapsedMin = s.elapsed_sec / 60;
            // norma = czas na 1 szt. – porównujemy śr. czas/szt z normą
            const avgSecPerPiece = Math.round(s.elapsed_sec / sztuk);
            const avgMinPerPiece = elapsedMin / sztuk;
            const czasPrzekroczony = normMin > 0 && avgMinPerPiece > normMin;
            const timeColor = czasPrzekroczony ? 'var(--red)' : 'var(--green)';
            const rowBg = czasPrzekroczony ? 'background:rgba(231,76,60,0.08);' : '';
            html += '<div style="padding:7px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;' + rowBg + '">'
                  + '<div><div style="font-size:13px;font-weight:500">' + (s.full_name||'—') + (s.typ==='zbrojenie'?' <span style="font-size:10px;color:var(--orange);font-weight:700;background:rgba(230,126,0,0.12);border-radius:3px;padding:1px 4px">⚙ zbr</span>':'') + (czasPrzekroczony?' <span style="font-size:10px;color:var(--red);font-weight:700">⚠ PRZEKROCZONO</span>':'') + '</div>'
                  + '<div style="font-size:11px;color:var(--dim)">🕐 ' + dt + '</div>'
                  + (s.uwagi?'<div style="font-size:11px;color:var(--orange)">💬 '+s.uwagi+'</div>':'')
                  + '</div><div style="text-align:right">'
                  + '<div style="font-family:Consolas;color:' + timeColor + ';font-size:14px;font-weight:700">' + fmtTime(avgSecPerPiece) + '<span style="font-family:inherit;font-size:10px;color:var(--dim);font-weight:400"> /szt.</span></div>'
                  + '<div style="font-size:11px;color:var(--dim)">łącznie: ' + fmtTime(Math.round(s.elapsed_sec)) + ' · ' + sztuk + ' szt.</div>'
                  + (normMin?'<div style="font-size:10px;color:var(--dim)">norma: ' + normMin + ' min/szt.</div>':'')
                  + (s.koszt_sesji?'<div style="font-size:11px;color:var(--accent)">'+fmtPLN(s.koszt_sesji)+'</div>':'')
                  + '</div></div>';
          });
          html += '</div>';
        });
      } else {
        html += '<div class="empty">Brak zarejestrowanych sesji dla tego zlecenia</div>';
      }
    }
    const canDelete = state.user?.role === 'admin' || state.user?.role === 'majster';
const canEditStawki = ['admin','technolog','majster'].includes(state.user?.role);
html += '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">';
if (canEditStawki) {
html += '<button class="btn btn-accent" style="flex:1;background:var(--orange,#e67e00);color:#1a1f2e" onclick="openStawkiZleceniaModal(' + m.id + ', \'' + (m.numer||'').replace(/'/g,"\\'") + '\', \'' + (m.nazwa||'').replace(/'/g,"\\'") + '\')">⚙ Stawki zlecenia</button>';
}
if (canDelete) {
html += '<button class="btn btn-red" style="flex:1" onclick="deleteZlecenieFromModal(' + m.id + ')">🗑 Usuń zlecenie</button>';
}
html += '<button class="btn btn-outline" style="flex:1" onclick="setState({zlecenieModal:null})">Zamknij</button>';
html += '</div></div></div>';
  }

  return html;
}

async function deleteZlecenieFromModal(zid) {

    await del('/api/zlecenia/' + zid);
    setState({zlecenieModal: null});
    await loadMajster();
    alert('Zlecenie zostało usunięte.');
  } catch(e) {
    alert('Błąd usuwania: ' + e.message);
  }
}

  // Panel backupu danych
  html += '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">'
        + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:8px">🛡 Backup danych (ochrona przed utratą po restarcie)</div>'
        + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
        + '<button class="btn" style="padding:7px 12px;font-size:12px;background:#1e8a4c;color:#fff" onclick="adminBackupNow()">💾 Zapisz backup teraz</button>'
        + '<button class="btn" style="padding:7px 12px;font-size:12px;background:#1a73e8;color:#fff" onclick="adminBackupDownload()">⬇ Pobierz backup</button>'
        + '<button class="btn" style="padding:7px 12px;font-size:12px;background:var(--orange,#e67e00);color:#fff" onclick="adminBackupRestore()">⬆ Wczytaj backup z serwera</button>'
        + '<button class="btn" style="padding:7px 12px;font-size:12px;background:#7b3fa0;color:#fff" onclick="adminBackupRestoreFromDisk()">📂 Wczytaj backup z dysku</button>'
        + '<button class="btn" style="padding:7px 12px;font-size:12px" onclick="adminBackupStatus()">ℹ Status</button>'
        + '</div>'
        + '<div id="backup-status-msg" style="margin-top:6px;font-size:11px;color:var(--dim)">✅ Backup zapisywany automatycznie przy każdej zmianie sesji (start/stop/pauza) oraz co 2 min jako fallback.</div>'
        + '<div style="margin-top:3px;font-size:10px;color:var(--dim)">🔁 Auto-monitoring resetu serwera aktywny – dane zostaną przywrócone automatycznie po restarcie.</div>'
        + '</div>';

  if (!w) {
    html += `<div class="empty">⏳ Ładowanie danych wydajności...</div>`;
    return html;
  }

  if (w.error) {
    html += `<div class="error-banner">⚠ Błąd ładowania danych: ${w.error}</div>`;
    html += `<button class="btn-outline" onclick="loadWydajnoscMajster()">🔄 Spróbuj ponownie</button>`;
    return html;
  }

  if (!w.pracownicy.length) {
    html += `<div class="empty">Brak danych za wybrany okres</div>`;
    return html;
  }

  html += `<div class="section-hdr">🏆 Ranking pracowników – ${okresLabels[okres]}</div>`;

  // Sortuj malejąco wg % norm (najwyższy % = 1. miejsce)
  const pracownicy_sorted = [...w.pracownicy].sort((a, b) => {
    const pctA = (a.norma_wydajnosc_pct !== null && a.norma_wydajnosc_pct !== undefined)
      ? a.norma_wydajnosc_pct
      : (a.normy_total > 0 ? Math.round(a.normy_ok / a.normy_total * 100) : -1);
    const pctB = (b.norma_wydajnosc_pct !== null && b.norma_wydajnosc_pct !== undefined)
      ? b.norma_wydajnosc_pct
      : (b.normy_total > 0 ? Math.round(b.normy_ok / b.normy_total * 100) : -1);
    return pctB - pctA;
  });

  pracownicy_sorted.forEach((p, idx) => {
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const wydPct = (p.norma_wydajnosc_pct !== null && p.norma_wydajnosc_pct !== undefined)
      ? p.norma_wydajnosc_pct
      : (p.normy_total > 0 ? Math.round(p.normy_ok/p.normy_total*100) : null);
    const barColor = wydPct===null ? 'var(--dim)' : wydPct>=90 ? 'var(--green)' : wydPct>=70 ? 'var(--orange)' : 'var(--red)';
    const expanded = state.majsterExpandedUser === p.user_id;

    html += `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer"
           onclick="setState({majsterExpandedUser: ${expanded ? 'null' : p.user_id}})">
        <div>
          <div style="font-weight:700">${medal} ${p.full_name}</div>
          <div style="font-size:12px;color:var(--dim)">
            ${p.sesji} sesji | ${p.sztuki} szt. | ${p.godz}h
            ${wydPct!==null ? ` | normy: <span style="color:${barColor}">${wydPct}%</span>` : ''}
            ${p.koszt_total ? ` | koszt: <span style="color:var(--green);font-weight:600">${(p.koszt_total).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})} zł</span>` : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${wydPct !== null ? `
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700;color:${barColor}">${wydPct}%</div>
            <div style="font-size:10px;color:var(--dim)">${p.normy_ok}/${p.normy_total} norm</div>
          </div>` : ''}
          <span style="color:var(--dim)">${expanded?'▲':'▼'}</span>
        </div>
      </div>
      ${wydPct !== null ? `
      <div class="wyd-bar-wrap" style="margin-top:8px">
        <div class="wyd-bar" style="width:${wydPct}%;background:${barColor}"></div>
      </div>` : ''}
      ${expanded && p.sesje.length ? `
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Sesje (${p.sesje.length}):</div>
        ${p.sesje.slice(0,15).map(s => {
          const wColor = s.wyd_pct===null ? 'var(--dim)' : s.wyd_pct>=90 ? 'var(--green)' : s.wyd_pct>=70 ? 'var(--orange)' : 'var(--red)';
          const isGlownaSesja = s.sesja_glowna === 1 || s.sesja_glowna === undefined;
          const avgMin = s.ilosc_sztuk > 0 ? (s.czas_min / s.ilosc_sztuk).toFixed(1) : s.czas_min;
          return `
          <div style="padding:6px 0;border-bottom:1px solid rgba(46,53,72,.3)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.op_nazwa}${s.typ==='zbrojenie'?' <span style="font-size:10px;color:var(--orange);font-weight:700;background:rgba(230,126,0,0.12);border-radius:3px;padding:1px 3px">⚙ zbr</span>':''}${!isGlownaSesja?' <span style="font-size:10px;color:#e67e00;background:rgba(230,126,0,0.12);border-radius:3px;padding:1px 4px">➕ dod.</span>':''}</div>
                <div style="font-size:11px;color:var(--accent)">📋 ${s.zl_numer}${s.zl_nazwa && s.zl_nazwa!==s.zl_numer ? ' – '+s.zl_nazwa : ''}</div>
                <div style="font-size:11px;color:var(--dim)">📅 ${s.data||'—'} | 🏭 ${s.stanowisko||'—'} | 📦 ${s.ilosc_sztuk||0} szt.</div>
              </div>
              <div style="text-align:right;margin-left:8px;white-space:nowrap">
                <div style="font-family:Consolas;font-size:13px;font-weight:700;color:var(--text)">${avgMin}<span style="font-size:10px;color:var(--dim);font-weight:400"> min/szt</span></div>
                ${s.norma_min?`<div style="font-size:10px;color:var(--dim)">norma: ${s.norma_min} min</div>`:''}
                ${s.wyd_pct!==null?`<div style="font-weight:700;font-size:14px;color:${wColor}">${s.wyd_pct}%</div>`:''}
                ${s.sesja_id?`<button class="btn-sm" style="font-size:10px;margin-top:4px"
                  onclick="openEditSesjaModal(${s.sesja_id},'${s.start_time||''}','${s.end_time||''}')">✏ Koryguj czas</button>
                <button class="btn-sm" style="font-size:10px;margin-top:2px;background:rgba(231,76,60,0.15);color:var(--red);border-color:var(--red)"
                  onclick="deleteSesjaConfirm(${s.sesja_id})">🗑 Usuń sesję</button>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  });

  return html;
}

function renderMagazyn() {
  if (state.loading) return '<div class="spinner">⏳</div>';
  let html = `<div class="section-hdr">📦 Operacje zakończone – do transportu (${state.transportOps.length})</div>`;
  if (!state.transportOps.length) {
    html += `<div class="card" style="text-align:center;padding:30px">
      <div style="font-size:40px;margin-bottom:10px">✅</div>
      <div style="color:var(--green);font-size:16px;font-weight:600">Brak operacji do transportu</div>
    </div>`;
  } else {
    state.transportOps.forEach(op => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${op.kolejnosc}. ${op.nazwa}</div>
            <div class="card-sub">📋 ${op.zl_numer} – ${op.zl_nazwa}</div>
          </div>
          <span class="badge badge-green">✅ ukończona</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin-top:6px">
          <span style="color:var(--dim)">🏭 Stanowisko</span><span>${op.stanowisko||'—'}</span>
          <span style="color:var(--dim)">📦 Wykonano</span><span style="color:var(--green);font-weight:600">${op.ilosc_wykonana}/${op.ilosc_sztuk} szt.</span>
        </div>
      </div>`;
    });
  }
  html += `<button class="btn-outline" style="margin-top:8px" onclick="loadMagazynier()">🔄 Odśwież</button>`;
  return html;
}

function loadStawkiZlecenia() {
  // Stawki są już ładowane w loadAdmin, ale dla zakładki zlecenia też potrzebujemy
  if (!state.stawki || !state.stawki.length) {
    get('/api/stawki').then(d => setState({stawki: d}, true)).catch(()=>{});
  }
}

function renderStawkiPanel() {
  let html = `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({stawkaModal:{}})">+ Nowa stawka</button>`;
  if (!state.stawki || !state.stawki.length) {
    html += '<div class="empty">Brak stawek – dodaj stanowisko</div>';
    return html;
  }
  (state.stawki||[]).forEach(s => {
    html += `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${s.stanowisko}</div>
          <div class="card-sub">${fmtPLN(s.stawka_godz)}/h${s.opis ? ' · '+s.opis : ''}${s.typ_maszyny ? ' · <span style="background:rgba(232,160,32,0.15);color:var(--accent);padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700">' + {frezarka_cnc:'🔵 Frez.CNC',tokarka_cnc:'🟢 Tok.CNC',frezarka_konw:'🔷 Frez.konw',tokarka_konw:'🟩 Tok.konw',szlifierka:'🟡 Szlif.',operacja:'🔧 Oper.'}[s.typ_maszyny] + '</span>' : ''}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-sm btn-blue" onclick="setState({stawkaModal:${JSON.stringify(s).replace(/"/g,'&quot;')}})">✏</button>
          <button class="btn-sm btn-red" onclick="deleteStawka(${s.id})">🗑</button>
        </div>
      </div>
      ${s.zbrojenie_aktywne ? `<div style="margin-top:6px;font-size:12px;color:var(--orange)">⚙ Zbrojenie: ${fmtPLN(s.zbrojenie_stawka_godz)}/h</div>` : ''}
    </div>`;
  });
  if (state.stawkaModal !== null) {
    const s = state.stawkaModal;
    const zbrAkt = s.zbrojenie_aktywne ? true : false;
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({stawkaModal:null})">×</button>
        <h3>${s.id?'✏ Edytuj stawkę':'+ Nowa stawka'}</h3>
        <div class="field"><label>Stanowisko</label><input id="st-stan" type="text" value="${s.stanowisko||''}"></div>
        <div class="field"><label>Stawka (zł/h)</label><input id="st-stawka" type="number" step="0.5" value="${s.stawka_godz||0}"></div>
        <div class="field"><label>Opis</label><input id="st-opis" type="text" value="${s.opis||''}"></div>
        <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="font-size:12px;font-weight:700;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">🏭 Typ maszyny / operacji</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px" id="st-typ-wrap">
            ${[
              {val:'frezarka_cnc',   label:'🔵 Frezarka CNC'},
              {val:'tokarka_cnc',    label:'🟢 Tokarka CNC'},
              {val:'frezarka_konw',  label:'🔷 Frezarka konw.'},
              {val:'tokarka_konw',   label:'🟩 Tokarka konw.'},
              {val:'szlifierka',     label:'🟡 Szlifierka'},
              {val:'operacja',       label:'🔧 Operacja'},
            ].map(t => `
              <button type="button"
                id="st-typ-btn-${t.val}"
                onclick="selectTypMaszyny('${t.val}')"
                style="padding:6px 12px;border-radius:20px;border:2px solid ${(s.typ_maszyny||''===t.val)?'var(--accent)':'var(--border)'};
                       background:${(s.typ_maszyny||''===t.val)?'rgba(232,160,32,0.15)':'var(--panel)'};
                       color:${(s.typ_maszyny||''===t.val)?'var(--accent)':'var(--dim)'};
                       cursor:pointer;font-size:12px;font-weight:600;transition:all .15s">
                ${t.label}
              </button>`).join('')}
          </div>
          <input type="hidden" id="st-typ" value="${s.typ_maszyny||''}">
          <div style="font-size:11px;color:var(--dim);margin-top:8px">Typ maszyny określa grupę alternatyw przy uruchamianiu sesji (zakładka Praca).</div>
        </div>
        <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <input type="checkbox" id="st-zbr-akt" ${zbrAkt?'checked':''} onchange="document.getElementById('zbr-stawka-wrap').style.display=this.checked?'block':'none'" style="width:18px;height:18px;cursor:pointer">
            <label for="st-zbr-akt" style="font-size:14px;cursor:pointer">⚙ Aktywuj zbrojenie</label>
          </div>
          <div id="zbr-stawka-wrap" style="display:${zbrAkt?'block':'none'}">
            <div class="field" style="margin-bottom:0"><label>Stawka zbrojenia (zł/h)</label><input id="st-zbr-stawka" type="number" step="0.5" min="0" value="${s.zbrojenie_stawka_godz||0}"></div>
          </div>
        </div>
        <button class="btn btn-accent" onclick="saveStawkaForm(${s.id||0})">💾 Zapisz</button>
      </div>
    </div>`;
  }
  return html;
}

function renderZlecenia() {
  if (state.loading) return '<div class="spinner">⏳</div>';

  const role = state.user?.role;
  const canEdit = ['admin','technolog','majster'].includes(role);
  const zSubTab = state.zlecenieSubTab || 'lista';

  let html = '';

  // Pod-zakładki: Lista zleceń | Stawki
  if (canEdit) {
    html += `<div style="display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px">
      <button onclick="setState({zlecenieSubTab:'lista'})"
        style="padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;
               background:${zSubTab==='lista'?'var(--accent)':'var(--panel)'};color:${zSubTab==='lista'?'#1a1f2e':'var(--dim)'}">
        📋 Lista zleceń
      </button>
      <button onclick="setState({zlecenieSubTab:'stawki'});loadStawkiZlecenia()"
        style="padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;
               background:${zSubTab==='stawki'?'var(--accent)':'var(--panel)'};color:${zSubTab==='stawki'?'#1a1f2e':'var(--dim)'}">
        💰 Stawki
      </button>
    </div>`;
  }

  if ((state.zlecenieSubTab || 'lista') === 'stawki') {
    return html + renderStawkiPanel();
  }

  if (canEdit) {
    html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="setState({zlecenieModal:{}})">+ Nowe zlecenie</button>
      <button class="btn btn-blue" onclick="document.getElementById('pdf-import-zlecenia').click()">📄 Import PDF</button>
      <input type="file" id="pdf-import-zlecenia" accept=".pdf" style="display:none"
        onchange="handlePdfImport(this);loadZlecenia()">
      <span style="font-size:11px;color:var(--dim);align-self:center;padding:4px 8px;background:rgba(232,160,32,0.08);border:1px dashed var(--border);border-radius:6px;line-height:1.4">📝 <em>PDF z technologią zrobioną w Grafiti</em></span>
    </div>`;
    if (state.importPdfResult) {
      const res = state.importPdfResult;
      html += `<div style="background:${res.errors&&res.errors.length?'rgba(231,76,60,0.06)':'rgba(39,174,96,0.06)'};border:1px solid ${res.errors&&res.errors.length?'var(--red)':'var(--green)'};border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px">
        ${res.errors&&res.errors.length ? '⚠ Import z ostrzeżeniami' : '✅ Import zakończony'}:
        <b>${res.numer}</b> – ${res.nazwa}, <b>${res.operacje_created}</b> operacji
        ${res.nowe_stanowiska&&res.nowe_stanowiska.length ? `· nowe stanowiska: <b>${res.nowe_stanowiska.join(', ')}</b>` : ''}
        ${res.errors&&res.errors.length ? `· <span style="color:var(--red)">${res.errors.join('; ')}</span>` : ''}
        <button class="btn-sm" style="margin-left:10px;background:transparent;border:none;color:var(--dim);cursor:pointer" onclick="setState({importPdfResult:null})">✕</button>
      </div>`;
    }
  }

  const zl = state.zlecenia || [];
  if (!zl.length) {
    html += `<div class="empty">Brak zleceń</div>`;
  } else {
    zl.forEach(z => {
      const przeterminowane = z.termin && new Date(z.termin) < new Date() && z.status !== 'zakonczone';
      html += `
      <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
        <div class="card-header">
          <div>
            <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">TERMIN!</span>':''}</div>
            <div class="card-sub">${z.nazwa}</div>
            ${z.termin ? `<div class="card-sub">📅 ${fmtDate(z.termin)}</div>` : ''}
            ${(() => { if (!z.pozostale_min || z.status==='zakonczone') return ''; const est = new Date(Date.now() + z.pozostale_min*60*1000); return `<div class="card-sub" style="color:var(--blue)">🕐 Szac. koniec: ${fmtEstimatedKoniec(est)}</div>`; })()}
            <div class="card-sub">📦 ${z.ilosc_sztuk} szt. ${z.cena_brutto_szt ? '| '+fmtPLN(z.cena_brutto_szt)+'/szt' : ''}</div>
          </div>
          ${statusBadge(z.status)}
        </div>
        ${canEdit ? `
        <div class="btn-row" style="margin-top:8px;flex-wrap:wrap;gap:6px">
          <button class="btn-sm btn-blue" onclick="openEditZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">✏ Edytuj</button>
          <button class="btn-sm btn-accent" onclick="openOperacje(${JSON.stringify(z).replace(/"/g,'&quot;')})">🔧 Operacje</button>
          <button class="btn-sm btn-green" onclick="loadKoszty(${z.id})">💰 Koszty</button>
          <button class="btn-sm" style="background:#1a6b3a;color:#fff" onclick="generateRaportSingleZlecenie(${z.id}, '${(z.numer||"").replace(/'/g,"\'")}')">📊 Raport</button>
	  <button class="btn-sm btn-accent" style="background:var(--orange,#e67e00);color:#1a1f2e" onclick="openStawkiZleceniaModal(${z.id}, '${(z.numer||'').replace(/'/g,"\\'")}', '${(z.nazwa||'').replace(/'/g,"\\'")}')">⚙ Stawki</button>
          <select style="background:var(--entry);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px"
                  onchange="changeZlecenieStatus(${z.id},this.value);this.value='${z.status}'">
            <option value="${z.status}" disabled selected>▶ Status</option>
            <option value="nowe">nowe</option>
            <option value="w_toku">w_toku</option>
            <option value="zakonczone">zakonczone</option>
            <option value="anulowane">anulowane</option>
          </select>
          <button class="btn-sm btn-accent" onclick="showQRForZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">📷 QR</button>
          <button class="btn-sm btn-green" onclick="printZlecenie(${JSON.stringify(z).replace(/"/g,'&quot;')})">🖨 Karta</button>
          <button class="btn-sm btn-red" onclick="deleteZlecenie(${z.id})">🗑</button>
        </div>` : ''}
      </div>`;
    });
  }

  // Modal QR gen
  html += renderQRGenModal();

  // Modal drukuj kartę
  html += renderPrintModal();

  // Modal zlecenie
  if (state.zlecenieModal !== null) {
    const z = state.zlecenieModal;
    const isNew = !z.id;
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({zlecenieModal:null})">×</button>
        <h3>${z.id ? '✏ Edytuj zlecenie' : '+ Nowe zlecenie'}</h3>
        ${isNew ? `

function renderEditSesjaModalHtml() {
  if (!state.editSesjaModal) return '';
  const esm = state.editSesjaModal;
  const toLocal = (iso) => {
    if (!iso) return '';
    // Jeśli string nie ma Z ani +, traktuj jako lokalny (serwer zwraca czas lokalny bez strefy)
    const hasTimezone = iso.endsWith('Z') || iso.includes('+') || /[0-9]-[0-9]{2}:[0-9]{2}$/.test(iso);
    const d = hasTimezone ? new Date(iso) : new Date(iso.replace('T',' '));
    if (isNaN(d)) return '';
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({editSesjaModal:null})">
      <div class="modal">
        <button class="modal-close" onclick="setState({editSesjaModal:null})">×</button>
        <h3>✏ Korekta czasu sesji #${esm.sesja_id}</h3>
        <div style="font-size:12px;color:var(--dim);margin-bottom:14px">Dostępne dla majstra i admina. Wpisz skorygowane czasy w strefie lokalnej.</div>
        <div class="field"><label>Czas rozpoczęcia</label>
          <input id="esm-start" type="datetime-local" value="${toLocal(esm.start_time)}"
                 style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;width:100%;box-sizing:border-box">
        </div>
        <div class="field"><label>Czas zakończenia <span style="color:var(--dim)">(zostaw puste jeśli sesja aktywna)</span></label>
          <input id="esm-end" type="datetime-local" value="${toLocal(esm.end_time)}"
                 style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;width:100%;box-sizing:border-box">
        </div>
        <button class="btn btn-accent" onclick="saveEditSesjaModal()">💾 Zapisz korektę</button>
      </div>
    </div>`;
}

function openEditSesjaModal(sesjaId, startTime, endTime) {
  setState({editSesjaModal: {sesja_id: sesjaId, start_time: startTime, end_time: endTime || ''}});
}

async function saveEditSesjaModal() {
  const esm = state.editSesjaModal;
  if (!esm) return;
  const toISO = (localVal) => {
    if (!localVal) return null;
    // datetime-local daje "YYYY-MM-DDTHH:MM" w strefie lokalnej – konwertujemy do UTC
    const d = new Date(localVal + ':00');
    return d.toISOString();
  };
  const startVal = document.getElementById('esm-start')?.value;
  const endVal   = document.getElementById('esm-end')?.value;
  if (!startVal) { alert('Czas rozpoczęcia jest wymagany'); return; }
  try {
    const r = await fetch(SERVER_URL.replace(/\/$/, '') + '/api/sesje/' + esm.sesja_id + '/czas', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json','x-api-key': API_KEY},
      body: JSON.stringify({
        start_time: toISO(startVal),
        end_time:   toISO(endVal) || null,
      })
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || r.statusText);
    }
    setState({editSesjaModal: null});
    // Odśwież widok, z którego otwarto modal
    if (state.majsterSubTab === 'wydajnosc') {
      await loadWydajnoscMajster(state.wydajnoscOkres);
    } else {
      await loadMajster();
    }
  } catch(e) {
    alert('Błąd korekty czasu: ' + e.message);
  }
}

async function deleteSesjaConfirm(sesjaId) {
  if (!confirm('Na pewno usunąć tę sesję pracy? Operacja jest nieodwracalna.')) return;
  try {
    const r = await fetch(SERVER_URL.replace(/\/$/, '') + '/api/sesje/' + sesjaId, {
      method: 'DELETE',
      headers: {'x-api-key': API_KEY}
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || r.statusText);
    }
    if (state.majsterSubTab === 'wydajnosc') {
      await loadWydajnoscMajster(state.wydajnoscOkres);
    } else {
      await loadMajster();
    }
  } catch(e) {
    alert('Błąd usuwania sesji: ' + e.message);
  }
}

function filterZleceniaSearch(query) {
  const container = document.getElementById('zl-search-results');
  if (!container) return;
  const q = query.trim().toLowerCase();
  const zl = state.zlecenia || [];
  const filtered = q.length < 1 ? [] : zl.filter(z =>
    z.numer.toLowerCase().includes(q) || z.nazwa.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!filtered.length) { container.innerHTML = ''; return; }
  container.innerHTML = filtered.map(z => `
    <div onclick="autofillZlecenie(${z.id})"
         style="padding:8px 10px;cursor:pointer;border-radius:6px;border:1px solid var(--border);
                background:var(--panel);margin-bottom:4px;font-size:13px;
                display:flex;justify-content:space-between;align-items:center"
         onmouseover="this.style.borderColor='var(--accent)'"
         onmouseout="this.style.borderColor='var(--border)'">
      <div>
        <span style="font-weight:700;color:var(--accent)">${z.numer}</span>
        <span style="color:var(--dim);margin-left:8px">${z.nazwa}</span>
      </div>
      <span style="font-size:11px;color:var(--dim)">📋 wczytaj</span>
    </div>`).join('');
}

function autofillZlecenie(id) {
  const z = (state.zlecenia||[]).find(x => x.id === id);
  if (!z) return;
  // Numer: sugeruj nowy numer na podstawie wzorca (z sufiksem -K + pełny timestamp)
  const baseNumer = (z.numer || '').replace(/-K\d+$/, '');
  const numerSufx = baseNumer + '-K' + Date.now();
  // Zapisz dane autouzupełnienia do state.zlecenieModal – dzięki temu
  // po re-renderze (np. po załadowaniu operacji) pola nie zostaną wyczyszczone
  const autofillData = {
    numer: numerSufx,
    nazwa: z.nazwa || '',
    opis: z.opis || '',
    termin: z.termin ? z.termin.substring(0,10) : '',
    ilosc_sztuk: z.ilosc_sztuk || 1,
    cena_brutto_szt: z.cena_brutto_szt || 0,
    material_od_klienta: z.material_od_klienta || 0,
  };
  // Aktualizuj zlecenieModal (bez id – to nowe zlecenie) tak aby re-render
  // użył tych wartości zamiast pustych
  setState({
    zlecenieModal: autofillData,
    autofillSourceId: id,
    autofillOperacje: [],
  });
  // Focus na polu numeru po renderze
  setTimeout(() => { const el = document.getElementById('zl-numer'); if (el) { el.focus(); el.select(); } }, 80);
  // Załaduj operacje z wzorcowego zlecenia
  fetchAutofillOperacje(id);
}

let _autofillToken = 0;

async function fetchAutofillOperacje(zid) {
  const myToken = ++_autofillToken;
  try {
    const [ops, produkty] = await Promise.all([
      get(`/api/zlecenia/${zid}/operacje`),
      get(`/api/zlecenia/${zid}/produkty`).catch(() => []),
    ]);
    // Ignoruj wynik jeśli w międzyczasie wybrano inne zlecenie do autofill
    if (myToken !== _autofillToken) return;
    // Pobierz też plik STEP ze wzorcowego zlecenia
    const srcZlecenie = (state.zlecenia||[]).find(z => z.id === zid);
    const stepUrl = srcZlecenie?.model_3d_url || null;
    // Aktualizuj dane autofill + zapowiedź produktów i STEP
    const currentModal = state.zlecenieModal || {};
    setState({
      autofillOperacje: ops,
      autofillProdukty: produkty,
      autofillStepUrl: stepUrl,
      zlecenieModal: {...currentModal, model_3d_url: stepUrl},
    });
    // Zaktualizuj ukryty input model_3d i info-box
    setTimeout(() => {
      const hiddenInput = document.getElementById('zl-model3d');
      const infoBox = document.getElementById('zl-model3d-info');
      const uploadArea = document.getElementById('zl-model3d-upload-area');
      if (hiddenInput) hiddenInput.value = stepUrl || '';
      if (infoBox && uploadArea) {
        if (stepUrl) {
          infoBox.style.display = 'flex';
          uploadArea.style.display = 'none';
        } else {
          infoBox.style.display = 'none';
          uploadArea.style.display = '';
        }
      }
    }, 100);
  } catch(e) {
    if (myToken !== _autofillToken) return;
    setState({autofillOperacje: [], autofillProdukty: [], autofillStepUrl: null});
  }
}

  if (produkty.length) {
    produkty.forEach(p => {
      const wartosc = (parseFloat(p.ilosc)||0)*(parseFloat(p.cena)||0);
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px">'

        + '<span style="color:var(--dim);white-space:nowrap">' + p.ilosc + ' szt. × ' + fmtPLN(p.cena) + '</span>'
        + '<span style="color:var(--accent);font-weight:700;white-space:nowrap;min-width:70px;text-align:right">' + fmtPLN(wartosc) + '</span>'
        + '<button class="btn-sm btn-red" style="padding:2px 7px;font-size:11px" onclick="deleteProduktZlecenia(' + zid + ',' + p.id + ')">✕</button>'
        + '</div>';
    });
    html += '<div style="border-top:1px solid var(--border);padding-top:6px;font-size:12px;display:flex;justify-content:space-between">'
      + '<span style="color:var(--dim)">Łączny koszt produktów:</span>'
      + '<span style="color:var(--accent);font-weight:700">' + fmtPLN(koszt) + '</span>'
      + '</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--dim);margin-bottom:8px">Brak dodanych produktów</div>';
  }
  html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:6px;margin-top:10px;align-items:end">'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Nazwa produktu</div>'
    + '<input id="pr-zl-nazwa" type="text" placeholder="np. Frez R4, Wiertło..." style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px;box-sizing:border-box"></div>'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Ilość</div>'
    + '<input id="pr-zl-ilosc" type="number" value="1" min="0.01" step="0.01" style="width:70px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px"></div>'
    + '<div><div style="font-size:11px;color:var(--dim);margin-bottom:3px">Cena (zł)</div>'
    + '<input id="pr-zl-cena" type="number" value="0" min="0" step="0.01" style="width:80px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:12px"></div>'
    + '</div>'
    + '<button class="btn btn-green" style="margin-top:8px;padding:8px" onclick="addProduktZlecenia(' + zid + ')">+ Dodaj produkt</button>'

  return html;

async function loadProduktyZlecenia(zid) {
  try {
    const data = await get('/api/zlecenia/' + zid + '/produkty');
    setState({produktyZlecenia: data});
  } catch(e) { setState({produktyZlecenia: []}); }
}

async function addProduktZlecenia(zid) {
  const nazwa = document.getElementById('pr-zl-nazwa')?.value?.trim();
  if (!nazwa) { alert('Podaj nazwę produktu'); return; }
  const ilosc = parseFloat(document.getElementById('pr-zl-ilosc')?.value)||1;
  const cena = parseFloat(document.getElementById('pr-zl-cena')?.value)||0;
  try {
    await post('/api/zlecenia/' + zid + '/produkty', {zlecenie_id: zid, nazwa, ilosc, cena});
    await loadProduktyZlecenia(zid);
  } catch(e) { alert('Błąd: ' + e.message); }
}

async function deleteProduktZlecenia(zid, pid) {
  if (!confirm('Usunąć produkt?')) return;
  try {
    await del('/api/zlecenia/' + zid + '/produkty/' + pid);
    await loadProduktyZlecenia(zid);
  } catch(e) { alert('Błąd: ' + e.message); }
}


function saveZlecenieForm(id) {
  const data = {
    numer: document.getElementById('zl-numer').value.trim(),
    nazwa: document.getElementById('zl-nazwa').value.trim(),
    opis: document.getElementById('zl-opis').value,
    termin: document.getElementById('zl-termin').value || null,
    ilosc_sztuk: parseInt(document.getElementById('zl-ilosc').value)||1,
    cena_brutto_szt: parseFloat(document.getElementById('zl-cena').value)||0,
    material_od_klienta: parseInt(document.getElementById('zl-mat').value)||0,
    model_3d_url: document.getElementById('zl-model3d')?.value?.trim() || null,
  };
  if (!data.numer||!data.nazwa) { alert('Numer i nazwa są wymagane'); return; }
  if (id) data.id = id;
  saveZlecenie(data);
}

function drawQRCanvas(kod) {
  // Simple QR rendering via server fetch with auth header, drawn onto canvas
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
  fetch(url, {headers: {'x-api-key': API_KEY}})
    .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.blob(); })
    .then(blob => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        URL.revokeObjectURL(img.src);
      };
      img.src = URL.createObjectURL(blob);
    })
    .catch(() => {
      canvas.style.display = 'none';
      const err = document.getElementById('qr-err');
      if (err) err.style.display = 'block';
    });
}

function doPrint() {
  const contentEl = document.getElementById('print-content');
  if (!contentEl) return;

  // Zamień canvas QR na data URL PRZED kopiowaniem HTML
  const qrCanvas = document.getElementById('print-qr-canvas');
  let qrImgSrc = null;
  if (qrCanvas && qrCanvas.width > 0) {
    qrImgSrc = qrCanvas.toDataURL('image/png');
  } else if (window._printQrDataUrl) {
    qrImgSrc = window._printQrDataUrl;
  }

  // Klonuj element żeby nie modyfikować DOM
  const clone = contentEl.cloneNode(true);

  // Podmień canvas na <img> w klonie
  const cloneCanvas = clone.querySelector('#print-qr-canvas');
  if (cloneCanvas && qrImgSrc) {
    const img = document.createElement('img');
    img.src = qrImgSrc;
    img.style.cssText = cloneCanvas.style.cssText || 'display:block;border:1px solid #ccc;padding:4px';
    cloneCanvas.parentNode.replaceChild(img, cloneCanvas);
  } else if (cloneCanvas) {
    // Canvas pusty (QR jeszcze się ładuje) – ukryj
    cloneCanvas.style.display = 'none';
  }

  const win = window.open('', '_blank', 'width=720,height=1020');
  if (!win) { alert('Zablokowano otwieranie okna. Zezwól na pop-upy dla tej strony.'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Karta zlecenia – ${state.printModal?.zlecenie?.numer||''}</title>
    <style>
      body{font-family:Arial,sans-serif;margin:10mm;background:#fff;color:#000;}
      @media print{body{margin:5mm;} @page{margin:10mm;} .no-print{display:none!important;}}
      table{border-collapse:collapse;}
    </style></head><body>${clone.outerHTML}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 600);
}

function selectTypMaszyny(val) {
  const hidden = document.getElementById('st-typ');
  if (!hidden) return;
  const prev = hidden.value;
  const next = (prev === val) ? '' : val;
  hidden.value = next;
  const typyDef = [
    {val:'frezarka_cnc',   label:'🔵 Frezarka CNC'},
    {val:'tokarka_cnc',    label:'🟢 Tokarka CNC'},
    {val:'frezarka_konw',  label:'🔷 Frezarka konw.'},
    {val:'tokarka_konw',   label:'🟩 Tokarka konw.'},
    {val:'szlifierka',     label:'🟡 Szlifierka'},
    {val:'operacja',       label:'🔧 Operacja'},
  ];
  typyDef.forEach(t => {
    const btn = document.getElementById('st-typ-btn-' + t.val);
    if (!btn) return;
    const active = (next === t.val);
    btn.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    btn.style.background = active ? 'rgba(232,160,32,0.15)' : 'var(--panel)';
    btn.style.color = active ? 'var(--accent)' : 'var(--dim)';
  });
  // Aktualizuj sticky header
  const headerEl = document.getElementById('st-typ-sticky-label');
  const headerWrap = document.getElementById('st-typ-sticky-wrap');
  if (headerEl && headerWrap) {
    const aktywny = typyDef.find(t => t.val === next);
    if (aktywny) {
      headerEl.textContent = aktywny.label;
      headerEl.style.color = 'var(--accent)';
      headerEl.style.fontStyle = 'normal';
      headerWrap.style.borderColor = 'var(--accent)';
    } else {
      headerEl.textContent = '— nie wybrano —';
      headerEl.style.color = 'var(--dim)';
      headerEl.style.fontStyle = 'italic';
      headerWrap.style.borderColor = 'var(--border)';
    }
  }
}

async function handlePdfImport(input, force) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  setState({importPdfResult: null});
  try {
    const url = (SERVER_URL.replace(/\/$/,'')) + '/api/import-technologia' + (force ? '?force=true' : '');
    const response = await fetch(url, {
      method: 'POST',
      headers: {'x-api-key': API_KEY},
      body: formData,
    });
    const data = await response.json();
    if (response.status === 409) {
      // Zlecenie już istnieje – zapytaj użytkownika
      const potwierdzenie = confirm(
        (data.detail || 'Zlecenie o tym numerze już istnieje w systemie.') +
        '\n\nCzy chcesz mimo to utworzyć nowe zlecenie (duplikat)?'
      );
      if (potwierdzenie) {
        await handlePdfImport(input, true);
      } else {
        input.value = '';
      }
      return;
    }
    if (!response.ok) throw new Error(data.detail || 'Błąd importu');
    setState({importPdfResult: data});
    input.value = '';
  } catch(e) {
    alert('Błąd importu PDF: ' + e.message);
    input.value = '';
  }
}

// ══════════════════════════════════════════════════════════════
//  CAMERA QR SCANNER
// ══════════════════════════════════════════════════════════════
let _qrStream = null;
let _qrAnimFrame = null;

function stopQRCamera() {
  if (_qrStream) { _qrStream.getTracks().forEach(t => t.stop()); _qrStream = null; }
  if (_qrAnimFrame) { cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
}

async function startQRCamera() {
  const video  = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-cam-canvas');
  const status = document.getElementById('qr-scan-status');
  if (!video) return;
  try {
    if (!window.jsQR) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment'}
    });
    _qrStream = stream;
    video.srcObject = stream;
    await video.play();
    if (status) status.textContent = '🔍 Skanuję...';
    const ctx = canvas.getContext('2d');
    function tick() {
      if (!document.getElementById('qr-video')) { stopQRCamera(); return; }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
        if (code && code.data) {
          stopQRCamera();
          scanQR(code.data);
          return;
        }
      }
      _qrAnimFrame = requestAnimationFrame(tick);
    }
    tick();
  } catch(err) {
    if (status) status.textContent = 'Brak dostępu do aparatu. Wpisz kod ręcznie.';
    setState({qrManualMode: true});
  }
}

// Wywoływane przez render() aby uruchomić kamerę po re-renderze
function _afterRender() {
  stopQRCamera();
  const hasCam = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  if (state.qrScanMode && !state.qrManualMode && hasCam) {
    setTimeout(startQRCamera, 120);
  }
}

function stepModelRemove() {
  const urlInput = document.getElementById('zl-model3d');
  if (urlInput) urlInput.value = '';
  const info = document.getElementById('zl-model3d-info');
  if (info) info.style.display = 'none';
  const area = document.getElementById('zl-model3d-upload-area');
  if (area) { area.style.display = ''; area.innerHTML = '<input type="file" id="zl-model3d-file" accept=".step,.stp,.STEP,.STP" style="font-size:13px;width:100%" onchange="uploadStepFile(this)">'; }
  const status = document.getElementById('zl-model3d-status');
  if (status) { status.textContent = ''; }
}

async function uploadStepFile(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('zl-model3d-status');
  const urlInput = document.getElementById('zl-model3d');
  const infoEl   = document.getElementById('zl-model3d-info');
  const areaEl   = document.getElementById('zl-model3d-upload-area');

  const MAX = 100 * 1024 * 1024;
  if (file.size > MAX) {
    statusEl.textContent = '✗ Plik za duży (maks. 100 MB)';
    statusEl.style.color = 'var(--red, #e05555)';
    return;
  }

  statusEl.textContent = '⏳ Wgrywanie... 0%';
  statusEl.style.color = 'var(--dim)';
  input.disabled = true;

  try {
    const buf = await file.arrayBuffer();
    const result = await new Promise((res, rej) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SERVER_URL.replace(/\/$/, '') + '/api/step-upload');
      xhr.setRequestHeader('x-api-key', API_KEY);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      xhr.setRequestHeader('x-filename', encodeURIComponent(file.name));
      xhr.upload.onprogress = e => {
        if (e.lengthComputable)
          statusEl.textContent = '⏳ Wgrywanie... ' + Math.round(e.loaded/e.total*100) + '%';
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) res(JSON.parse(xhr.responseText));
        else rej(new Error(xhr.responseText || 'HTTP ' + xhr.status));
      };
      xhr.onerror = () => rej(new Error('Błąd sieci'));
      xhr.send(buf);
    });

    if (result.ok && result.url) {
      urlInput.value = result.url;
      statusEl.textContent = '✅ Wgrano: ' + file.name + ' (' + Math.round((result.bytes||file.size)/1024) + ' KB)';
      statusEl.style.color = '#27ae60';
      if (areaEl) areaEl.style.display = 'none';
      if (infoEl) infoEl.style.display = 'flex';
    } else {
      throw new Error(result.error || 'Nieznany błąd');
    }
  } catch(e) {
    statusEl.textContent = '✗ Błąd uploadu: ' + e.message;
    statusEl.style.color = 'var(--red, #e05555)';
    input.disabled = false;
  }
}

  if (el) { el.textContent = msg; el.style.color = color || '#8b949e'; }
}

function _loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector('script[src="' + src + '"]')) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res;
    s.onerror = () => rej(new Error('Nie można załadować: ' + src));
    document.head.appendChild(s);
  });
}

async function _initStep3DScene(stepUrl) {
  try {
    // 1. Biblioteki Three.js
    _setStep3dStatus('⏳ Ładowanie Three.js...', '#e6a020');
    await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
    await _loadScript('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js');

    // 2. Pobranie pliku STEP przez proxy (dłuższy timeout dla telefonu)
    _setStep3dStatus('⏳ Pobieranie pliku STEP...', '#e6a020');
    const proxyUrl = SERVER_URL.replace(/\/$/, '') + '/api/step-proxy?url=' + encodeURIComponent(stepUrl);
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 120000); // 2 min timeout
    let stepData;
    try {
      const resp = await fetch(proxyUrl, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('Serwer zwrócił błąd HTTP ' + resp.status);
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('text/html')) throw new Error('Plik niedostępny – sprawdź uprawnienia na Cloudinary');
      stepData = new Uint8Array(await resp.arrayBuffer());
    } catch(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') throw new Error('Timeout – plik za duży lub wolne łącze');
      throw e;
    }
    if (!stepData.length) throw new Error('Pobrano pusty plik');

    // 3. OCCT parser – używamy nowszego API (obsługuje SolidWorks AP214)
    _setStep3dStatus('⏳ Parsowanie modelu STEP...', '#e6a020');
    // GitHub raw blokuje jako script (MIME text/plain) – ładujemy przez fetch+blob
    const OCCT_BASE = 'https://cdn.jsdelivr.net/gh/kovacsv/occt-import-js@master/dist/';
    if (typeof occtimportjs === 'undefined') {
      const jsText = await fetch(OCCT_BASE + 'occt-import-js.js').then(r => {
        if (!r.ok) throw new Error('Błąd pobierania biblioteki OCCT: ' + r.status);
        return r.text();
      });
      const blob = new Blob([jsText], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      await _loadScript(blobUrl);
      URL.revokeObjectURL(blobUrl);
    }
    const occt = await occtimportjs({
      locateFile: (f) => OCCT_BASE + f,
    });
    const result = occt.ReadStepFile(stepData, null);

    if (!result || !result.meshes || result.meshes.length === 0)
      throw new Error('Brak geometrii w pliku – plik STEP jest pusty lub uszkodzony');

    // Zlicz wierzchołki – obsługa obu wersji API:
    // Stare (0.0.19): mesh.breps[].vertices / .normals / .triangles
    // Nowe (0.0.20+): mesh.attributes.position.array / .normal.array + mesh.index.array
    function _meshHasGeometry(mesh) {
      if (Array.isArray(mesh.breps) && mesh.breps.length > 0)
        return mesh.breps.some(b => b.vertices?.length > 0);
      return mesh.attributes?.position?.array?.length > 0;
    }
    const totalVerts = result.meshes.reduce((sum, m) => {
      if (Array.isArray(m.breps))
        return sum + m.breps.reduce((s, b) => s + (b.vertices?.length || 0), 0);
      return sum + (m.attributes?.position?.array?.length || 0);
    }, 0);

    if (totalVerts === 0)
      throw new Error('Plik STEP nie zawiera geometrii. Sprawdź czy plik jest poprawny (zapisz ponownie z SolidWorks/FreeCAD).');

    // 4. Scena Three.js
    _setStep3dStatus('⏳ Renderowanie...', '#e6a020');
    const canvas = document.getElementById('step3d-canvas');
    if (!canvas) throw new Error('Brak elementu canvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0d1117, 1);
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    const w = canvas.clientWidth || 400;
    const h = canvas.clientHeight || 500;
    const camera = new THREE.PerspectiveCamera(50, w / h, 0.0001, 10000000);

    const controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.screenSpacePanning = true;
    controls.zoomSpeed = 1.2;

    // Światła
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dl1.position.set(5, 10, 7); scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0x6688cc, 0.4);
    dl2.position.set(-5, -3, -5); scene.add(dl2);

    // Buduj geometrię – obsługa obu API
    const group = new THREE.Group();
    const defaultMat = new THREE.MeshPhongMaterial({
      color: 0x4a90d9, shininess: 80, specular: 0x224466, side: THREE.DoubleSide
    });

    for (const mesh of result.meshes) {
      let posArr, normArr, idxArr;

      if (Array.isArray(mesh.breps) && mesh.breps.length > 0) {
        // Stare API: breps[]
        const verts = [], norms = [], idxs = [];
        let vOff = 0;
        for (const brep of mesh.breps) {
          if (!brep.vertices?.length) continue;
          for (let v = 0; v < brep.vertices.length; v += 3)
            verts.push(brep.vertices[v], brep.vertices[v+1], brep.vertices[v+2]);
          if (brep.normals)
            for (let n = 0; n < brep.normals.length; n += 3)
              norms.push(brep.normals[n], brep.normals[n+1], brep.normals[n+2]);
          for (const i of brep.triangles) idxs.push(i + vOff);
          vOff += brep.vertices.length / 3;
        }
        posArr = verts; normArr = norms; idxArr = idxs;
      } else {
        // Nowe API: attributes + index
        posArr  = Array.from(mesh.attributes?.position?.array || []);
        normArr = Array.from(mesh.attributes?.normal?.array   || []);
        idxArr  = Array.from(mesh.index?.array                || []);
      }

      if (!posArr.length || !idxArr.length) continue;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
      if (normArr.length === posArr.length)
        geo.setAttribute('normal', new THREE.Float32BufferAttribute(normArr, 3));
      geo.setIndex(idxArr);
      if (!normArr.length) geo.computeVertexNormals();

      let mat = defaultMat;
      if (mesh.color && mesh.color.length >= 3) {
        mat = defaultMat.clone();
        mat.color.setRGB(mesh.color[0], mesh.color[1], mesh.color[2]);
        if (mesh.color[3] !== undefined && mesh.color[3] < 0.99) {
          mat.transparent = true; mat.opacity = mesh.color[3];
        }
      }
      group.add(new THREE.Mesh(geo, mat));
    }

    if (group.children.length === 0) throw new Error('Nie udało się zbudować geometrii 3D');
    scene.add(group);

    // Centrum i kamera – kluczowe dla czarnego ekranu
    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let camDist = Math.abs(maxDim / Math.sin(fov / 2)) * 0.8;
    if (camDist === 0 || !isFinite(camDist)) camDist = 100;

    camera.position.set(
      center.x + camDist * 0.7,
      center.y + camDist * 0.5,
      center.z + camDist * 0.7
    );
    camera.near = camDist * 0.0001;
    camera.far  = camDist * 100;
    camera.updateProjectionMatrix();
    camera.lookAt(center);
    controls.target.copy(center);
    controls.minDistance = camDist * 0.01;
    controls.maxDistance = camDist * 50;
    controls.update();

    // Resize
    function _resize() {
      if (!canvas || !_step3dOverlay) return;
      const cw = canvas.clientWidth  || 400;
      const ch = canvas.clientHeight || 500;
      renderer.setSize(cw, ch, false);
      camera.aspect = cw / ch;
      camera.updateProjectionMatrix();
    }
    renderer.setSize(w, h, false);
    new ResizeObserver(_resize).observe(canvas);

    // Pętla
    let _running = true;
    (function _anim() {
      if (!_running || !document.getElementById('step3d-overlay')) { _running = false; return; }
      requestAnimationFrame(_anim);
      controls.update();
      renderer.render(scene, camera);
    })();

    _setStep3dStatus('✓ Model załadowany (' + group.children.length + ' bryły)', '#27ae60');
    const hint = document.getElementById('step3d-hint');
    if (hint) hint.style.display = 'block';

  } catch(e) {
    _setStep3dStatus('✗ ' + e.message, '#e05555');
    console.error('[STEP viewer]', e);
  }
}

</script>
</body>
</html>
