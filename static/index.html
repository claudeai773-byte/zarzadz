<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1f2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚙ Produkcja</title>
<style>
  :root {
    --bg:#1a1f2e;--panel:#242938;--accent:#e8a020;
    --text:#e8eaf0;--dim:#8892a4;--border:#2e3548;
    --green:#27ae60;--red:#e74c3c;--blue:#3498db;
    --orange:#f39c12;--entry:#1e2435;--purple:#9b59b6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
  #app{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{background:var(--panel);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100;}
  .topbar h1{font-family:Consolas,monospace;font-size:18px;color:var(--accent);}
  .topbar .user-info{font-size:12px;color:var(--dim);text-align:right;line-height:1.4;}
  .logout-btn{background:var(--red);color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;}
  .content{flex:1;padding:12px;max-width:640px;margin:0 auto;width:100%;padding-bottom:80px;}
  .login-card{background:var(--panel);border-radius:16px;padding:32px 24px;margin:40px auto;max-width:380px;border:1px solid var(--border);}
  .login-card h2{color:var(--accent);font-family:Consolas,monospace;font-size:22px;text-align:center;margin-bottom:8px;}
  .login-card .subtitle{color:var(--dim);text-align:center;font-size:13px;margin-bottom:28px;}
  .field{margin-bottom:16px;}
  .field label{display:block;color:var(--dim);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .field input,.field select,.field textarea{width:100%;background:var(--entry);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;font-family:inherit;}
  select option{background:var(--panel);}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;text-align:center;}
  .btn:active{opacity:.8;}
  .btn-accent{background:var(--accent);color:#1a1f2e;}
  .btn-green{background:var(--green);color:white;}
  .btn-red{background:var(--red);color:white;}
  .btn-blue{background:var(--blue);color:white;}
  .btn-purple{background:var(--purple);color:white;}
  .btn-sm{padding:8px 14px;width:auto;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim);padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:8px;}
  .btn-row .btn{flex:1;}
  .card{background:var(--panel);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .card-title{font-weight:700;font-size:15px;color:var(--text);}
  .card-sub{color:var(--dim);font-size:12px;margin-top:2px;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .badge-green{background:rgba(39,174,96,.2);color:var(--green);}
  .badge-orange{background:rgba(243,156,18,.2);color:var(--orange);}
  .badge-red{background:rgba(231,76,60,.2);color:var(--red);}
  .badge-blue{background:rgba(52,152,219,.2);color:var(--blue);}
  .badge-dim{background:rgba(136,146,164,.15);color:var(--dim);}
  .badge-purple{background:rgba(155,89,182,.2);color:var(--purple);}
  .tabs{display:flex;background:var(--panel);border-radius:10px;padding:4px;margin-bottom:16px;gap:2px;}
  .tab{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--dim);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
  .tab.active{background:var(--accent);color:#1a1f2e;}
  .timer-card{background:linear-gradient(135deg,#1a2e1a,#1e2e1e);border:2px solid var(--green);border-radius:16px;padding:20px;text-align:center;margin-bottom:10px;}
  .timer-card.paused{border-color:var(--orange);background:linear-gradient(135deg,#2e2a1a,#2e2e1a);}
  .timer-display{font-family:Consolas,monospace;font-size:42px;font-weight:700;color:var(--green);letter-spacing:4px;margin:6px 0;}
  .timer-card.paused .timer-display{color:var(--orange);}
  .timer-label{color:var(--dim);font-size:13px;}
  .timer-op{color:var(--text);font-size:15px;font-weight:600;margin:6px 0;}
  .timer-zl{color:var(--accent);font-size:13px;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stats-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
  .stat-box{background:var(--panel);border-radius:10px;padding:14px 12px;text-align:center;border:1px solid var(--border);}
  .stat-val{font-size:26px;font-weight:700;color:var(--accent);font-family:Consolas,monospace;}
  .stat-lbl{color:var(--dim);font-size:11px;margin-top:4px;}
  .section-hdr{color:var(--dim);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .spinner{text-align:center;padding:40px;color:var(--dim);font-size:32px;}
  .empty{text-align:center;padding:40px;color:var(--dim);font-size:14px;}
  .error-banner{background:rgba(231,76,60,.15);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:14px;}
  .alert-banner{background:rgba(243,156,18,.15);border:1px solid var(--orange);color:var(--orange);border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px;}
  .bottom-nav{background:var(--panel);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;}
  .nav-btn{flex:1;padding:8px 4px 12px;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;transition:color .2s;}
  .nav-btn .icon{font-size:20px;}
  .nav-btn.active{color:var(--accent);}
  .progress-wrap{background:var(--border);border-radius:4px;height:6px;margin:8px 0;overflow:hidden;}
  .progress-bar{height:100%;border-radius:4px;background:var(--green);transition:width .3s;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;}
  .modal{background:var(--panel);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:18px;margin-bottom:16px;color:var(--accent);}
  .modal-close{float:right;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;margin-top:-4px;}
  .config-wrap{padding:24px 16px;max-width:420px;margin:0 auto;}
  .config-wrap h2{color:var(--accent);font-family:Consolas,monospace;margin-bottom:6px;}
  .config-wrap p{color:var(--dim);font-size:13px;margin-bottom:24px;}
  .qr-input-row{display:flex;gap:8px;}
  .qr-input-row input{flex:1;}
  .qr-preview{width:100%;border-radius:10px;background:white;padding:10px;display:flex;justify-content:center;margin-top:8px;}
  .qr-preview img{max-width:200px;max-height:200px;}
  .tag{display:inline-block;background:var(--entry);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--dim);margin:2px 2px 0 0;}
  table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.data-table th{color:var(--dim);font-weight:600;padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  table.data-table td{padding:8px 6px;border-bottom:1px solid rgba(46,53,72,.5);}
  .nieprodukcyjna-card{border-color:var(--purple) !important;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--entry);color:var(--dim);}
  .chip.active{background:var(--accent);color:#1a1f2e;border-color:var(--accent);}
  .wyd-bar-wrap{height:10px;background:var(--border);border-radius:5px;overflow:hidden;flex:1;}
  .wyd-bar{height:100%;border-radius:5px;transition:width .4s;}
  .sub-tabs{display:flex;background:var(--entry);border-radius:8px;padding:3px;margin-bottom:14px;gap:2px;}
  .sub-tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--dim);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;}
  .sub-tab.active{background:var(--accent);color:#1a1f2e;}
  @media print{
    body{background:#fff !important;color:#000 !important;}
    .no-print,.bottom-nav,.topbar,#print-overlay .btn-row{display:none !important;}
    #print-overlay{position:fixed;inset:0;background:white;z-index:9999;display:block !important;}
    .modal{border-radius:0;max-height:100vh !important;padding:16px;}
    .modal-close,.btn-row{display:none !important;}
    #print-content{box-shadow:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
let CONFIG = JSON.parse(localStorage.getItem('produkcja_config') || '{}');
let SERVER_URL = CONFIG.server_url || '';
let API_KEY    = CONFIG.api_key    || '';
const HEADERS  = () => ({'Content-Type':'application/json','x-api-key':API_KEY});

async function api(path, opts={}) {
  const url = SERVER_URL.replace(/\/$/, '') + path;
  const res = await fetch(url, {headers: HEADERS(), ...opts});
  if (!res.ok) {
    const t = await res.text().catch(() => 'Błąd serwera');
    let msg = t;
    try {
      const parsed = JSON.parse(t);
      if (typeof parsed.detail === 'string') msg = parsed.detail;
      else if (Array.isArray(parsed.detail)) msg = parsed.detail.map(e => e.msg || JSON.stringify(e)).join('; ');
      else msg = JSON.stringify(parsed);
    } catch(_) {}
    console.error(`API ERROR ${res.status} ${path}:`, t);
    throw new Error(`[${res.status}] ${msg}`);
  }
  return res.json();
}
const get  = p => api(p);
const post = (p,b) => api(p, {method:'POST', body:JSON.stringify(b)});
const put  = (p,b) => api(p, {method:'PUT', body:JSON.stringify(b)});
const del  = p => api(p, {method:'DELETE'});
const patch= (p,b) => api(p, {method:'PATCH', body:JSON.stringify(b)});

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state = {
  screen: SERVER_URL ? 'login' : 'config',
  user: null,
  activeTab: 'praca',
  loading: false,
  error: null,

  // Pracownik
  operacje: [],
  aktywnesje: [],         // wiele sesji równoległych
  timers: {},             // sesja_id -> {sec, interval, paused}
  qrScanMode: false,
  qrLastCodes: [],        // historia QR

  // Majster
  majsterStats: null,
  majsterSubTab: 'live',

  // Magazynier
  transportOps: [],

  // Zlecenia
  zlecenia: [],
  zlecenieModal: null,    // null | 'new' | {edytowane zlecenie}
  operacjeModal: null,    // {zlecenie} | null
  zlecenieKoszty: null,

  // Admin
  adminTab: 'uzytkownicy',
  users: [],
  stawki: [],
  produktyZlecenia: [],   // produkty aktualnie edytowanego zlecenia
  katalog: [],
  userModal: null,
  stawkaModal: null,
  produktModal: null,

  // Modal stop/pauza
  stopModal: null,        // null | {sesja}
  pauzaModal: null,
  nieprodukcyjnaModal: false,

  // QR gen
  qrGenModal: false,
  qrGenKod: '',
  qrGenTitle: '',
  qrZleceniePickerModal: null,

  // Pracownik wydajność
  pracaSubTab: 'praca',   // praca | wydajnosc
  pracaWydajnosc: null,
  pracaWydOkres: 'tydzien',

  // Majster wydajność
  wydajnoscMajster: null,
  wydajnoscOkres: 'dzis',
  majsterExpandedUser: null,
  majsterExpandedZlecenie: null,  // id zlecenia rozwiniętego w tab Zlecenia
  majsterOpsCache: {},            // {zid: [operacje]} - cache operacji dla majstra
  raportOkres: {od:"", do:""},
  raportWydOkres: {od:"", do:""},
  raportWydTyp: "skrocony",

  // Autofill operacje
  autofillSourceId: null,
  autofillOperacje: [],

  // Print modal
  printModal: null,
  printOps: [],
  warehouseInfo: null,
  zlecenieDetailsModal: null,
  zlecenieModal: null,
  qrInneMode: false,
  qrManualMode: false,
};

function setState(p, noRender) {
  state = {...state, ...p};
  if (!noRender) render();
}

// ══════════════════════════════════════════════════════════════
//  TIMERS (multi-sesja)
// ══════════════════════════════════════════════════════════════
function startTimerFor(sesja) {
  if (state.timers[sesja.id]?.interval) clearInterval(state.timers[sesja.id].interval);
  const isPaused = () => {
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
  };
  const update = () => {
    const el = document.getElementById('timer-'+sesja.id);
    if (!el) return;
    const paused = isPaused();
    // calc elapsed minus pauses
    const start = parseServerDT(sesja.start_time);
    let elapsed = Math.floor((Date.now() - start) / 1000);
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    for (const p of pauzy) {
      if (p.koniec) {
        elapsed -= Math.floor((parseServerDT(p.koniec) - parseServerDT(p.start)) / 1000);
      } else {
        elapsed -= Math.floor((Date.now() - parseServerDT(p.start)) / 1000);
      }
    }
    el.textContent = fmtTime(Math.max(0,elapsed));
    el.style.color = paused ? 'var(--orange)' : 'var(--green)';
  };
  update();
  const interval = setInterval(update, 1000);
  state.timers[sesja.id] = {interval, sesja};
}

function stopAllTimers() {
  for (const t of Object.values(state.timers)) {
    if (t.interval) clearInterval(t.interval);
  }
  state.timers = {};
}

function fmtTime(sec) {
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// Serwer zwraca UTC z 'Z'. Dla starszych rekordów bez 'Z' – local time.
function parseServerDT(s) {
  if (!s) return new Date(NaN);
  if (/Z$|[+-]\d{2}:\d{2}$/.test(s)) return new Date(s);
  return new Date(s.replace(' ','T')); // stary rekord – local
}

function isPaused(sesja) {
  const pauzy = JSON.parse(sesja.pauzy || '[]');
  return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
}

// ══════════════════════════════════════════════════════════════
//  DATA LOADERS
// ══════════════════════════════════════════════════════════════
async function loadPracownik() {
  setState({loading:true, error:null});
  try {
    const [ops, sesje] = await Promise.all([
      get('/api/operacje/aktywne'),
      get(`/api/sesje/aktywne/${state.user.id}`),
    ]);
    stopAllTimers();
    for (const s of sesje) startTimerFor(s);
    setState({operacje:ops, aktywnesje:sesje, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadMajster() {
  setState({loading:true, error:null, majsterOpsCache:{}});
  try {
    const stats = await get('/api/stats/majster');
    setState({majsterStats:stats, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadMagazynier() {
  setState({loading:true, error:null});
  try {
    const ops = await get('/api/operacje/zakonczone-do-transportu');
    setState({transportOps:ops, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadZlecenia() {
  setState({loading:true, error:null});
  try {
    const zl = await get('/api/zlecenia');
    setState({zlecenia:zl, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadAdmin() {
  setState({loading:true, error:null});
  try {
    const [users, stawki, katalog] = await Promise.all([
      get('/api/users'), get('/api/stawki'), get('/api/katalog')
    ]);
    setState({users, stawki, katalog, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function loadPracownikWydajnosc(okres) {
  const o = okres || state.pracaWydOkres;
  setState({pracaWydOkres: o});
  try {
    const w = await get(`/api/stats/wydajnosc/${state.user.id}?okres=${o}`);
    setState({pracaWydajnosc: w});
  } catch(e) { alert(e.message); }
}

async function loadWydajnoscMajster(okres) {
  const o = okres || state.wydajnoscOkres;
  setState({wydajnoscOkres: o, wydajnoscMajster: null});
  try {
    const w = await get(`/api/stats/wydajnosc?okres=${o}`);
    setState({wydajnoscMajster: w});
  } catch(e) {
    setState({wydajnoscMajster: {pracownicy: [], error: e.message}});
  }
}

// ══════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════
async function doLogin(username, password) {
  setState({loading:true, error:null});
  try {
    const user = await post('/api/login', {username, password});
    stopWHRefresh();
    const tab = defaultTab(user.role);
    setState({user, screen:'main', loading:false, activeTab:tab});
    loadTabData(tab);
  } catch(e) {
    setState({loading:false, error:'Nieprawidłowy login lub hasło'});
  }
}

function defaultTab(role) {
  if (role === 'magazynier') return 'magazyn';
  if (role === 'majster')    return 'majster';
  if (role === 'admin')      return 'admin';
  return 'praca';
}

async function startSesja(operacjaId) {
  try {
    await post('/api/sesje/start', {operacja_id:operacjaId, user_id:state.user.id, typ:'operacja'});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function startZbrojenie(operacjaId) {
  try {
    await post('/api/sesje/start', {operacja_id:operacjaId, user_id:state.user.id, typ:'zbrojenie'});
    setState({qrZleceniePickerModal:null});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function startNieprodukcyjna(opis) {
  try {
    await post('/api/sesje/start', {user_id:state.user.id, typ:'nieprodukcyjna', opis_nieprodukcyjnej:opis});
    setState({nieprodukcyjnaModal:false});
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function togglePauza(sesja) {
  try {
    const paused = isPaused(sesja);
    if (paused) {
      await post('/api/sesje/pauza/stop', {sesja_id:sesja.id});
    } else {
      await post('/api/sesje/pauza/start', {sesja_id:sesja.id, powod:''});
    }
    await loadPracownik();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function stopSesja(sesjaId, ilosc, uwagi) {
  const sesja = state.stopModal;
  const wasZbrojenie = sesja && sesja.typ === 'zbrojenie';
  const zbrojOpId = sesja && sesja.operacja_id;
  try {
    await post('/api/sesje/stop', {sesja_id:sesjaId, ilosc_sztuk:parseInt(ilosc)||0, uwagi:uwagi||''});
    setState({stopModal:null});
    await loadPracownik();
    // Po zakończeniu zbrojenia: odśwież dane operacji w otwartym QR modal
    if (wasZbrojenie && state.qrZleceniePickerModal) {
      const m = state.qrZleceniePickerModal;
      const zl = m.zlecenie;
      // Pobierz świeżą listę operacji i oznacz zbrojenie jako wykonane
      try {
        const ops = await get(`/api/zlecenia/${zl.id}/operacje`);
        // Uzupełnij zbrojenie_wykonane: jeśli op nie ma aktywnej sesji zbrojenia, a miała czas_zbrojenia_min, uznaj za wykonane
        const updatedOps = ops.map(op => ({
          ...op,
          zbrojenie_wykonane: op.id === zbrojOpId ? true : (op.zbrojenie_wykonane || false),
        }));
        setState({qrZleceniePickerModal: {...m, operacje: updatedOps}});
      } catch(e2) {}
    }
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

function stopSesjaModal() {
  const s = state.stopModal;
  if (!s) return;
  const isZbrojenie = s.typ === 'zbrojenie';
  const isNieprod = s.typ === 'nieprodukcyjna';
  const ilosc = (isZbrojenie || isNieprod) ? 0 : (parseInt(document.getElementById('stop-ilosc')?.value)||0);
  const uwagi = document.getElementById('stop-uwagi')?.value || '';
  stopSesja(s.id, ilosc, uwagi);
}

function clearQRHistory() {
  localStorage.removeItem('qr_historia');
  setState({qrLastCodes: []});
}

async function scanQR(kod) {
  if (!kod.trim()) return;
  try {
    const res = await get('/api/scan/' + encodeURIComponent(kod.trim()));
    // dodaj do historii
    const hist = [kod.trim(), ...state.qrLastCodes.filter(c=>c!==kod.trim())].slice(0,10);
    setState({qrLastCodes: hist, qrScanMode:false});
    localStorage.setItem('qr_historia', JSON.stringify(hist));
    showQRResult(res);
  } catch(e) {
    alert('Nie znaleziono kodu QR: ' + kod);
  }
}

function showQRResult(res) {
  if (res.type === 'operacja') {
    const op = res.data;
    setState({qrZleceniePickerModal: {
      zlecenie: {numer: op.zl_numer, nazwa: op.zl_nazwa, id: op.zlecenie_id, ilosc_sztuk: op.ilosc_sztuk},
      operacje: [op],
    }});
  } else if (res.type === 'zlecenie') {
    setState({qrZleceniePickerModal: {zlecenie: res.data, operacje: res.operacje}});
  }
}

function renderQRZleceniePickerModal() {
  const m = state.qrZleceniePickerModal;
  if (!m) return '';
  const z = m.zlecenie;
  const ops = m.operacje || [];
  const dostepne = ops.filter(o => o.status !== 'zakonczone' && o.status !== 'anulowane');
  // Oblicz ile sztuk pozostało do zrobienia
  const iloscTotal = z.ilosc_sztuk || 0;
  const iloscWykonana = ops.reduce((sum, op) => sum + (op.ilosc_wykonana||0), 0);
  const iloscPozostalo = Math.max(0, iloscTotal - (ops.length ? Math.min(...ops.map(op => op.ilosc_wykonana||0)) : 0));

  let html = `
  <div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="setState({qrZleceniePickerModal:null})">×</button>
      <h3>📋 ${z.numer}</h3>
      <div style="color:var(--dim);font-size:13px;margin-bottom:10px">${z.nazwa}</div>
      <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--dim)">Zlecona ilość:</span>
          <span style="font-weight:700;font-size:16px;color:var(--text)">${iloscTotal} szt.</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--dim)">Do wykonania:</span>
          <span style="font-weight:700;font-size:20px;color:${iloscPozostalo===0?'var(--green)':'var(--accent)'}">${iloscPozostalo} szt.</span>
        </div>
      </div>`;
  if (!dostepne.length) {
    html += `<div class="empty">Brak dostępnych operacji do rozpoczęcia</div>`;
  } else {
    html += `<div style="color:var(--dim);font-size:12px;margin-bottom:10px">Wybierz operację:</div>`;
    dostepne.forEach(op => {
      const opWykonana = op.ilosc_wykonana || 0;
      const opPozostalo = Math.max(0, iloscTotal - opWykonana);
      const opProg = iloscTotal > 0 ? Math.min(100, Math.round(opWykonana / iloscTotal * 100)) : 0;
      const opZbrMin = op.czas_zbrojenia_min || 0;

      // Stan sesji dla tej operacji
      const sesjaOp = (state.aktywnesje||[]).find(s => s.operacja_id === op.id && s.typ === 'operacja');
      const sesjaZbr = (state.aktywnesje||[]).find(s => s.operacja_id === op.id && s.typ === 'zbrojenie');
      const czyOpAktywna = !!sesjaOp;
      const czyZbrAktywne = !!sesjaZbr;

      // Czy zbrojenie zostało już wykonane (flaga z serwera)
      const zbrWykonane = !!op.zbrojenie_wykonane;

      html += `<div class="card" style="padding:12px;margin-bottom:10px">`;

      // Nagłówek operacji
      html += `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${op.kolejnosc}. ${op.nazwa}</div>
            <div style="font-size:12px;color:var(--dim)">${op.stanowisko||'—'}${op.czas_norma?' | norma: '+op.czas_norma+' min/szt':''}</div>
            <div style="font-size:12px;margin-top:4px">
              <span style="color:var(--dim)">Wykonano: </span>
              <span style="font-weight:600">${opWykonana}/${iloscTotal} szt.</span>
              ${opPozostalo > 0 ? `<span style="color:var(--accent);margin-left:6px">zostało: <b>${opPozostalo}</b></span>` : '<span style="color:var(--green);margin-left:6px">✅</span>'}
            </div>
            <div class="progress-wrap" style="height:4px;margin-top:6px"><div class="progress-bar" style="width:${opProg}%;background:${opProg>=100?'var(--green)':'var(--accent)'}"></div></div>
          </div>
        </div>`;

      // Przyciski akcji - zbrojenie pierwsze jeśli jest i nie zostało wykonane
      if (opZbrMin > 0 && !zbrWykonane) {
        if (czyZbrAktywne) {
          html += `
          <div style="background:rgba(243,156,18,0.12);border:1px solid var(--orange);border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <div style="font-size:12px;color:var(--orange);font-weight:700">⚙ Zbrojenie w toku (${opZbrMin} min)</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px">Zakończ zbrojenie, aby uruchomić operację</div>
          </div>`;
          html += `<div class="btn-row">
            <button class="btn btn-red" onclick="setState({stopModal:${JSON.stringify(sesjaZbr).replace(/"/g,'&quot;')}})">⏹ Zakończ zbrojenie</button>
          </div>`;
        } else if (czyOpAktywna) {
          html += `
          <div style="background:rgba(39,174,96,0.1);border:1px solid var(--green);border-radius:8px;padding:10px 12px;margin-bottom:8px">
            <div style="font-size:12px;color:var(--green);font-weight:700">▶ Operacja w toku</div>
          </div>`;
          html += `<div class="btn-row">
            <button class="btn btn-red" onclick="setState({stopModal:${JSON.stringify(sesjaOp).replace(/"/g,'&quot;')}})">⏹ Zakończ operację</button>
          </div>`;
        } else {
          // Zbrojenie pierwsze - operacja zablokowana
          html += `
          <div style="display:flex;gap:8px;flex-direction:column">
            <button class="btn btn-accent" style="background:var(--orange);color:#1a1f2e" onclick="startZbrojenie(${op.id})">⚙ Uruchom zbrojenie (${opZbrMin} min)</button>
            <button class="btn btn-outline" style="opacity:0.4;cursor:not-allowed" disabled title="Najpierw uruchom i zakończ zbrojenie">▶ Uruchom operację (po zbroj.)</button>
          </div>`;
        }
      } else {
        // Brak zbrojenia - normalna operacja
        if (czyOpAktywna) {
          html += `<div class="btn-row">
            <button class="btn btn-red" onclick="setState({stopModal:${JSON.stringify(sesjaOp).replace(/"/g,'&quot;')}})">⏹ Zakończ operację</button>
          </div>`;
        } else {
          html += `<button class="btn btn-green" onclick="pickOperacjaFromQR(${op.id})">▶ Uruchom operację</button>`;
        }
      }

      html += `</div>`;
    });
  }
  // Opcja INNE
  if (!state.qrInneMode) {
    html += `
    <div class="card" style="padding:12px;margin-bottom:8px;cursor:pointer;border-color:var(--accent)"
         onclick="setState({qrInneMode:true})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;color:var(--accent)">⚡ Inne</div>
          <div style="font-size:12px;color:var(--dim)">Wpisz co robisz i rozpocznij rejestrację</div>
        </div>
        <span style="font-size:20px">+</span>
      </div>
    </div>`;
  } else {
    html += `
    <div class="card" style="padding:12px;margin-bottom:8px;border-color:var(--accent)">
      <div style="font-weight:600;color:var(--accent);margin-bottom:10px">⚡ Inne – wpisz co robisz</div>
      <div class="field" style="margin-bottom:10px">
        <input id="qr-inne-opis" type="text" placeholder="Np. ustawianie maszyny, regulacja..."
               onkeydown="if(event.key==='Enter')startQRInne()">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-accent" onclick="startQRInne()">▶ Start</button>
        <button class="btn btn-outline" onclick="setState({qrInneMode:false})">Anuluj</button>
      </div>
    </div>`;
  }

  html += `
      <button class="btn btn-outline" style="margin-top:8px"
              onclick="setState({qrZleceniePickerModal:null,qrInneMode:false})">Zamknij</button>
    </div>
  </div>`;
  return html;
}

async function startQRInne() {
  const opis = document.getElementById('qr-inne-opis')?.value?.trim();

  const m = state.qrZleceniePickerModal;
  const zid = m?.zlecenie?.id || null;
  setState({qrZleceniePickerModal:null, qrInneMode:false});
  try {
    const body = {user_id: state.user.id, typ: 'nieprodukcyjna', opis_nieprodukcyjnej: opis};
    if (zid) { body.typ = 'inne_zlecenie'; body.zlecenie_id_inne = zid; }
    await post('/api/sesje/start', body);
    await loadPracownik();
  } catch(e) { alert('Błąd: ' + (e.message||e)); }
}

let _savingZlecenie = false;
async function saveZlecenie(data) {
  if (_savingZlecenie) return;
  _savingZlecenie = true;
  try {
    if (data.id) {
      await put(`/api/zlecenia/${data.id}`, data);
      setState({zlecenieModal:null});
      await loadZlecenia();
    } else {
      const result = await post('/api/zlecenia', data);
      const newId = result.id;
      // Skopiuj operacje ze wzorcowego zlecenia
      const ops = state.autofillOperacje || [];
      if (ops.length && state.autofillSourceId && newId) {
        for (const op of ops) {
          try {
            await post('/api/operacje', {
              zlecenie_id: newId,
              nazwa: op.nazwa,
              kolejnosc: op.kolejnosc,
              czas_norma: op.czas_norma,
              stanowisko: op.stanowisko || '',
              opis_czynnosci: op.opis_czynnosci || '',
              czas_zbrojenia_min: op.czas_zbrojenia_min || 0,
            });
          } catch(e2) { console.error('Błąd kopiowania operacji:', e2); }
        }
      }
      // Najpierw odśwież listę zleceń, potem zamknij modal
      await loadZlecenia();
      setState({zlecenieModal:null, autofillSourceId:null, autofillOperacje:[]});
    }
  } catch(e) {
    alert('Błąd: ' + e.message);
  } finally {
    _savingZlecenie = false;
  }
}

async function deleteZlecenie(id) {
  if (!confirm('Usunąć zlecenie i wszystkie jego operacje?')) return;
  try {
    await del(`/api/zlecenia/${id}`);
    await loadZlecenia();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function changeZlecenieStatus(id, status) {
  try {
    await patch(`/api/zlecenia/${id}/status`, {status});
    await loadZlecenia();
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

function renderWarehouseLoginPanel(wi) {
  // Pokazujemy TYLKO zakończone operacje oczekujące na następną (coś do odbioru/przewiezienia)
  const zakonczone = (wi.zakonczone || []).filter(op => {
    const nxt = (wi.next_map || {})[String(op.id)];
    return true; // pokaż wszystkie zakończone – nawet ostatnią (żeby wiedzieć że gotowe)
  });
  const next_map = wi.next_map || {};
  let html = '';

  if (!zakonczone.length) {
    html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;text-align:center">'
          + '<div style="font-size:22px;margin-bottom:6px">✅</div>'
          + '<div style="font-size:13px;color:var(--dim)">Brak zakończonych operacji do odbioru</div>'
          + '</div>';
    return html;
  }

  html += '<div style="background:rgba(39,174,96,.10);border:1px solid var(--green);border-radius:12px;padding:14px 16px;margin-bottom:10px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        + '<span style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px">📦 Do odbioru (' + zakonczone.length + ')</span>'
        + '<span style="font-size:10px;color:var(--dim)">odśwież co 2 min</span>'
        + '</div>';

  zakonczone.forEach((op, i) => {
    const nxt = next_map[String(op.id)];
    const isLast = !nxt;
    html += '<div style="padding:8px 0;' + (i < zakonczone.length-1 ? 'border-bottom:1px solid rgba(39,174,96,.2)' : '') + '">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
          + '<div style="flex:1">'
          + '<div style="font-weight:700;font-size:13px">' + op.kolejnosc + '. ' + op.nazwa + '</div>'
          + '<div style="font-size:12px;color:var(--dim);margin-top:2px">📋 ' + op.zl_numer + ' – ' + op.zl_nazwa + '</div>'
          + '<div style="font-size:12px;color:var(--dim)">🏭 ' + (op.stanowisko||'—') + '</div>'
          + '</div>'
          + '<div style="text-align:right;margin-left:8px;white-space:nowrap">'
          + '<span style="font-size:13px;font-weight:700;color:var(--green)">' + op.ilosc_wykonana + '/' + op.ilosc_sztuk + ' szt.</span>'
          + '</div></div>'
          + '<div style="margin-top:5px;padding:5px 8px;border-radius:6px;font-size:12px;' + (isLast ? 'background:rgba(39,174,96,.15);color:var(--green)' : 'background:rgba(232,160,32,.12);color:var(--accent)') + '">'
          + (isLast
              ? '✅ Gotowe – ostatnia operacja, możliwy odbiór końcowy'
              : '▶ Następna: <b>' + nxt.kolejnosc + '. ' + nxt.nazwa + '</b>' + (nxt.stanowisko ? ' → <b>' + nxt.stanowisko + '</b>' : ''))
          + '</div></div>';
  });

  html += '</div>';
  return html;
}

// ──────────────────────────────────────────────────────────────
//  HELPER: szacowany czas zakończenia zlecenia
// ──────────────────────────────────────────────────────────────
function szacowanyKoniec(z, ops) {
  // ops = lista operacji z cache (lub null)
  // z = zlecenie z polami: ilosc_sztuk, op_done, op_total
  if (!z) return null;
  const ilosc = z.ilosc_sztuk || 1;

  // Oblicz pozostały czas na bazie operacji z cache
  if (ops && ops.length > 0) {
    let pozostaleMin = 0;
    ops.forEach(op => {
      if (op.status === 'zakonczona') return;
      const norma = op.czas_norma || 0;
      const wykonano = op.ilosc_wykonana || 0;
      const pozostaloSztuk = Math.max(0, ilosc - wykonano);
      if (norma) pozostaleMin += norma * pozostaloSztuk;
      // zbrojenie: dolicz tylko jeśli nie ma aktywnej/zakończonej sesji zbrojenia dla tej op
      const zbrMin = op.czas_zbrojenia_min || 0;
      if (zbrMin) {
        // Sprawdź czy zbrojenie jest już aktywne lub wykonane (przez aktywne sesje)
        const zbrJuzAkt = (state.aktywnesje||[]).some(s => s.operacja_id === op.id && s.typ === 'zbrojenie');
        // Jeśli nie aktywne, zakładamy że zbrojenie jest do zrobienia (serwer weryfikuje czy zakończone)
        if (!zbrJuzAkt) pozostaleMin += zbrMin;
      }
    });
    if (pozostaleMin <= 0) return null;
    const koniec = new Date(Date.now() + pozostaleMin * 60 * 1000);
    return koniec;
  }

  // Fallback: brak szczegółów ops – nie szacuj
  return null;
}

function fmtEstimatedKoniec(dt) {
  if (!dt) return null;
  const today = new Date();
  const isToday = dt.toDateString() === today.toDateString();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const isTomorrow = dt.toDateString() === tomorrow.toDateString();
  const hm = dt.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
  if (isToday) return `dziś ~${hm}`;
  if (isTomorrow) return `jutro ~${hm}`;
  return dt.toLocaleDateString('pl-PL', {day:'2-digit',month:'2-digit'}) + ` ~${hm}`;
}

              ${(() => { const estOps = (state.majsterOpsCache&&state.majsterOpsCache[z.id])||null; const est=szacowanyKoniec(z,estOps); return est?`<div class="card-sub" style="color:var(--blue)">🕐 Szac. koniec: ${fmtEstimatedKoniec(est)}</div>`:''; })()}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${statusBadge(z.status)}
              <span style="color:var(--dim);font-size:16px">${expanded?'▲':'▼'}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px">
            <span>Operacje: ${z.op_done}/${z.op_total}</span><span>${prog}%</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${prog}%;background:${prog>=100?'var(--green)':'var(--accent)'}"></div>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">
            📦 Sztuki: <b style="color:${sztProg>=100?'var(--green)':'var(--text)'}">${z.sztuki_wykonane||0}/${z.ilosc_sztuk}</b> (${sztProg}%)
          </div>
          ${expanded ? `
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
            ${ops === null ? '<div style="font-size:12px;color:var(--dim);text-align:center;padding:8px">⏳ Ładowanie operacji...</div>' :
              ops.length === 0 ? '<div style="font-size:12px;color:var(--dim)">Brak operacji</div>' :
              ops.map(op => {
                const opProg = z.ilosc_sztuk > 0 ? Math.round((op.ilosc_wykonana||0)/z.ilosc_sztuk*100) : 0;
                const stColor = op.status==='zakonczona'?'var(--green)':op.status==='w_toku'?'var(--accent)':'var(--dim)';
                const stIcon = op.status==='zakonczona'?'✅':op.status==='w_toku'?'▶':'⏳';
                return `<div style="padding:6px 0;border-bottom:1px solid rgba(46,53,72,.3)">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <div style="flex:1">
                      <div style="font-size:12px;font-weight:600">${stIcon} ${op.kolejnosc}. ${op.nazwa}</div>
                      <div style="font-size:11px;color:var(--dim)">${op.stanowisko||'—'}${op.czas_norma?' | norma: '+op.czas_norma+' min':''}</div>
                    </div>
                    <div style="text-align:right;margin-left:8px">
                      <div style="font-size:12px;font-weight:700;color:${stColor}">${op.ilosc_wykonana||0}/${z.ilosc_sztuk} szt.</div>
                      <div style="font-size:10px;color:var(--dim)">${opProg}%</div>
                    </div>
                  </div>
                  <div class="progress-wrap" style="height:4px;margin:4px 0 0">
                    <div class="progress-bar" style="width:${Math.min(100,opProg)}%;background:${stColor}"></div>
                  </div>
                </div>`;
              }).join('')
            }
          </div>` : ''}
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'koszty') {
    html += `<div class="section-hdr">💰 Koszty pracowników dziś</div>`;
    const koszty = stats.koszty_dzis || [];
    if (!koszty.length) {
      html += `<div class="empty">Brak danych</div>`;
    } else {
      let total = 0;
      html += `<table class="data-table"><thead><tr><th>Pracownik</th><th>Stanowisko</th><th>Min.</th><th>Koszt</th></tr></thead><tbody>`;
      koszty.forEach(k => {
        const koszt = k.koszt || 0;
        total += koszt;
        const min = Math.round((k.godz||0) * 60);
        html += `<tr>
          <td>${k.full_name}</td>
          <td style="font-size:11px">${k.stanowisko||'—'}</td>
          <td>${min}</td>
          <td style="color:var(--accent)">${fmtPLN(koszt)}</td>
        </tr>`;
      });
      html += `</tbody></table>
      <div class="card" style="margin-top:10px;text-align:center">
        <div style="font-size:12px;color:var(--dim)">ŁĄCZNIE DZIŚ</div>
        <div style="font-size:28px;font-weight:700;color:var(--accent)">${fmtPLN(total)}</div>
      </div>`;
    }
  }

  if (state.majsterSubTab === 'alerty') {
    const alerty = stats.alerty_norm || [];
    html += `<div class="section-hdr">⚠ Alerty norm (${alerty.length})</div>`;
    if (!alerty.length) {
      html += `<div class="card" style="text-align:center;padding:20px;border-color:var(--green)">
        <div style="font-size:32px">✅</div>
        <div style="color:var(--green);margin-top:8px">Wszystkie operacje w normie</div>
      </div>`;
    } else {
      alerty.forEach(a => {
        html += `
        <div class="alert-banner">
          <div style="font-weight:700">⚠ Przekroczono normę – ${a.zlecenie}, operacja: ${a.operacja}</div>
          <div style="font-size:12px;margin-top:2px">👤 ${a.pracownik}</div>
          <div>Norma: ${a.norma_min} min/szt. × ${a.ilosc_sztuk} szt. = ${a.norma_calkowita_min} min | Czas: ${a.elapsed_min} min | <strong style="font-size:15px">+${a.przekroczenie_pct}%</strong></div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'wydajnosc') {
    html += renderMajsterWydajnosc();
  }

  if (state.majsterSubTab === 'podsumowanie') {
    html += renderMajsterPodsumowanie(stats);
  }

  html += `<button class="btn-outline no-print" style="margin-top:8px" onclick="loadMajster()">🔄 Odśwież</button>`;
  return html;
}

function switchMajsterTab(tab) {
  setState({majsterSubTab: tab}, true);
  if (tab === 'wydajnosc' && !state.wydajnoscMajster) {
    loadWydajnoscMajster(state.wydajnoscOkres);
  }
  render();
}

async function toggleMajsterZlecenie(zid) {
  if (state.majsterExpandedZlecenie === zid) {
    setState({majsterExpandedZlecenie: null});
    return;
  }
  setState({majsterExpandedZlecenie: zid});
  // Jeśli brak w cache – załaduj (zawsze przeładuj przy rozwijaniu dla aktualnych danych)
  const cache = state.majsterOpsCache || {};
  if (cache[zid] === undefined) {
    try {
      const ops = await get('/api/zlecenia/' + zid + '/operacje');
      const newCache = {...(state.majsterOpsCache || {}), [zid]: ops};
      setState({majsterOpsCache: newCache});
    } catch(e) {
      const newCache = {...(state.majsterOpsCache || {}), [zid]: []};
      setState({majsterOpsCache: newCache});
    }
  }
}

// ─── Helper date functions ────────────────────────────────────────────────────
function getToday() {
  return new Date().toISOString().slice(0,10);
}
function getTodayMinus(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString().slice(0,10);
}

// ─── Raport PDF – Zlecenia ────────────────────────────────────────────────────
async function generateRaportZleceniaPDF() {
  const od = document.getElementById('raport-od')?.value || getTodayMinus(30);
  const do_ = document.getElementById('raport-do')?.value || getToday();
  setState({raportOkres: {od, do: do_}});
  try {
    const data = await get('/api/raporty/zlecenia?data_od=' + od + '&data_do=' + do_);
    printRaportZlecenia(data, od, do_);
  } catch(e) {
    alert('Błąd generowania raportu: ' + e.message);
  }
}

function printRaportZlecenia(data, od, doDt) {
  const zl = data.zlecenia || [];
  const totalWartosc = zl.reduce((a,z)=>a+(z.wartosc||0),0);
  const totalKoszt   = zl.reduce((a,z)=>a+(z.koszt_total||0),0);
  const totalZysk    = zl.reduce((a,z)=>a+(z.zysk||0),0);

  const statusColor = {aktywne:'#1a73e8', zakonczone:'#1e8a4c', anulowane:'#888', wstrzymane:'#e67e00'};
  const fmtPLNr = v => (parseFloat(v)||0).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' zł';
  const fmtMinr = v => { const m=Math.round(v||0); return Math.floor(m/60)+'h '+('0'+(m%60)).slice(-2)+'m'; };

  let zlHtml = '';
  zl.forEach(z => {
    const isZysk = z.zysk >= 0;
    const sesjeByOp = {};
    (z.sesje||[]).forEach(s => {
      if (!sesjeByOp[s.operacja]) sesjeByOp[s.operacja] = [];
      sesjeByOp[s.operacja].push(s);
    });
    zlHtml += `
    <div style="border:1px solid #ddd;border-radius:6px;margin-bottom:16px;overflow:hidden;break-inside:avoid">
      <div style="background:#f5f7fa;padding:10px 14px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-size:15px;font-weight:700">${z.numer}</span>
          <span style="font-size:13px;color:#555;margin-left:10px">${z.nazwa||''}</span>
        </div>
        <span style="background:${statusColor[z.status]||'#888'};color:#fff;font-size:11px;padding:2px 10px;border-radius:99px;font-weight:600">${z.status||''}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid #ddd">
        <div style="padding:8px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">ILOŚĆ</div>${z.ilosc_sztuk||0} szt.</div>
        <div style="padding:8px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">WARTOŚĆ</div>${fmtPLNr(z.wartosc)}</div>
        <div style="padding:8px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">KOSZT PRACY</div>${fmtPLNr(z.koszt_pracy)}</div>
        ${z.koszt_zbrojenia>0?`<div style="padding:8px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#e67e00;font-size:10px">⚙ ZBROJENIE</div>${fmtPLNr(z.koszt_zbrojenia)}</div>`:`<div style="padding:8px 12px;border-right:1px solid #ddd;font-size:12px"><div style="color:#888;font-size:10px">KOSZT ŁĄCZNY</div>${fmtPLNr(z.koszt_total)}</div>`}
        <div style="padding:8px 12px;font-size:12px"><div style="color:#888;font-size:10px">ZYSK</div><span style="color:${isZysk?'#1e8a4c':'#c0392b'};font-weight:700">${fmtPLNr(z.zysk)}</span></div>
      </div>`;
    if (Object.keys(sesjeByOp).length) {
      zlHtml += `<div style="padding:8px 14px">
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">Sesje pracy</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:#f5f7fa">
            <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Operacja</th>
            <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Pracownik</th>
            <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Data</th>
            <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Czas</th>
            <th style="padding:4px 8px;text-align:center;border:1px solid #eee">Szt.</th>
            <th style="padding:4px 8px;text-align:right;border:1px solid #eee">Koszt</th>
            <th style="padding:4px 8px;text-align:left;border:1px solid #eee">Uwagi</th>
          </tr></thead><tbody>`;
      (z.sesje||[]).forEach(s => {
        // Sprawdź czy w normie: czas_norma × ilosc_sztuk vs czas_min (czas_norma w min/szt)
        const normaCalk = (s.czas_norma||0) * (s.ilosc_sztuk||1);
        const wNormie = normaCalk > 0 && s.czas_min <= normaCalk;
        const przekroczone = normaCalk > 0 && s.czas_min > normaCalk;
        const rowBg = przekroczone ? 'background:#fff3f3' : wNormie ? 'background:#f3fff6' : '';
        const normaBadge = normaCalk > 0
          ? (wNormie
              ? `<span style="color:#1e8a4c;font-weight:700;font-size:10px">✓ OK</span>`
              : `<span style="color:#c0392b;font-weight:700;font-size:10px">⚠ PRZEKR.</span>`)
          : '';
        zlHtml += `<tr style="${rowBg}">
          <td style="padding:3px 8px;border:1px solid #eee">${s.operacja||'—'} ${normaBadge}</td>
          <td style="padding:3px 8px;border:1px solid #eee">${s.pracownik||'—'}</td>
          <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${s.data||'—'}</td>
          <td style="padding:3px 8px;border:1px solid #eee;text-align:center;color:${przekroczone?'#c0392b':wNormie?'#1e8a4c':'inherit'};font-weight:${przekroczone||wNormie?'700':'400'}">${fmtMinr(s.czas_min)}${normaCalk>0?' / norma: '+fmtMinr(normaCalk):''}</td>
          <td style="padding:3px 8px;border:1px solid #eee;text-align:center">${s.ilosc_sztuk||0}</td>
          <td style="padding:3px 8px;border:1px solid #eee;text-align:right">${fmtPLNr(s.koszt)}</td>
          <td style="padding:3px 8px;border:1px solid #eee;color:#555;font-style:italic">${s.uwagi||'—'}</td>
        </tr>`;
      });
      zlHtml += `</tbody></table></div>`;
    }
    if (z.produkty && z.produkty.length) {
      zlHtml += `<div style="padding:6px 14px 10px">
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:4px">Produkty / Zakupy</div>`;
      z.produkty.forEach(p => {
        zlHtml += `<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #f0f0f0">
          <span>${p.nazwa}</span><span style="color:#888">${p.ilosc} szt. × ${fmtPLNr(p.cena)} = <b>${fmtPLNr(p.ilosc*p.cena)}</b></span></div>`;
      });
      zlHtml += `</div>`;
    }
    zlHtml += `</div>`;
  });

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Raport zleceń ${od} – ${doDt}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; color: #222; }
    @media print { body { padding: 0; } }
  </style>
  </head><body>
  <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #222;padding-bottom:10px;margin-bottom:18px">
    <div>
      <div style="font-size:22px;font-weight:700">Raport zleceń produkcyjnych</div>
      <div style="font-size:13px;color:#555">Okres: ${od} – ${doDt} | Wygenerowano: ${new Date().toLocaleString('pl-PL')}</div>
    </div>
    <div style="text-align:right;font-size:13px">
      <div>Zleceń: <b>${zl.length}</b></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
    <div style="background:#f5f7fa;border-radius:6px;padding:12px;text-align:center">
      <div style="font-size:11px;color:#888;text-transform:uppercase">Łączna wartość</div>
      <div style="font-size:20px;font-weight:700;color:#1a73e8">${fmtPLNr(totalWartosc)}</div>
    </div>
    <div style="background:#f5f7fa;border-radius:6px;padding:12px;text-align:center">
      <div style="font-size:11px;color:#888;text-transform:uppercase">Łączne koszty</div>
      <div style="font-size:20px;font-weight:700;color:#e67e00">${fmtPLNr(totalKoszt)}</div>
    </div>
    <div style="background:#f5f7fa;border-radius:6px;padding:12px;text-align:center">
      <div style="font-size:11px;color:#888;text-transform:uppercase">Łączny zysk</div>
      <div style="font-size:20px;font-weight:700;color:${totalZysk>=0?'#1e8a4c':'#c0392b'}">${fmtPLNr(totalZysk)}</div>
    </div>
  </div>
  ${zlHtml}
  </body></html>`;

  const w = window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

// ─── Raport PDF – Wydajność pracowników ──────────────────────────────────────
async function generateRaportWydajnoscPDF() {
  const od = document.getElementById('rwd-od')?.value || getTodayMinus(7);
  const do_ = document.getElementById('rwd-do')?.value || getToday();
  const typ = document.getElementById('rwd-typ')?.value || 'skrocony';
