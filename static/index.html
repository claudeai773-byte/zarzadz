        bom.forEach(m => {
          const g = m.gatunek_stali || 'S235';
          if (!byGrade[g]) byGrade[g] = 0;
          if (m.included !== false) byGrade[g] += (m.masa_kg || 0);
        });
        const totalKg = Object.values(byGrade).reduce((a,b)=>a+b,0);

        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;padding:8px 10px;background:rgba(39,174,96,0.06);border:1px solid rgba(39,174,96,0.2);border-radius:8px">';
        html += '<span style="font-size:11px;color:var(--dim);font-weight:700;margin-right:4px">⚖ Zapotrzebowanie:</span>';
        Object.entries(byGrade).forEach(([g, kg]) => {
          html += '<span style="background:rgba(232,160,32,0.15);border:1px solid rgba(232,160,32,0.3);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;color:var(--accent)">' + g + ': <b>' + kg.toFixed(1) + ' kg</b></span>';
        });
        html += '<span style="margin-left:auto;font-size:12px;font-weight:700;color:var(--green)">Σ ' + totalKg.toFixed(1) + ' kg</span></div>';

        html += '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden">';
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        html += '<thead><tr style="background:var(--panel);border-bottom:1px solid var(--border)"><th style="padding:6px 8px;text-align:left;width:28px"></th><th style="padding:6px 8px;text-align:left">Materiał</th><th style="padding:6px 8px;text-align:right">Masa</th><th style="padding:6px 8px;text-align:center">Status</th></tr></thead><tbody>';
        bom.forEach((m, idx) => {
          const included = m.included !== false;
          const masaStr = m.masa_kg > 0 ? '<b>' + m.masa_kg.toFixed(2) + '</b> kg' : '<b>' + m.ilosc + '</b> ' + m.jm;
          const statusHtml = m.w_bazie
            ? '<span style="color:var(--green);font-size:10px;font-weight:700">✓ w bazie</span>'
            : '<span style="color:var(--blue);font-size:10px;font-weight:700">+ nowy</span>';
          const subParts = [
            m.indeks_bazy || m.kod,
            m.gatunek_stali ? '<span style="color:var(--accent)">' + m.gatunek_stali + '</span>' : '',
            m.wymiary_str ? '<span style="color:var(--dim)">' + m.wymiary_str + '</span>' : '',
            m.ilosc > 1 ? m.ilosc + ' szt.' : '',
          ].filter(Boolean).join(' · ');
          html += '<tr style="border-bottom:1px solid var(--border);opacity:' + (included ? 1 : 0.4) + '">';
          html += '<td style="padding:6px 8px;text-align:center"><input type="checkbox" ' + (included ? 'checked' : '') + ' onchange="toggleBomItem(' + idx + ',this.checked)"></td>';
          html += '<td style="padding:6px 8px"><div style="font-weight:600">' + (m.opis_bazy || m.opis) + '</div>';
          html += '<div style="font-size:10px;color:var(--dim)">' + subParts + '</div></td>';
          html += '<td style="padding:6px 8px;text-align:right;white-space:nowrap">' + masaStr + '</td>';
          html += '<td style="padding:6px 8px;text-align:center">' + statusHtml + '</td></tr>';
        });
        html += '</tbody></table></div>';
        html += '<div style="font-size:11px;color:var(--dim);margin-bottom:14px">✏ Niebieskie pozycje (<b>+ nowy</b>) zostaną automatycznie dodane do bazy materiałów ze stanem 0. Masa obliczona z wymiarów (ρ=7850 kg/m³).</div>';
      }

      const bomLabel = bomIncluded > 0 ? ' + BOM (' + bomIncluded + ' poz.)' : '';
      html += '<div style="display:flex;gap:8px;margin-top:4px">';
      html += '<button class="btn btn-accent" style="flex:1" onclick="confirmPdfImport()">✅ Importuj technologię' + bomLabel + '</button>';
      html += '<button class="btn-outline" onclick="setState({importPdfPreview:null,importPdfBom:[]})">✕ Anuluj</button>';
      html += '</div>';
    }

    // ── KROK 3: Wynik ─────────────────────────────────────────────────────
    if (res) {
      const hasErrors = res.errors && res.errors.length;
      html += '<div class="card" style="padding:16px;background:' + (hasErrors ? 'rgba(231,76,60,0.06)' : 'rgba(39,174,96,0.06)') + ';border:1px solid ' + (hasErrors ? 'var(--red)' : 'var(--green)') + '">';
      html += '<div style="font-size:15px;font-weight:700;margin-bottom:10px">' + (hasErrors ? '⚠ Import z ostrzeżeniami' : '✅ Import zakończony pomyślnie') + '</div>';
      html += '<div style="font-size:13px;line-height:2">';
      html += '📋 Zlecenie: <b>' + res.numer + '</b> – ' + res.nazwa + '<br>';
      html += '🔢 Operacje: <b>' + res.operacje_created + '</b><br>';
      html += '📦 BOM: <b>' + (res.bom_added || 0) + '</b> pozycji' + (res.bom_new_materialy > 0 ? ' (' + res.bom_new_materialy + ' nowych w bazie)' : '') + '<br>';
      if (res.nowe_stanowiska && res.nowe_stanowiska.length) html += '🏭 Nowe stanowiska: <b>' + res.nowe_stanowiska.join(', ') + '</b><br>';
      if (hasErrors) html += '<span style="color:var(--red)">⛔ Błędy: ' + res.errors.join('; ') + '</span>';
      html += '</div>';
      if (res.nowe_stanowiska && res.nowe_stanowiska.length) {
        html += '<div style="font-size:12px;background:rgba(230,126,0,0.1);border:1px solid var(--orange);border-radius:6px;padding:8px 12px;margin-top:10px">⚠ Uzupełnij stawki dla nowych stanowisk w zakładce <b>Stawki</b></div>';
      }
      html += '<div style="display:flex;gap:8px;margin-top:12px">';
      html += '<button class="btn btn-green" onclick="setState({activeTab:\'zlecenia\'});loadTabData(\'zlecenia\')">📋 Przejdź do zleceń →</button>';
      html += '<button class="btn-outline" onclick="setState({importPdfResult:null,importPdfPreview:null,importPdfBom:[]})">+ Importuj kolejny</button>';
      html += '</div></div>';
    }

    html += '</div>';
  }

  if (state.adminTab === 'stawki') {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({stawkaModal:{}})">+ Nowa stawka</button>`;
    (state.stawki||[]).forEach(s => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${s.stanowisko}</div>
            <div class="card-sub">${fmtPLN(s.stawka_godz)}/h</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-blue" onclick="setState({stawkaModal:${JSON.stringify(s).replace(/"/g,'&quot;')}})">✏</button>
            <button class="btn-sm btn-red" onclick="deleteStawka(${s.id})">🗑</button>
          </div>
        </div>
        ${s.zbrojenie_aktywne ? `<div style="margin-top:6px;font-size:12px;color:var(--orange)">⚙ Zbrojenie: ${fmtPLN(s.zbrojenie_stawka_godz)}/h</div>` : ''}
      </div>`;
    });
    if (state.stawkaModal !== null) {
      html += renderStawkaModal();
    }
  }

  if (state.adminTab === 'katalog') {
    html += `<button class="btn btn-accent" style="margin-bottom:12px" onclick="setState({produktModal:{}})">+ Nowy produkt</button>`;
    (state.katalog||[]).forEach(p => {
      html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${p.nazwa}</div>
            <div class="card-sub">${p.opis||'—'} | ${fmtPLN(p.cena_szt)}/szt | domyślnie: ${p.ilosc_domyslna} szt.</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-blue" onclick="setState({produktModal:${JSON.stringify(p).replace(/"/g,'&quot;')}})">✏</button>
            <button class="btn-sm btn-red" onclick="deleteProdukt(${p.id})">🗑</button>
          </div>
        </div>
      </div>`;
    });
    if (state.produktModal !== null) {
      const p = state.produktModal;
      html += `
      <div class="modal-overlay">
        <div class="modal">
          <button class="modal-close" onclick="setState({produktModal:null})">×</button>
          <h3>${p.id?'✏ Edytuj produkt':'+ Nowy produkt'}</h3>
          <div class="field"><label>Nazwa</label><input id="pr-nazwa" type="text" value="${p.nazwa||''}"></div>
          <div class="field"><label>Opis</label><textarea id="pr-opis">${p.opis||''}</textarea></div>
          <div class="field"><label>Ilość domyślna</label><input id="pr-ilosc" type="number" value="${p.ilosc_domyslna||1}" min="1"></div>
          <div class="field"><label>Cena (zł/szt)</label><input id="pr-cena" type="number" step="0.01" value="${p.cena_szt||0}"></div>
          <button class="btn btn-accent" onclick="saveProduktForm(${p.id||0})">💾 Zapisz</button>
        </div>
      </div>`;
    }
  }

  if (state.adminTab === 'materialy') {
    const cnt = state.materialyCount;
    html += `
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">📂 Import bazy materiałów (plik .xlsx)</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.5">
        Wczytaj plik Excel z bazą materiałów. Wymagane kolumny: <b>Indeks</b>, <b>Opis artykułu</b>.<br>
        Opcjonalne: Kod, Jm, Do dyspozycji, Stan rzeczywisty, Rezerwacja, Kod paskowy.<br>
        Import nadpisuje istniejące rekordy po kolumnie <b>Indeks</b>.
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input type="file" id="mat-xlsx-file" accept=".xlsx,.xls"
          style="font-size:12px;color:var(--text);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px">
        <button class="btn btn-accent" onclick="importMaterialyXlsx()">📥 Importuj</button>
      </div>
      <div id="mat-import-status" style="font-size:12px;margin-top:8px;color:var(--dim)"></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700">🔍 Podgląd bazy materiałów</div>
        <span style="font-size:12px;color:var(--dim)">${cnt !== null ? cnt + ' pozycji w bazie' : '...'}</span>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input id="mat-preview-q" type="text" placeholder="Szukaj materiału..."
          style="flex:1;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px"
          onkeyup="if(event.key==='Enter')loadMaterialyPreview()">
        <button class="btn-outline" onclick="loadMaterialyPreview()">🔍</button>
      </div>
      <div id="mat-preview-results" style="font-size:12px;color:var(--dim)">
        ${cnt === null ? 'Kliknij zakładkę aby załadować.' : cnt === 0 ? 'Brak materiałów – zaimportuj plik xlsx.' : 'Wpisz frazę i naciśnij Enter aby wyszukać.'}
      </div>
    </div>`;
  }

  if (state.adminTab === 'oceny') {
    const feedbacks = state.adminFeedbacks;
    if (!feedbacks) {
      html += '<div class="spinner">⏳ Ładowanie ocen...</div>';
    } else if (!feedbacks.length) {
      html += '<div class="empty">Brak ocen i opinii.</div>';
    } else {
      // Statystyki
      const avgRating = (feedbacks.reduce((s,f) => s + f.ocena, 0) / feedbacks.length).toFixed(1);
      const dist = [5,4,3,2,1].map(n => ({n, cnt: feedbacks.filter(f=>f.ocena===n).length}));
      html += `
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="text-align:center">
            <div style="font-size:40px;font-weight:700;color:var(--accent);font-family:Consolas,monospace">${avgRating}</div>
            <div style="color:var(--accent);font-size:20px">${'★'.repeat(Math.round(parseFloat(avgRating)))}${'☆'.repeat(5-Math.round(parseFloat(avgRating)))}</div>
            <div style="font-size:11px;color:var(--dim)">${feedbacks.length} ocen</div>
          </div>
          <div style="flex:1;min-width:160px">
            ${dist.map(d => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-size:12px;color:var(--dim);width:12px">${d.n}</span>
              <span style="color:var(--accent);font-size:13px">★</span>
              <div style="flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden">
                <div style="width:${feedbacks.length?Math.round(d.cnt/feedbacks.length*100):0}%;height:100%;background:var(--accent);border-radius:4px"></div>
              </div>
              <span style="font-size:11px;color:var(--dim);width:20px;text-align:right">${d.cnt}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>`;

      // Lista wpisów
      feedbacks.forEach(f => {
        const stars = '★'.repeat(f.ocena) + '☆'.repeat(5-f.ocena);
        const dt = f.created_at ? new Date(f.created_at.replace('Z','+00:00')).toLocaleString('pl-PL',{timeZone:'Europe/Warsaw',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        html += `
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <span style="color:var(--accent);font-size:16px;letter-spacing:1px">${stars}</span>
              ${f.user_name ? `<span style="font-size:12px;color:var(--dim);margin-left:8px">👤 ${f.user_name}</span>` : ''}
            </div>
            <span style="font-size:11px;color:var(--dim)">${dt}</span>
          </div>
          ${f.wiadomosc ? `<div style="margin-top:8px;font-size:13px;color:var(--text);line-height:1.5;background:var(--entry);padding:8px 12px;border-radius:6px">${f.wiadomosc.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
        </div>`;
      });
    }
    html += `<button class="btn-outline" style="margin-top:4px" onclick="loadAdminFeedbacks()">🔄 Odśwież</button>`;
  }

  return html;
}

function saveUserForm(id) {
  const data = {
    full_name: document.getElementById('u-name')?.value?.trim(),
    role: document.getElementById('u-role')?.value,
    password: document.getElementById('u-pass')?.value || undefined,
    is_kj: document.getElementById('u-is-kj')?.checked ? 1 : 0,
  };
  if (!data.full_name) { alert('Podaj imię i nazwisko'); return; }
  if (id) { data.id = id; }
  else { data.username = document.getElementById('u-login')?.value?.trim(); data.password = document.getElementById('u-pass')?.value; }
  saveUser(data);
}
function selectTypMaszyny(val) {
  const hidden = document.getElementById('st-typ');
  if (!hidden) return;
  const prev = hidden.value;
  const next = (prev === val) ? '' : val;
  hidden.value = next;
  const typyDef = [
    {val:'frezarka_cnc',   label:'🔵 Frezarka CNC'},
    {val:'tokarka_cnc',    label:'🟢 Tokarka CNC'},
    {val:'frezarka_konw',  label:'🔷 Frezarka konw.'},
    {val:'tokarka_konw',   label:'🟩 Tokarka konw.'},
    {val:'szlifierka',     label:'🟡 Szlifierka'},
    {val:'operacja',       label:'🔧 Operacja'},
  ];
  typyDef.forEach(t => {
    const btn = document.getElementById('st-typ-btn-' + t.val);
    if (!btn) return;
    const active = (next === t.val);
    btn.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    btn.style.background = active ? 'rgba(232,160,32,0.15)' : 'var(--panel)';
    btn.style.color = active ? 'var(--accent)' : 'var(--dim)';
  });
  // Aktualizuj sticky header
  const headerEl = document.getElementById('st-typ-sticky-label');
  const headerWrap = document.getElementById('st-typ-sticky-wrap');
  if (headerEl && headerWrap) {
    const aktywny = typyDef.find(t => t.val === next);
    if (aktywny) {
      headerEl.textContent = aktywny.label;
      headerEl.style.color = 'var(--accent)';
      headerEl.style.fontStyle = 'normal';
      headerWrap.style.borderColor = 'var(--accent)';
    } else {
      headerEl.textContent = '— nie wybrano —';
      headerEl.style.color = 'var(--dim)';
      headerEl.style.fontStyle = 'italic';
      headerWrap.style.borderColor = 'var(--border)';
    }
  }
}

function renderStawkaModal() {
  const s = state.stawkaModal;
  if (!s) return '';
  const zbrAkt = s.zbrojenie_aktywne ? true : false;
  const typyMaszyn = [
    {val:'frezarka_cnc',   label:'🔵 Frezarka CNC'},
    {val:'tokarka_cnc',    label:'🟢 Tokarka CNC'},
    {val:'frezarka_konw',  label:'🔷 Frezarka konw.'},
    {val:'tokarka_konw',   label:'🟩 Tokarka konw.'},
    {val:'szlifierka',     label:'🟡 Szlifierka'},
    {val:'operacja',       label:'🔧 Operacja'},
  ];
  const aktywnyTyp = typyMaszyn.find(t => t.val === (s.typ_maszyny || ''));
  const stickyBorder = aktywnyTyp ? 'var(--accent)' : 'var(--border)';
  const stickyLabelColor = aktywnyTyp ? 'var(--accent)' : 'var(--dim)';
  const stickyLabelStyle = aktywnyTyp ? 'font-size:14px;font-weight:700' : 'font-size:13px;font-style:italic';
  const stickyLabelText = aktywnyTyp ? aktywnyTyp.label : '\u2014 nie wybrano \u2014';

  let btns = '';
  typyMaszyn.forEach(t => {
    const active = s.typ_maszyny === t.val;
    btns += '<button type="button" id="st-typ-btn-' + t.val + '" onclick="selectTypMaszyny(\'' + t.val + '\')" style="padding:6px 12px;border-radius:20px;border:2px solid ' + (active ? 'var(--accent)' : 'var(--border)') + ';background:' + (active ? 'rgba(232,160,32,0.15)' : 'var(--panel)') + ';color:' + (active ? 'var(--accent)' : 'var(--dim)') + ';cursor:pointer;font-size:12px;font-weight:600;transition:all .15s">' + t.label + '</button>';
  });

  return '<div class="modal-overlay">'
    + '<div class="modal" style="padding:0;display:flex;flex-direction:column;max-height:90vh;">'
    // Sticky header – osobny div PRZED scrollable body, nie wewnątrz niego
    + '<div style="background:var(--panel);border-radius:20px 20px 0 0;padding:20px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;">'
    + '<button class="modal-close" onclick="setState({stawkaModal:null})">\u00D7</button>'
    + '<h3 style="margin-bottom:10px">' + (s.id ? '\u270F Edytuj stawk\u0119' : '+ Nowa stawka') + '</h3>'
    + '<div id="st-typ-sticky-wrap" style="background:var(--entry);border:1px solid ' + stickyBorder + ';border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;">'
    + '<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;">Typ maszyny:</div>'
    + '<div id="st-typ-sticky-label" style="' + stickyLabelStyle + ';color:' + stickyLabelColor + '">' + stickyLabelText + '</div>'
    + '</div>'
    + '</div>'
    // Scrollable body
    + '<div style="flex:1;overflow-y:auto;padding:16px 20px 24px;">'
    + '<div class="field"><label>Stanowisko</label><input id="st-stan" type="text" value="' + (s.stanowisko||'') + '"></div>'
    + '<div class="field"><label>Stawka (z\u0142/h)</label><input id="st-stawka" type="number" step="0.5" value="' + (s.stawka_godz||0) + '"></div>'
    + '<div class="field"><label>Opis</label><input id="st-opis" type="text" value="' + (s.opis||'') + '"></div>'
    + '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">🏭 Typ maszyny / operacji</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:6px" id="st-typ-wrap">' + btns + '</div>'
    + '<input type="hidden" id="st-typ" value="' + (s.typ_maszyny||'') + '">'
    + '<div style="font-size:11px;color:var(--dim);margin-top:8px">Typ maszyny okre\u015Bla grup\u0119 alternatyw przy uruchamianiu sesji (zak\u0142adka Praca).</div>'
    + '</div>'
    + '<div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    + '<input type="checkbox" id="st-zbr-akt" ' + (zbrAkt ? 'checked' : '') + ' onchange="document.getElementById(\'zbr-stawka-wrap\').style.display=this.checked?\'block\':\'none\'" style="width:18px;height:18px;cursor:pointer">'
    + '<label for="st-zbr-akt" style="font-size:14px;cursor:pointer">\u2699 Aktywuj zbrojenie</label>'
    + '</div>'
    + '<div id="zbr-stawka-wrap" style="display:' + (zbrAkt ? 'block' : 'none') + '">'
    + '<div class="field" style="margin-bottom:0"><label>Stawka zbrojenia (z\u0142/h)</label><input id="st-zbr-stawka" type="number" step="0.5" min="0" value="' + (s.zbrojenie_stawka_godz||0) + '"></div>'
    + '</div>'
    + '</div>'
    + '<button class="btn btn-accent" onclick="saveStawkaForm(' + (s.id||0) + ')">💾 Zapisz</button>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function renderZmianaMaszynyModal() {
  const m = state.zmianaMaszynyModal;
  if (!m) return '';
  const lista = m.stanowiskoLista || [];

  let btns = '';
  lista.forEach(st => {
    const isOryg = st === m.stanowiskoOryginalne;

// Trzymaj ostatni wybrany plik PDF w pamięci
let _lastPdfFile = null;

async function handlePdfParse(input) {
  const file = input.files[0];
  if (!file) return;
  _lastPdfFile = file;
  setState({importPdfParsing: true, importPdfPreview: null, importPdfBom: [], importPdfResult: null});
  const formData = new FormData();
  formData.append('file', file);
  try {
    const url = (SERVER_URL.replace(/\/$/,'')) + '/api/import-technologia/parse';
    const response = await fetch(url, {method:'POST', headers:{'x-api-key':API_KEY}, body:formData});
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || 'Błąd parsowania');
    const bom = (data.bom||[]).map(m => ({...m, included: true}));
    setState({importPdfPreview: data, importPdfBom: bom, importPdfParsing: false});
    input.value = '';
  } catch(e) {
    setState({importPdfParsing: false});
    alert('Błąd odczytu PDF: ' + e.message);
    input.value = '';
  }
}

function toggleBomItem(idx, checked) {
  const bom = [...state.importPdfBom];
  bom[idx] = {...bom[idx], included: checked};
  setState({importPdfBom: bom});
}

async function confirmPdfImport(force) {
  if (!_lastPdfFile) { alert('Wybierz plik PDF ponownie'); return; }
  const bom = state.importPdfBom.filter(m => m.included !== false);
  await _doPdfImport(_lastPdfFile, bom, force);
}

async function _doPdfImport(file, bomItems, force) {
  const formData = new FormData();
  formData.append('file', file);
  if (bomItems && bomItems.length) {
    formData.append('bom_json', JSON.stringify(bomItems));
  }
  const url = (SERVER_URL.replace(/\/$/,'')) + '/api/import-technologia' + (force ? '?force=true' : '');
  try {
    const response = await fetch(url, {method:'POST', headers:{'x-api-key':API_KEY}, body:formData});
    const data = await response.json();
    if (response.status === 409) {
      const ok = confirm((data.detail||'Zlecenie o tym numerze już istnieje.') + '\n\nUtwrzyć duplikat?');
      if (ok) await _doPdfImport(file, bomItems, true);
      return;
    }
    if (!response.ok) throw new Error(data.detail || 'Błąd importu');
    setState({importPdfResult: data, importPdfPreview: null});
    _lastPdfFile = null;
    if (state.activeTab === 'zlecenia') loadZlecenia();
  } catch(e) {
    alert('Błąd importu PDF: ' + e.message);
  }
}

      state.kontrahenciList?.length ? Promise.resolve(state.kontrahenciList) : get('/api/kontrahenci')
    ]);

}

// ─── Eksport CSV ──────────────────────────────────────────────────────────────
async function exportFakturCSV() {
  try {
    const data = await get('/api/faktury/export/all');
    const rows = [
      ['Nr_faktury','Data_wystawienia','Data_sprzedazy','Termin_platnosci','Forma_platnosci',
       'Status','Waluta','Nabywca','NIP','Adres','Kod_pocztowy','Miasto','Kraj',
       'Lp','Nazwa_pozycji','JM','Ilosc','Cena_netto','VAT_%','Wartosc_netto','Wartosc_brutto',
       'Total_netto_faktury','Total_VAT_faktury','Total_brutto_faktury','Uwagi']
    ];
    data.forEach(f => {
      if (!f.pozycje?.length) {
        rows.push([f.numer,f.data_wystawienia,f.data_sprzedazy||'',f.termin_platnosci||'',
          f.forma_platnosci||'',f.status,f.waluta,f.k_nazwa||'',f.k_nip||'',
          f.k_adres||'',f.k_kp||'',f.k_miasto||'',f.k_kraj||'',
          '','','','','','','','',f.total_netto,f.total_vat,f.total_brutto,f.uwagi||'']);
      } else {
        f.pozycje.forEach(p => {
          rows.push([f.numer,f.data_wystawienia,f.data_sprzedazy||'',f.termin_platnosci||'',
            f.forma_platnosci||'',f.status,f.waluta,f.k_nazwa||'',f.k_nip||'',
            f.k_adres||'',f.k_kp||'',f.k_miasto||'',f.k_kraj||'',
            p.lp,p.nazwa,p.jm,p.ilosc,p.cena_netto,p.vat_procent,p.wartosc_netto,p.wartosc_brutto,
            f.total_netto,f.total_vat,f.total_brutto,f.uwagi||'']);
        });
      }
    });
    const csv = rows.map(r => r.map(v => '"' + String(v??'').replace(/"/g,'""') + '"').join(';')).join('\r\n');
    const bom = '\uFEFF';
    const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `faktury_${state.fakturyFilterRok||'all'}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  } catch(e) { alert('Błąd eksportu: ' + e.message); }
}

// ─── Eksport XML (JPK-FA uproszczony) ────────────────────────────────────────
async function exportFakturaXML() {
  try {
    const data = await get('/api/faktury/export/all');
    const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const dzisiaj = new Date().toISOString().slice(0,10);
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<JPK xmlns="http://crd.gov.pl/wzor/2021/11/29/11089/" xmlns:etd="http://crd.gov.pl/xml/schematy/dziedzinowe/mf/2021/11/29/eD/DefinicjeTypy/">\n`;
    xml += `  <Naglowek>\n`;
    xml += `    <DataWytworzeniaJPK>${dzisiaj}</DataWytworzeniaJPK>\n`;
    xml += `    <NazwaSystemu>ERP-System</NazwaSystemu>\n`;
    xml += `  </Naglowek>\n`;
    xml += `  <Faktury>\n`;
    data.forEach(f => {
      xml += `    <Faktura>\n`;
      xml += `      <P_1>${esc(f.numer)}</P_1>\n`;
      xml += `      <P_1M>${esc(f.data_wystawienia)}</P_1M>\n`;
      xml += `      <P_2A>${esc(f.data_sprzedazy||f.data_wystawienia)}</P_2A>\n`;
      xml += `      <P_3B>${esc(f.k_nazwa)}</P_3B>\n`;
      xml += `      <P_3C>${esc(f.k_adres+' '+f.k_kp+' '+f.k_miasto)}</P_3C>\n`;
      xml += `      <P_4B>${esc(f.k_nip)}</P_4B>\n`;
      xml += `      <P_6>${esc(f.termin_platnosci)}</P_6>\n`;
      xml += `      <P_15>${esc(String(f.total_brutto))}</P_15>\n`;
      xml += `      <Waluta>${esc(f.waluta||'PLN')}</Waluta>\n`;
      xml += `      <StatusFaktury>${esc(f.status)}</StatusFaktury>\n`;
      if (f.pozycje?.length) {
        xml += `      <FakturaWiersz>\n`;
        f.pozycje.forEach(p => {
          xml += `        <P_7>${esc(p.nazwa)}</P_7>\n`;
          xml += `        <P_8A>${esc(p.jm)}</P_8A>\n`;
          xml += `        <P_8B>${esc(String(p.ilosc))}</P_8B>\n`;
          xml += `        <P_9A>${esc(String(p.cena_netto))}</P_9A>\n`;
          xml += `        <P_11>${esc(String(p.wartosc_netto))}</P_11>\n`;
          xml += `        <P_12>${esc(String(p.vat_procent))}</P_12>\n`;
        });
        xml += `      </FakturaWiersz>\n`;
      }
      xml += `    </Faktura>\n`;
    });
    xml += `  </Faktury>\n</JPK>\n`;
    const blob = new Blob([xml], {type:'application/xml;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `JPK_FA_${new Date().toISOString().slice(0,10)}.xml`;
    a.click();
  } catch(e) { alert('Błąd eksportu XML: ' + e.message); }
}

// ─── Drukowanie faktury ───────────────────────────────────────────────────────
function printFaktura() {
  const d = state.fakturaPreview;
  if (!d) return;
  const f = d.faktura, poz = d.pozycje || [];

  const fmtD = s => (s||'').slice(0,10);
  const vatGroups = {};
  poz.forEach(p => {
    const k = p.vat_procent;
    if (!vatGroups[k]) vatGroups[k] = {netto:0, vat:0, brutto:0};
    vatGroups[k].netto  += parseFloat(p.wartosc_netto||0);
    vatGroups[k].vat    += parseFloat(p.wartosc_brutto||0) - parseFloat(p.wartosc_netto||0);
    vatGroups[k].brutto += parseFloat(p.wartosc_brutto||0);
  });
  let vatRows = '';

    vatRows += `<tr><td>VAT ${vat}%</td><td>${fmtPLN(g.netto)}</td><td>${fmtPLN(g.vat)}</td><td>${fmtPLN(g.brutto)}</td></tr>`;

  table{width:100%;border-collapse:collapse;margin:16px 0;font-size:11px}
  th{background:#222;color:#fff;padding:7px 10px;text-align:left;font-size:11px}
  td{padding:6px 10px;border-bottom:1px solid #eee}
  tr:nth-child(even) td{background:#fafafa}
  .num{text-align:right} .totals{margin-top:12px}
  .total-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:12px}
  .total-final{font-size:16px;font-weight:700;color:#222;padding:8px 0;border-top:2px solid #222;margin-top:4px}
  .status-badge{display:inline-block;background:${statusColor};color:#fff;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:700;text-transform:uppercase}
  .footer{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:40px;font-size:11px;color:#666}
  .sig-line{border-top:1px solid #999;margin-top:40px;padding-top:4px;text-align:center}
  @media print{body{padding:12px}.no-print{display:none}}
</style></head><body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #222;padding-bottom:16px;margin-bottom:8px">
  <div>
    <h1>FAKTURA VAT</h1>
    <div style="font-size:20px;font-weight:700;color:#1a73e8">${f.numer}</div>
    <div class="sub">Data wystawienia: <b>${fmtD(f.data_wystawienia)}</b>
      ${f.data_sprzedazy ? ' &nbsp;|&nbsp; Data sprzedaży: <b>'+fmtD(f.data_sprzedazy)+'</b>' : ''}
    </div>
  </div>
  <div style="text-align:right">
    <div class="status-badge">${f.status?.toUpperCase()}</div>

</div>
<div class="grid2">
  <div class="box">
    <div class="box-title">Sprzedawca</div>
    <div style="font-size:13px;font-weight:700">Twoja firma</div>
    <div class="sub">Uzupełnij dane sprzedawcy w konfiguracji</div>
  </div>

    ${f.kontrahent_adres ? '<div class="sub">'+f.kontrahent_adres+'</div>' : ''}

  </tbody>
</table>
<div style="display:grid;grid-template-columns:1fr 280px;gap:24px;margin-top:8px">
  <div>
    <div class="box" style="font-size:11px">
      <div class="box-title">Stawki VAT</div>
      <table style="margin:0;font-size:11px">
        <tr style="background:#222;color:#fff"><th>Stawka</th><th>Netto</th><th>VAT</th><th>Brutto</th></tr>
        ${vatRows}
      </table>
    </div>
    ${f.uwagi ? '<div class="box" style="margin-top:8px;font-size:11px"><div class="box-title">Uwagi</div>'+f.uwagi+'</div>' : ''}

</div>
</body></html>`;
  const w = window.open('','_blank','width=960,height=720');

}

// ─── Renderowanie: helper sumy pozycji ────────────────────────────────────────
function renderFakturaTotal(poz) {
  const totN = poz.reduce((s,p) => s + (p.ilosc||0)*(p.cena_netto||0), 0);
  const totV = poz.reduce((s,p) => s + (p.ilosc||0)*(p.cena_netto||0)*(p.vat_procent||0)/100, 0);
  const el = document.createElement('div');
  el.id = 'faktura-total';
  el.style.cssText = 'display:flex;justify-content:flex-end;gap:20px;padding:10px 8px;background:var(--panel);border-radius:6px;font-size:13px;font-weight:600;margin-top:4px';
  el.innerHTML = `<span>Netto: <span style="color:var(--accent)">${totN.toFixed(2)} PLN</span></span>
    <span>VAT: <span style="color:var(--accent)">${totV.toFixed(2)} PLN</span></span>
    <span style="font-size:15px">Brutto: <span style="color:var(--accent)">${(totN+totV).toFixed(2)} PLN</span></span>`;
  return el;
}

// ─── Render: lista faktur ─────────────────────────────────────────────────────
function renderFakturowanie() {
  const subTab = state.fakturySubTab || 'lista';

  const canFaktura = ['admin','technolog'].includes(role);

  let html = `<div style="display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px">
    <button onclick="setState({fakturySubTab:'lista'})"
      style="padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;
             background:${subTab==='lista'?'var(--accent)':'var(--panel)'};color:${subTab==='lista'?'#1a1f2e':'var(--dim)'}">
      🧾 Faktury
    </button>
    <button onclick="setState({fakturySubTab:'kontrahenci'});loadKontrahenci()"
      style="padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;
             background:${subTab==='kontrahenci'?'var(--accent)':'var(--panel)'};color:${subTab==='kontrahenci'?'#1a1f2e':'var(--dim)'}">
      🏢 Kontrahenci
    </button>
  </div>`;

  if (subTab === 'kontrahenci') return html + renderKontrahenci();

  // ── Lista faktur ──
  const lista = state.fakturyList || [];
  const statusColors = {szkic:'#888',wystawiona:'#1a73e8',oplacona:'#1e8a4c',anulowana:'#c0392b'};
  const statusLabels = {szkic:'Szkic',wystawiona:'Wystawiona',oplacona:'Opłacona',anulowana:'Anulowana'};
  const roks = [];
  const curYear = new Date().getFullYear();
  for (let y = curYear; y >= curYear-3; y--) roks.push(y);

  html += `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">`;
  if (canFaktura) {
    html += `<button class="btn btn-accent" onclick="openNowaFaktura()">+ Nowa faktura</button>`;
  }
  html += `<select id="faktura-filter-status" onchange="loadFakturowanie(this.value)"
    style="padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:13px">
    ${['wszystkie','szkic','wystawiona','oplacona','anulowana'].map(s =>
      `<option value="${s}" ${(state.fakturyFilterStatus||'wszystkie')===s?'selected':''}>${s==='wszystkie'?'Wszystkie statusy':statusLabels[s]}</option>`
    ).join('')}
  </select>
  <select id="faktura-filter-rok" onchange="loadFakturowanie(null,parseInt(this.value))"
    style="padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:13px">
    ${roks.map(y => `<option value="${y}" ${(state.fakturyFilterRok||curYear)===y?'selected':''}>${y}</option>`).join('')}
  </select>
  <button class="btn-sm btn-accent" onclick="loadFakturowanie()">🔄</button>
  <div style="margin-left:auto;display:flex;gap:6px">
    <button class="btn-sm" onclick="exportFakturCSV()"
      style="background:rgba(30,138,76,.12);color:#1e8a4c;border-color:#1e8a4c">⬇ CSV</button>
    <button class="btn-sm" onclick="exportFakturaXML()"
      style="background:rgba(26,115,232,.12);color:#1a73e8;border-color:#1a73e8">⬇ XML</button>
  </div>
  </div>`;

  if (state.fakturyLoading) { html += '<div class="spinner">⏳</div>'; return html; }

  if (!lista.length) {
    html += `<div style="text-align:center;color:var(--dim);padding:40px">
      <div style="font-size:36px">🧾</div>
      <div style="margin-top:8px">Brak faktur. ${canFaktura ? 'Kliknij <b>+ Nowa faktura</b> aby zacząć.' : ''}</div>
    </div>`;
    return html;
  }

  // Podsumowanie

      <div style="font-size:18px;font-weight:700;color:#1a73e8">${wystawione.toFixed(2)} PLN</div>
    </div>
    <div style="background:var(--panel);border:1px solid #1e8a4c;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:11px;color:var(--dim)">OPŁACONE</div>
      <div style="font-size:18px;font-weight:700;color:#1e8a4c">${oplacone.toFixed(2)} PLN</div>
    </div>
  </div>`;

  html += `<div style="display:flex;flex-direction:column;gap:8px">`;
  lista.forEach(f => {
    const sc = statusColors[f.status] || '#888';
    const sl = statusLabels[f.status] || f.status;
    const isOverdue = f.status==='wystawiona' && f.termin_platnosci && f.termin_platnosci < new Date().toISOString().slice(0,10);
    html += `<div style="background:var(--panel);border:1px solid ${isOverdue?'#c0392b':'var(--border)'};border-radius:8px;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">

            ${f.kontrahent_nip ? ' · NIP: '+f.kontrahent_nip : ''}
            ${f.zlecenie_numer ? ' · Zlecenie: <b>'+f.zlecenie_numer+'</b>' : ''}
          </div>
          <div style="font-size:11px;color:var(--dim);margin-top:2px">
            Wystawiona: ${(f.data_wystawienia||'').slice(0,10)}

            · ${f.forma_platnosci||''}
          </div>
        </div>
        <div style="text-align:right">
          <span style="background:${sc};color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">${sl}</span>
          <div style="font-size:18px;font-weight:700;margin-top:4px">${parseFloat(f.total_brutto||0).toFixed(2)} PLN</div>
          <div style="font-size:11px;color:var(--dim)">netto: ${parseFloat(f.total_netto||0).toFixed(2)} + VAT: ${parseFloat(f.total_vat||0).toFixed(2)}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <button class="btn-sm btn-accent" onclick="openFakturaPreview(${f.id})">🔍 Podgląd / Drukuj</button>
        ${f.status==='szkic' ? `<button class="btn-sm" onclick="setFakturaStatus(${f.id},'wystawiona')" style="background:rgba(26,115,232,.12);color:#1a73e8;border-color:#1a73e8">📤 Wystaw</button>` : ''}
        ${f.status==='wystawiona' ? `<button class="btn-sm" onclick="setFakturaStatus(${f.id},'oplacona')" style="background:rgba(30,138,76,.12);color:#1e8a4c;border-color:#1e8a4c">✅ Oznacz jako opłaconą</button>` : ''}
        ${['szkic','wystawiona'].includes(f.status) ? `<button class="btn-sm" onclick="setFakturaStatus(${f.id},'anulowana')" style="background:rgba(192,57,43,.08);color:#c0392b;border-color:#c0392b">✕ Anuluj</button>` : ''}
        ${['szkic','anulowana'].includes(f.status) ? `<button class="btn-sm btn-red" onclick="deleteFaktura(${f.id})">🗑</button>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ══════════════════════════════════════════════════════════════
//  ZLECENIE – DRZEWKO P/M (półprodukty i materiały)

// Rozwiń/zwiń drzewko zlecenia inline
async function toggleZlecenieExpand(zid) {
  const expanded = state.zlecenieExpanded || {};
  const isOpen   = !!expanded[zid];

  if (isOpen) {
    setState({ zlecenieExpanded: { ...expanded, [zid]: false } });
    return;
  }

  // Rozwiń i zawsze przeładuj dane (żeby pokazać zmiany po edycji)
  setState({ zlecenieExpanded: { ...expanded, [zid]: true } });
  try {
    const [data, matsM] = await Promise.all([
      get(`/api/zlecenia/${zid}/drzewo`),
      get(`/api/zlecenia/${zid}/materialy-zlecenia`).catch(() => []),
    ]);

    // Uzupełnij materiały M jeśli /drzewo ich nie zwraca
    if (!data.materialy || data.materialy.length === 0) {
      data.materialy = matsM || [];
    }

    // Zaktualizuj podzlecenieIds – ukryj podzlecenia P z głównej listy
    const updatedPodzlecenieIds = new Set(state.podzlecenieIds || []);
    (data.podzlecenia_drzewo || []).forEach(pd => {
      if (pd.zlecenie_p_id) updatedPodzlecenieIds.add(pd.zlecenie_p_id);
      (pd.podzlecenia || []).forEach(sub => {
        const subId = sub.zap?.zlecenie_p_id || sub.zap?.zp_id;
        if (subId) updatedPodzlecenieIds.add(subId);
      });
    });

    setState({ zlecenieDrzewa: { ...(state.zlecenieDrzewa || {}), [zid]: data }, podzlecenieIds: updatedPodzlecenieIds });
  } catch(e) {
    setState({ zlecenieDrzewa: { ...(state.zlecenieDrzewa || {}), [zid]: { polprodukty:[], materialy:[], operacje:[], podzlecenia_drzewo:[], error: e.message } } });
  }
}

// Odśwież dane drzewka dla jednego zlecenia
async function refreshZlecenieDrzewo(zid) {
  try {
    const [data, matsM] = await Promise.all([
      get(`/api/zlecenia/${zid}/drzewo`),
      get(`/api/zlecenia/${zid}/materialy-zlecenia`).catch(() => []),
    ]);
    if (!data.materialy || data.materialy.length === 0) {
      data.materialy = matsM || [];
    }
    // Zaktualizuj podzlecenieIds
    const updatedPodzlecenieIds = new Set(state.podzlecenieIds || []);
    (data.podzlecenia_drzewo || []).forEach(pd => {
      if (pd.zlecenie_p_id) updatedPodzlecenieIds.add(pd.zlecenie_p_id);
      (pd.podzlecenia || []).forEach(sub => {
        const subId = sub.zap?.zlecenie_p_id || sub.zap?.zp_id;
        if (subId) updatedPodzlecenieIds.add(subId);
      });
    });
    setState({ zlecenieDrzewa: { ...(state.zlecenieDrzewa || {}), [zid]: data }, podzlecenieIds: updatedPodzlecenieIds });
  } catch(e) { /* cicho */ }
}

async function savePolprodukt(zid, pid) {
  const symbol = document.getElementById('pm-p-symbol')?.value?.trim();
  const nazwa  = document.getElementById('pm-p-nazwa')?.value?.trim();
  const ilosc  = parseFloat(document.getElementById('pm-p-ilosc')?.value) || 1;
  const jm     = document.getElementById('pm-p-jm')?.value || 'szt';
  const uwagi  = document.getElementById('pm-p-uwagi')?.value?.trim() || '';
  if (!symbol) { alert('Wpisz symbol P'); return; }
  if (!nazwa)  { alert('Wpisz nazwę'); return; }
  try {
    if (pid) {
      await put(`/api/zlecenia/${zid}/polprodukty/${pid}`, { symbol, nazwa, ilosc, jednostka: jm, uwagi });
    } else {
      await post(`/api/zlecenia/${zid}/polprodukty`, { symbol, nazwa, ilosc, jednostka: jm, uwagi });
    }
    setState({ pmModal: null });
    const pdm = state.podZlecenieModal;
    if (pdm && !pdm.loading && pdm.zid === zid) {
      const gid = pdm.parentGid;
      await openPodZlecenieModal(zid, gid);
      if (gid) await refreshZlecenieDrzewo(gid);
    } else {
      await refreshZlecenieDrzewo(zid);
    }
  } catch(e) { alert('Błąd: ' + e.message); }
}

async function deletePolprodukt(zid, pid) {
  if (!confirm('Usunąć ten półprodukt?')) return;
  try {
    await del(`/api/zlecenia/${zid}/polprodukty/${pid}`);
    const pdm = state.podZlecenieModal;
    if (pdm && !pdm.loading && pdm.zid === zid) {
      const gid = pdm.parentGid;
      await openPodZlecenieModal(zid, gid);
      if (gid) await refreshZlecenieDrzewo(gid);
    } else {
      await refreshZlecenieDrzewo(zid);
    }
  } catch(e) { alert('Błąd: ' + e.message); }
}

// Otwórz modal operacji dla podzlecenia P (z zamknięciem modalu szczegółów)
async function openPodZlecenieOperacje(zid, numer, nazwa) {
  setState({ podZlecenieModal: null });
  const zlecenie = { id: zid, numer, nazwa };
  setState({ operacjeModal: { zlecenie, operacje: [], loading: true } });
  try {
    const ops = await get(`/api/zlecenia/${zid}/operacje`);
    setState({ operacjeModal: { zlecenie, operacje: ops, loading: false } });
  } catch(e) { alert(e.message); }
}

async function openPodZlecenieModal(zid, parentGid) {
  // Zachowaj parentGid z poprzedniego stanu jeśli nie przekazano nowego
  const prevGid = parentGid || (state.podZlecenieModal && state.podZlecenieModal.parentGid) || null;
  setState({ podZlecenieModal: { loading: true, zid, parentGid: prevGid } });
  try {
    const [zlecenie, operacje, drzewo, zapotrz, matsM] = await Promise.all([
      get(`/api/zlecenia/${zid}`),
      get(`/api/zlecenia/${zid}/operacje`),
      get(`/api/zlecenia/${zid}/drzewo`).catch(() => ({ polprodukty: [], materialy: [], operacje: [] })),
      get(`/api/zlecenia/${zid}/zapotrzebowania`).catch(() => []),
      get(`/api/zlecenia/${zid}/materialy-zlecenia`).catch(() => []),
    ]);
    // Użyj materiałów z /drzewo; jeśli puste – fallback do /materialy-zlecenia
    const materialy = (drzewo.materialy && drzewo.materialy.length)
      ? drzewo.materialy
      : (matsM || []);
    setState({
      podZlecenieModal: {
        loading: false, zid,
        parentGid: prevGid,
        zlecenie,
        operacje: operacje || [],
        materialy,
        polprodukty: drzewo.polprodukty || [],
        zapotrzebowania: zapotrz || [],
      }
    });
  } catch(e) {
    setState({ podZlecenieModal: null });
    alert('Blad ladowania podzlecenia: ' + e.message);
  }
}

  const canEdit = ['admin', 'technolog', 'majster'].includes(state.user?.role);

  return `<div class="modal-overlay" onclick="if(event.target===this)setState({podZlecenieModal:null})">
    <div class="modal" style="max-width:540px;padding:0;display:flex;flex-direction:column;max-height:92vh">

      <!-- Header -->
      <div style="padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">

            <div style="font-size:18px;font-weight:700;color:#a78bfa">${z.numer || '—'}</div>
            <div style="font-size:12px;color:var(--dim);margin-top:2px">${z.nazwa || ''}</div>
            <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center">
              <span style="font-size:11px;font-weight:700;color:${stCol};background:rgba(0,0,0,.2);padding:2px 8px;border-radius:10px">${z.status || '—'}</span>
              <span style="font-size:11px;color:var(--dim)">📦 ${z.ilosc_sztuk || 1} szt.</span>
              ${z.termin ? `<span style="font-size:11px;color:var(--dim)">📅 ${z.termin.slice(0,10)}</span>` : ''}
              <span style="font-size:11px;color:var(--dim)">${ops.length} operacji</span>
            </div>
          </div>
          <button onclick="setState({podZlecenieModal:null})" style="background:var(--entry);border:none;color:var(--text);font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0">×</button>

      <!-- Body -->

function render() {
  document.getElementById('app').innerHTML = renderContent();
  _afterRender();
  // Restart timerów po re-render
  for (const [sid, t] of Object.entries(state.timers)) {
    if (t.sesja) startTimerFor(t.sesja);
  }
  // Narysuj QR jeśli modal QR otwarty
  if (state.qrGenModal && state.qrGenKod) {
    setTimeout(() => drawQRCanvas(state.qrGenKod), 50);
  }
  // Narysuj QR na karcie zlecenia jeśli print modal otwarty
  if (state.printModal && state.printModal.zlecenie?.qr_code) {
    setTimeout(() => {
      const canvas = document.getElementById('print-qr-canvas');
      if (!canvas) return;
      const kod = state.printModal.zlecenie.qr_code;
      const url = `${SERVER_URL.replace(/\/$/,'')}/api/qr/${encodeURIComponent(kod)}`;
      fetch(url, {headers: {'x-api-key': API_KEY}})
        .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
        .then(blob => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width; canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            // Zapisz dataURL żeby doPrint mógł użyć natychmiast
            window._printQrDataUrl = canvas.toDataURL('image/png');
            URL.revokeObjectURL(img.src);
          };
          img.src = URL.createObjectURL(blob);
        }).catch(() => { window._printQrDataUrl = null; });
    }, 80);
  } else {
    window._printQrDataUrl = null;
  }
}


// ══════════════════════════════════════════════════════════════
//  CAMERA QR SCANNER
// ══════════════════════════════════════════════════════════════
let _qrStream = null;
let _qrAnimFrame = null;

function stopQRCamera() {
  if (_qrStream) { _qrStream.getTracks().forEach(t => t.stop()); _qrStream = null; }
  if (_qrAnimFrame) { cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
}

async function startQRCamera() {
  const video  = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-cam-canvas');
  const status = document.getElementById('qr-scan-status');
  if (!video) return;
  try {
    if (!window.jsQR) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment'}
    });
    _qrStream = stream;
    video.srcObject = stream;
    await video.play();
    if (status) status.textContent = '🔍 Skanuję...';
    const ctx = canvas.getContext('2d');
    function tick() {
      if (!document.getElementById('qr-video')) { stopQRCamera(); return; }
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
        if (code && code.data) {
          stopQRCamera();
          scanQR(code.data);
          return;
        }
      }
      _qrAnimFrame = requestAnimationFrame(tick);
    }
    tick();
  } catch(err) {
    if (status) status.textContent = 'Brak dostępu do aparatu. Wpisz kod ręcznie.';
    setState({qrManualMode: true});
  }
}

// Wywoływane przez render() aby uruchomić kamerę po re-renderze
function _afterRender() {
  stopQRCamera();
  const hasCam = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  if (state.qrScanMode && !state.qrManualMode && hasCam) {
    setTimeout(startQRCamera, 120);
  }
}

  const status = document.getElementById('zl-model3d-status');
  if (status) { status.textContent = ''; }
}

async function uploadStepFile(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('zl-model3d-status');
  const urlInput = document.getElementById('zl-model3d');
  const infoEl   = document.getElementById('zl-model3d-info');
  const areaEl   = document.getElementById('zl-model3d-upload-area');

  const MAX = 100 * 1024 * 1024;
  if (file.size > MAX) {
    statusEl.textContent = '✗ Plik za duży (maks. 100 MB)';
    statusEl.style.color = 'var(--red, #e05555)';
    return;
  }

  statusEl.textContent = '⏳ Wgrywanie... 0%';
  statusEl.style.color = 'var(--dim)';
  input.disabled = true;

  try {
    const buf = await file.arrayBuffer();
    const result = await new Promise((res, rej) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SERVER_URL.replace(/\/$/, '') + '/api/step-upload');
      xhr.setRequestHeader('x-api-key', API_KEY);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      xhr.setRequestHeader('x-filename', encodeURIComponent(file.name));
      xhr.upload.onprogress = e => {
        if (e.lengthComputable)
          statusEl.textContent = '⏳ Wgrywanie... ' + Math.round(e.loaded/e.total*100) + '%';
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) res(JSON.parse(xhr.responseText));
        else rej(new Error(xhr.responseText || 'HTTP ' + xhr.status));
      };
      xhr.onerror = () => rej(new Error('Błąd sieci'));
      xhr.send(buf);
    });

    if (result.ok && result.url) {
      urlInput.value = result.url;
      statusEl.textContent = '✅ Wgrano: ' + file.name + ' (' + Math.round((result.bytes||file.size)/1024) + ' KB)';
      statusEl.style.color = '#27ae60';
      if (areaEl) areaEl.style.display = 'none';
      if (infoEl) infoEl.style.display = 'flex';
    } else {
      throw new Error(result.error || 'Nieznany błąd');
    }
  } catch(e) {
    statusEl.textContent = '✗ Błąd uploadu: ' + e.message;
    statusEl.style.color = 'var(--red, #e05555)';
    input.disabled = false;
  }
}

  if (el) { el.textContent = msg; el.style.color = color || '#8b949e'; }

function _loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector('script[src="' + src + '"]')) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res;
    s.onerror = () => rej(new Error('Nie można załadować: ' + src));
    document.head.appendChild(s);
  });
}

async function _initStep3DScene(stepUrl) {
  try {
    // 1. Biblioteki Three.js
    _setStep3dStatus('⏳ Ładowanie Three.js...', '#e6a020');
    await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
    await _loadScript('https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js');

    // 2. Pobranie pliku STEP przez proxy (dłuższy timeout dla telefonu)
    _setStep3dStatus('⏳ Pobieranie pliku STEP...', '#e6a020');
    const proxyUrl = SERVER_URL.replace(/\/$/, '') + '/api/step-proxy?url=' + encodeURIComponent(stepUrl);
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 120000); // 2 min timeout
    let stepData;
    try {
      const resp = await fetch(proxyUrl, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!resp.ok) throw new Error('Serwer zwrócił błąd HTTP ' + resp.status);
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('text/html')) throw new Error('Plik niedostępny – sprawdź uprawnienia na Cloudinary');
      stepData = new Uint8Array(await resp.arrayBuffer());
    } catch(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') throw new Error('Timeout – plik za duży lub wolne łącze');
      throw e;
    }
    if (!stepData.length) throw new Error('Pobrano pusty plik');

    // 3. OCCT parser – używamy nowszego API (obsługuje SolidWorks AP214)
    _setStep3dStatus('⏳ Parsowanie modelu STEP...', '#e6a020');
    // GitHub raw blokuje jako script (MIME text/plain) – ładujemy przez fetch+blob
    const OCCT_BASE = 'https://cdn.jsdelivr.net/gh/kovacsv/occt-import-js@master/dist/';
    if (typeof occtimportjs === 'undefined') {
      const jsText = await fetch(OCCT_BASE + 'occt-import-js.js').then(r => {
        if (!r.ok) throw new Error('Błąd pobierania biblioteki OCCT: ' + r.status);
        return r.text();
      });
      const blob = new Blob([jsText], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      await _loadScript(blobUrl);
      URL.revokeObjectURL(blobUrl);
    }
    const occt = await occtimportjs({
      locateFile: (f) => OCCT_BASE + f,
    });
    const result = occt.ReadStepFile(stepData, null);

    if (!result || !result.meshes || result.meshes.length === 0)
      throw new Error('Brak geometrii w pliku – plik STEP jest pusty lub uszkodzony');

    // Zlicz wierzchołki – obsługa obu wersji API:
    // Stare (0.0.19): mesh.breps[].vertices / .normals / .triangles
    // Nowe (0.0.20+): mesh.attributes.position.array / .normal.array + mesh.index.array
    function _meshHasGeometry(mesh) {
      if (Array.isArray(mesh.breps) && mesh.breps.length > 0)
        return mesh.breps.some(b => b.vertices?.length > 0);
      return mesh.attributes?.position?.array?.length > 0;
    }
    const totalVerts = result.meshes.reduce((sum, m) => {
      if (Array.isArray(m.breps))
        return sum + m.breps.reduce((s, b) => s + (b.vertices?.length || 0), 0);
      return sum + (m.attributes?.position?.array?.length || 0);
    }, 0);

    if (totalVerts === 0)
      throw new Error('Plik STEP nie zawiera geometrii. Sprawdź czy plik jest poprawny (zapisz ponownie z SolidWorks/FreeCAD).');

    // 4. Scena Three.js
    _setStep3dStatus('⏳ Renderowanie...', '#e6a020');
    const canvas = document.getElementById('step3d-canvas');
    if (!canvas) throw new Error('Brak elementu canvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0d1117, 1);
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    const w = canvas.clientWidth || 400;
    const h = canvas.clientHeight || 500;
    const camera = new THREE.PerspectiveCamera(50, w / h, 0.0001, 10000000);

    const controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.screenSpacePanning = true;
    controls.zoomSpeed = 1.2;

    // Światła
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dl1.position.set(5, 10, 7); scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0x6688cc, 0.4);
    dl2.position.set(-5, -3, -5); scene.add(dl2);

    // Buduj geometrię – obsługa obu API
    const group = new THREE.Group();
    const defaultMat = new THREE.MeshPhongMaterial({
      color: 0x4a90d9, shininess: 80, specular: 0x224466, side: THREE.DoubleSide
    });

    for (const mesh of result.meshes) {
      let posArr, normArr, idxArr;

      if (Array.isArray(mesh.breps) && mesh.breps.length > 0) {
        // Stare API: breps[]
        const verts = [], norms = [], idxs = [];
        let vOff = 0;
        for (const brep of mesh.breps) {
          if (!brep.vertices?.length) continue;
          for (let v = 0; v < brep.vertices.length; v += 3)
            verts.push(brep.vertices[v], brep.vertices[v+1], brep.vertices[v+2]);
          if (brep.normals)
            for (let n = 0; n < brep.normals.length; n += 3)
              norms.push(brep.normals[n], brep.normals[n+1], brep.normals[n+2]);
          for (const i of brep.triangles) idxs.push(i + vOff);
          vOff += brep.vertices.length / 3;
        }
        posArr = verts; normArr = norms; idxArr = idxs;
      } else {
        // Nowe API: attributes + index
        posArr  = Array.from(mesh.attributes?.position?.array || []);
        normArr = Array.from(mesh.attributes?.normal?.array   || []);
        idxArr  = Array.from(mesh.index?.array                || []);
      }

      if (!posArr.length || !idxArr.length) continue;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
      if (normArr.length === posArr.length)
        geo.setAttribute('normal', new THREE.Float32BufferAttribute(normArr, 3));
      geo.setIndex(idxArr);
      if (!normArr.length) geo.computeVertexNormals();

      let mat = defaultMat;
      if (mesh.color && mesh.color.length >= 3) {
        mat = defaultMat.clone();
        mat.color.setRGB(mesh.color[0], mesh.color[1], mesh.color[2]);
        if (mesh.color[3] !== undefined && mesh.color[3] < 0.99) {
          mat.transparent = true; mat.opacity = mesh.color[3];
        }
      }
      group.add(new THREE.Mesh(geo, mat));
    }

    if (group.children.length === 0) throw new Error('Nie udało się zbudować geometrii 3D');
    scene.add(group);

    // Centrum i kamera – kluczowe dla czarnego ekranu
    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let camDist = Math.abs(maxDim / Math.sin(fov / 2)) * 0.8;
    if (camDist === 0 || !isFinite(camDist)) camDist = 100;

    camera.position.set(
      center.x + camDist * 0.7,
      center.y + camDist * 0.5,
      center.z + camDist * 0.7
    );
    camera.near = camDist * 0.0001;
    camera.far  = camDist * 100;
    camera.updateProjectionMatrix();
    camera.lookAt(center);
    controls.target.copy(center);
    controls.minDistance = camDist * 0.01;
    controls.maxDistance = camDist * 50;
    controls.update();

    // Resize
    function _resize() {
      if (!canvas || !_step3dOverlay) return;
      const cw = canvas.clientWidth  || 400;
      const ch = canvas.clientHeight || 500;
      renderer.setSize(cw, ch, false);
      camera.aspect = cw / ch;
      camera.updateProjectionMatrix();
    }
    renderer.setSize(w, h, false);
    new ResizeObserver(_resize).observe(canvas);

    // Pętla
    let _running = true;
    (function _anim() {
      if (!_running || !document.getElementById('step3d-overlay')) { _running = false; return; }
      requestAnimationFrame(_anim);
      controls.update();
      renderer.render(scene, camera);
    })();

    _setStep3dStatus('✓ Model załadowany (' + group.children.length + ' bryły)', '#27ae60');
    const hint = document.getElementById('step3d-hint');
    if (hint) hint.style.display = 'block';

  } catch(e) {
    _setStep3dStatus('✗ ' + e.message, '#e05555');
    console.error('[STEP viewer]', e);
  }
}
