<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1f2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚙ Produkcja</title>
<script>
/* =========================================================
   Stawki per zlecenie – moduł UI
   Wymaga: globalne zmienne SERVER_URL, API_KEY
   ========================================================= */
(function(){
  'use strict';
  const ZMODYFIKOWANY_STYLE = 'background:rgba(232,160,32,0.12);';

  window.__stawkiZl_currentZid = null;

  function _getServerUrl() {
    // Priorytet: window.SERVER_URL (let z index.html) → localStorage
    if (typeof window.SERVER_URL !== 'undefined' && window.SERVER_URL) return window.SERVER_URL;
    try {
      const cfg = JSON.parse(localStorage.getItem('produkcja_config') || '{}');
      return cfg.server_url || '';
    } catch(_) { return ''; }
  }

  function _getApiKey() {
    if (typeof window.API_KEY !== 'undefined' && window.API_KEY) return window.API_KEY;
    try {
      const cfg = JSON.parse(localStorage.getItem('produkcja_config') || '{}');
      return cfg.api_key || '';
    } catch(_) { return ''; }
  }

  async function _api(path, opts = {}) {
    const url = _getServerUrl().replace(/\/$/, '') + path;
    const headers = { 'x-api-key': _getApiKey(), ...(opts.headers || {}) };
    if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(url, { ...opts, headers });
    if (!res.ok) {
      const txt = await res.text();
      let msg = txt;
      try { const p = JSON.parse(txt); if (p.detail) msg = p.detail; } catch(_){}
      throw new Error(`API ${res.status}: ${msg}`);
    }
    return res.json();
  }

  window.openStawkiZleceniaModal = async function(zid, zlNumer, zlNazwa) {
    window.__stawkiZl_currentZid = zid;
    const existing = document.getElementById('stawki-zl-modal');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'stawki-zl-modal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
    overlay.innerHTML = `
      <div style="background:#1a1f2e;color:#e8eaf0;border-radius:12px;width:100%;max-width:900px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <div style="padding:20px 24px;border-bottom:1px solid #2a3040;display:flex;align-items:center;gap:12px;">
          <div style="flex:1">
            <h2 style="margin:0;font-size:20px;">⚙ Stawki zlecenia <span style="color:#e8a020">${zlNumer||''}</span></h2>
            <div style="color:#888;font-size:13px;margin-top:4px;">${zlNazwa||''}</div>
          </div>
          <button id="stawki-zl-close" style="background:#2a3040;color:#e8eaf0;border:none;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:18px;">✕</button>
        </div>
        <div style="padding:16px 24px;border-bottom:1px solid #2a3040;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <button id="stawki-zl-sync-add" style="background:#2a3040;color:#e8eaf0;border:1px solid #3a4050;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;">➕ Dodaj brakujące</button>
          <button id="stawki-zl-sync-force" style="background:#5a3a1a;color:#e8a020;border:1px solid #8a5a2a;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;">🔄 Nadpisz globalnymi</button>
          <div style="flex:1"></div>
          <small style="color:#888;font-size:12px;">💡 <span style="background:rgba(232,160,32,0.2);padding:2px 6px;border-radius:4px;">pomarańczowe</span> = zmodyfikowane</small>
        </div>
        <div style="flex:1;overflow-y:auto;padding:0 24px 24px;">
          <div id="stawki-zl-body" style="padding:16px 0;color:#888;text-align:center;">Ładowanie stawek...</div>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#stawki-zl-close').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.querySelector('#stawki-zl-sync-add').onclick = () => syncStawki(zid, false);
    overlay.querySelector('#stawki-zl-sync-force').onclick = () => syncStawki(zid, true);
    await loadStawki(zid);
  };

  async function loadStawki(zid) {
    const body = document.getElementById('stawki-zl-body');
    if (!body) return;
    body.innerHTML = 'Ładowanie...';
    try {
      const stawki = await _api(`/api/zlecenia/${zid}/stawki`);
      if (!stawki.length) {
        body.innerHTML = '<div style="padding:30px;text-align:center;color:#888;"><div style="font-size:40px;margin-bottom:10px;">📭</div><div>Brak stanowisk w tym zleceniu.</div><div style="margin-top:8px;font-size:12px;">Dodaj najpierw operacje ze stanowiskami.</div></div>';
        return;
      }
      body.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
          <thead><tr style="background:#2a3040;color:#888;font-size:12px;text-transform:uppercase;">
            <th style="padding:10px;text-align:left;">Stanowisko</th>
            <th style="padding:10px;text-align:right;">Stawka [zł/h]</th>
            <th style="padding:10px;text-align:right;">Zbrojenie [zł/h]</th>
            <th style="padding:10px;text-align:right;color:#666;">Globalna</th>
            <th style="padding:10px;width:40px;"></th>
          </tr></thead>
          <tbody id="stawki-zl-tbody">
            ${stawki.map(s => renderRow(zid, s)).join('')}
          </tbody>
        </table>`;
      body.querySelectorAll('input[data-sid]').forEach(inp => {
        let t = null;
        inp.addEventListener('input', () => {
          clearTimeout(t);
          t = setTimeout(() => {
            const sid = parseInt(inp.dataset.sid);
            saveStawka(zid, sid, inp);
          }, 600);
        });
      });
    } catch (err) {
      body.innerHTML = '<div style="color:#ff6b6b;padding:20px;">Błąd: '+err.message+'</div>';
    }
  }

  function renderRow(zid, s) {
    const isModified = s.modified_stawka || s.modified_zbrojenie;
    return `
      <tr data-sid="${s.id}" style="${isModified ? ZMODYFIKOWANY_STYLE : ''} border-bottom:1px solid #2a3040;">
        <td style="padding:10px;"><strong>${s.stanowisko}</strong>${isModified ? ' <span style="color:#e8a020;font-size:11px;">● zmodyfikowana</span>' : ''}</td>
        <td style="padding:10px;text-align:right;"><input type="number" step="0.01" min="0" value="${s.stawka_godz}" data-sid="${s.id}" data-field="stawka_godz" style="width:90px;background:#2a3040;color:#e8eaf0;border:1px solid #3a4050;padding:6px 8px;border-radius:6px;text-align:right;"></td>
        <td style="padding:10px;text-align:right;"><input type="number" step="0.01" min="0" value="${s.zbrojenie_stawka_godz||0}" data-sid="${s.id}" data-field="zbrojenie_stawka_godz" style="width:90px;background:#2a3040;color:#e8eaf0;border:1px solid #3a4050;padding:6px 8px;border-radius:6px;text-align:right;"></td>
        <td style="padding:10px;text-align:right;color:#666;font-size:12px;">${s.global_stawka ?? '—'}${s.global_stawka != null ? ' zł/h' : ''}</td>
        <td style="padding:10px;text-align:center;">
          ${isModified && s.global_stawka != null ? `<button class="stawki-zl-reset" data-sid="${s.id}" data-global-stawka="${s.global_stawka}" data-global-zbrojenie="${s.global_zbrojenie||0}" title="Przywróć globalną" style="background:transparent;border:none;color:#e8a020;cursor:pointer;font-size:16px;">↺</button>` : ''}
        </td>
      </tr>`;
  }

  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.stawki-zl-reset');
    if (!btn) return;
    const zid = window.__stawkiZl_currentZid;
    if (!zid) return;
    const sid = parseInt(btn.dataset.sid);
    try {
      await _api(`/api/zlecenia/${zid}/stawki/${sid}`, {
        method: 'PUT',
        body: { stawka_godz: parseFloat(btn.dataset.globalStawka), zbrojenie_stawka_godz: parseFloat(btn.dataset.globalZbrojenie) }
      });
      await loadStawki(zid);
    } catch (err) { alert('Błąd: ' + err.message); }
  });

  async function saveStawka(zid, sid, inp) {
    const row = inp.closest('tr');
    const inputs = row.querySelectorAll('input[data-sid]');
    const body = {
      stawka_godz: parseFloat(inputs[0].value) || 0,
      zbrojenie_stawka_godz: parseFloat(inputs[1].value) || 0
    };
    try {
      await _api(`/api/zlecenia/${zid}/stawki/${sid}`, { method: 'PUT', body });
      inp.style.borderColor = '#27ae60';
      setTimeout(() => { inp.style.borderColor = '#3a4050'; }, 800);
      setTimeout(() => loadStawki(zid), 500);
    } catch (err) {
      inp.style.borderColor = '#ff6b6b';
      console.error('Błąd zapisu stawki:', err);
    }
  }

  async function syncStawki(zid, force) {
    const msg = force
      ? 'UWAGA: Wszystkie stawki zlecenia zostaną NADPISANE globalnymi. Kontynuować?'
      : 'Dodać brakujące stanowiska z globalnych stawek?';
    if (!confirm(msg)) return;
    try {
      const data = await _api(`/api/zlecenia/${zid}/stawki/sync?force=${force?'true':'false'}`, { method: 'POST' });
      alert(`✓ Zsynchronizowano: ${data.updated} stanowisk`);
      await loadStawki(zid);
    } catch (err) { alert('Błąd synchronizacji: ' + err.message); }
  }

  console.log('✓ Moduł stawki_zlecenia.js załadowany');
})();

</script>

<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
// ── Auto-config z linku (hash #cfg=BASE64) ─────────────────
(function() {
  try {
    const hash = window.location.hash;
    const m = hash.match(/[#&]cfg=([A-Za-z0-9+/=_-]+)/);
    if (m) {
      const decoded = JSON.parse(atob(m[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (decoded.s && decoded.k) {
        localStorage.setItem('produkcja_config', JSON.stringify({server_url: decoded.s, api_key: decoded.k}));
      }
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  } catch(e) { /* nieprawidłowy hash – ignoruj */ }
})();

let CONFIG = JSON.parse(localStorage.getItem('produkcja_config') || '{}');
let SERVER_URL = CONFIG.server_url || '';
let API_KEY    = CONFIG.api_key    || '';
const HEADERS  = () => ({'Content-Type':'application/json','x-api-key':API_KEY});

async function api(path, opts={}) {
  const url = SERVER_URL.replace(/\/$/, '') + path;
  const res = await fetch(url, {headers: HEADERS(), ...opts});
  if (!res.ok) {
    const t = await res.text().catch(() => 'Błąd serwera');
    let msg = t;
    try {
      const parsed = JSON.parse(t);
      if (typeof parsed.detail === 'string') msg = parsed.detail;
      else if (Array.isArray(parsed.detail)) msg = parsed.detail.map(e => e.msg || JSON.stringify(e)).join('; ');
      else msg = JSON.stringify(parsed);
    } catch(_) {}
    console.error(`API ERROR ${res.status} ${path}:`, t);
    throw new Error(`[${res.status}] ${msg}`);
  }
  return res.json();
}
const get  = p => api(p);
const post = (p,b) => api(p, {method:'POST', body:JSON.stringify(b)});
const put  = (p,b) => api(p, {method:'PUT', body:JSON.stringify(b)});
const del  = p => api(p, {method:'DELETE'});
const patch= (p,b) => api(p, {method:'PATCH', body:JSON.stringify(b)});

// ══════════════════════════════════════════════════════════════
//  STATE

function setState(p, noRender) {
  state = {...state, ...p};
  if (!noRender) render();
}

// ══════════════════════════════════════════════════════════════
//  TIMERS (multi-sesja)
// ══════════════════════════════════════════════════════════════
function startTimerFor(sesja) {
  if (state.timers[sesja.id]?.interval) clearInterval(state.timers[sesja.id].interval);
  const isPaused = () => {
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
  };
  const update = () => {
    const el = document.getElementById('timer-'+sesja.id);
    if (!el) return;
    const paused = isPaused();
    // calc elapsed minus pauses
    const start = parseServerDT(sesja.start_time);
    let elapsed = Math.floor((Date.now() - start) / 1000);
    const pauzy = JSON.parse(sesja.pauzy || '[]');
    for (const p of pauzy) {
      if (p.koniec) {
        elapsed -= Math.floor((parseServerDT(p.koniec) - parseServerDT(p.start)) / 1000);
      } else {
        elapsed -= Math.floor((Date.now() - parseServerDT(p.start)) / 1000);
      }
    }
    el.textContent = fmtTime(Math.max(0,elapsed));
    el.style.color = paused ? 'var(--orange)' : 'var(--green)';
  };
  update();
  const interval = setInterval(update, 1000);
  state.timers[sesja.id] = {interval, sesja};
}

function stopAllTimers() {
  for (const t of Object.values(state.timers)) {
    if (t.interval) clearInterval(t.interval);
  }
  state.timers = {};
}

function fmtTime(sec) {
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// Serwer zwraca UTC z 'Z'. Dla starszych rekordów bez 'Z' – local time.
function parseServerDT(s) {
  if (!s) return new Date(NaN);
  if (/Z$|[+-]\d{2}:\d{2}$/.test(s)) return new Date(s);
  return new Date(s.replace(' ','T')); // stary rekord – local
}

function isPaused(sesja) {
  const pauzy = JSON.parse(sesja.pauzy || '[]');
  return pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
}

async function loadPracownik() {
  setState({loading:true, error:null});
  try {
    const [ops, sesje] = await Promise.all([
      get('/api/operacje/aktywne'),
      get(`/api/sesje/aktywne/${state.user.id}`),
    ]);
    stopAllTimers();
    for (const s of sesje) startTimerFor(s);
    setState({operacje:ops, aktywnesje:sesje, loading:false});
  } catch(e) {
    setState({loading:false, error:e.message});
  }
}

async function doLogin(username, password) {
  setState({loading:true, error:null});
  try {
    const user = await post('/api/login', {username, password});
    stopWHRefresh();
    // Pobierz uprawnienia użytkownika
    let userTabs = [];
    try {
      const perm = await get('/api/users/' + user.id + '/permissions');
      userTabs = perm.tabs || [];
    } catch(e) { /* brak uprawnień = domyślne */ }
    const tab = defaultTabWithPerms(user.role, userTabs);
    setState({user, screen:'main', loading:false, activeTab:tab, currentUserTabs: userTabs});
    loadTabData(tab);
  } catch(e) {
    setState({loading:false, error:'Nieprawidłowy login lub hasło'});
  }
}

function defaultTab(role) {
  if (role === 'magazynier') return 'magazyn';
  if (role === 'majster')    return 'majster';
  if (role === 'admin')      return 'admin';
  return 'praca';
}

function defaultTabWithPerms(role, allowedTabs) {
  if (!allowedTabs || allowedTabs.length === 0) return defaultTab(role);
  const preferred = defaultTab(role);
  return allowedTabs.includes(preferred) ? preferred : allowedTabs[0];
}

async function startSesja(operacjaId, opcje = {}) {
  // opcje: { rzeczywisteSt: string|null }
  try {
    // Sprawdź czy operacja ma już aktywne sesje
    const aktywne = await get('/api/sesje/aktywne_operacja/' + operacjaId);
    const cudzeSesje = aktywne.filter(s => s.user_id !== state.user.id);
    const mojaSesja  = aktywne.find(s => s.user_id === state.user.id);

    if (mojaSesja) {
      alert('Masz już aktywną sesję tej operacji.');
      return;
    }

    const sesjeOp = aktywne.filter(s => s.typ === 'operacja' || s.typ === 'inne_zlecenie');
    const sesjeZbr = aktywne.filter(s => s.typ === 'zbrojenie');

    // Jeśli trwa zbrojenie na tej operacji przez kogoś innego – blokada równoległa nie ma sensu
    if (sesjeZbr.length > 0 && sesjeOp.length === 0) {
      setState({kontynuacjaModal: {
        operacjaId,
        pracownik: sesjeZbr[0].full_name,
        sesjaGlownaId: null,
        aktywne: sesjeZbr,
        trwaZbrojenie: true
      }});
      return;
    }

    if (sesjeOp.length > 0) {
      // Operacja jest w toku → zapytaj o obróbkę równoległą na dwa stanowiska
      const op = state.qrZleceniePickerModal?.operacje?.find(o => o.id === operacjaId);
      setState({parallelModal: {
        operacjaId,
        stanowisko: op?.stanowisko || '—',
        aktywne: sesjeOp,
        rzeczywisteSt: opcje.rzeczywisteSt || null
      }});
      return;
    }

    // Brak innych sesji – sprawdź czy moje własne równoległe sesje istnieją
    const mojeAktywne = (state.aktywnesje || []).filter(s =>
      s.typ === 'operacja' || s.typ === 'inne_zlecenie'
    );

    if (mojeAktywne.length > 0) {
      // Już mam inne aktywne sesje → pytaj która jest główna
      setState({sesjaGlownaModal: {
        operacjaId,
        aktywne: mojeAktywne,
        nowaJestGlowna: null  // null = jeszcze nie wybrano
      }});
      return;
    }

    // Czysta sytuacja – start normalnej sesji głównej
    await _doStartSesja(operacjaId, 1);
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

async function _doStartSesja(operacjaId, sesjaGlowna, rzeczywisteSt = null) {
  try {
    const body = {
      operacja_id: operacjaId,
      user_id: state.user.id,
      typ: 'operacja',
      sesja_glowna: sesjaGlowna
    };
    if (rzeczywisteSt) body.rzeczywiste_stanowisko = rzeczywisteSt;
    await post('/api/sesje/start', body);
    await loadPracownik();
  } catch(e) {
    if (e.message && e.message.startsWith('GLOWNA_ZAJETA:')) {
      const parts = e.message.split(':');
      const pracownik = parts[1] || '?';
      alert(`Sesja główna tej operacji jest już zajęta przez ${pracownik}. Operacja anulowana.`);
    } else {
      alert('Błąd: ' + e.message);
    }
  }
}

async function kontynuujOperacje(operacjaId, rzeczywisteSt = null) {
  // Pracownik potwierdził kontynuację – startuje jako sesja dodatkowa
  setState({kontynuacjaModal: null});
  const mojeAktywne = (state.aktywnesje || []).filter(s =>
    s.typ === 'operacja' || s.typ === 'inne_zlecenie'
  );
  if (mojeAktywne.length > 0) {
    setState({sesjaGlownaModal: {
      operacjaId,
      aktywne: mojeAktywne,
      nowaJestGlowna: null,
      rzeczywisteSt
    }});
  } else {
    await _doStartSesja(operacjaId, 0, rzeczywisteSt);
  }
}

async function potwierdzWyborGlownej(operacjaId, nowaJestGlowna) {
  const rzeczywisteSt = state.sesjaGlownaModal?.rzeczywisteSt || null;

async function stopSesja(sesjaId, ilosc, uwagi) {
  const sesja = state.stopModal;
  const wasZbrojenie = sesja && sesja.typ === 'zbrojenie';
  const zbrojOpId = sesja && sesja.operacja_id;
  try {
    await post('/api/sesje/stop', {sesja_id:sesjaId, ilosc_sztuk:parseInt(ilosc)||0, uwagi:uwagi||''});
    setState({stopModal:null});
    await loadPracownik();
    // Po zakończeniu zbrojenia: odśwież dane operacji w otwartym QR modal
    if (wasZbrojenie && state.qrZleceniePickerModal) {
      const m = state.qrZleceniePickerModal;
      const zl = m.zlecenie;
      // Pobierz świeżą listę operacji i oznacz zbrojenie jako wykonane
      try {
        const ops = await get(`/api/zlecenia/${zl.id}/operacje`);
        // Uzupełnij zbrojenie_wykonane: jeśli op nie ma aktywnej sesji zbrojenia, a miała czas_zbrojenia_min, uznaj za wykonane
        const updatedOps = ops.map(op => ({
          ...op,
          zbrojenie_wykonane: op.id === zbrojOpId ? true : (op.zbrojenie_wykonane || false),
        }));
        setState({qrZleceniePickerModal: {...m, operacje: updatedOps}});
      } catch(e2) {}
    }
  } catch(e) {
    alert('Błąd: ' + e.message);
  }
}

function stopSesjaModal() {
  const s = state.stopModal;
  if (!s) return;
  const isZbrojenie = s.typ === 'zbrojenie';
  const isNieprod = s.typ === 'nieprodukcyjna';
  const ilosc = (isZbrojenie || isNieprod) ? 0 : (parseInt(document.getElementById('stop-ilosc')?.value)||0);
  const uwagi = document.getElementById('stop-uwagi')?.value || '';
  stopSesja(s.id, ilosc, uwagi);
}

function clearQRHistory() {
  localStorage.removeItem('qr_historia');
  setState({qrLastCodes: []});
}

async function scanQR(kod) {
  if (!kod.trim()) return;
  try {
    const res = await get('/api/scan/' + encodeURIComponent(kod.trim()));
    // dodaj do historii
    const hist = [kod.trim(), ...state.qrLastCodes.filter(c=>c!==kod.trim())].slice(0,10);
    setState({qrLastCodes: hist, qrScanMode:false});
    localStorage.setItem('qr_historia', JSON.stringify(hist));
    showQRResult(res);
  } catch(e) {
    alert('Nie znaleziono kodu QR: ' + kod);
  }
}

function showQRResult(res) {
  if (res.type === 'operacja') {
    const op = res.data;
    setState({qrZleceniePickerModal: {
      zlecenie: {numer: op.zl_numer, nazwa: op.zl_nazwa, id: op.zlecenie_id, ilosc_sztuk: op.ilosc_sztuk},
      operacje: [op],
    }});
  } else if (res.type === 'zlecenie') {
    setState({qrZleceniePickerModal: {zlecenie: res.data, operacje: res.operacje}});
  }
}

function renderQRZleceniePickerModal() {
  const m = state.qrZleceniePickerModal;
  if (!m) return '';
  const z = m.zlecenie;
  const ops = m.operacje || [];
  // Operacje typ='zbrojenie' są obsługiwane jako przycisk przy operacji produkcji
  const dostepne = ops.filter(o =>
    o.status !== 'zakonczone' && o.status !== 'anulowane' && o.typ_operacji !== 'zbrojenie'
  );
  // Zbuduj mapę: dla każdej op produkcji znajdź odpowiadające zbrojenie (po kolejnosc-1 lub stanowisku)
  const zbrojeniaMap = {};
  ops.filter(o => o.typ_operacji === 'zbrojenie').forEach(zbr => {
    // Przypisz do najbliższej kolejnej operacji produkcji
    const nastepna = ops
      .filter(o => o.typ_operacji !== 'zbrojenie' && o.kolejnosc > zbr.kolejnosc)
      .sort((a,b) => a.kolejnosc - b.kolejnosc)[0];
    if (nastepna) {
      if (!zbrojeniaMap[nastepna.id]) zbrojeniaMap[nastepna.id] = [];
      zbrojeniaMap[nastepna.id].push(zbr);
    }
  });
  // Oblicz ile sztuk pozostało do zrobienia
  const iloscTotal = z.ilosc_sztuk || 0;
  const iloscWykonana = ops.reduce((sum, op) => sum + (op.ilosc_wykonana||0), 0);
  const iloscPozostalo = Math.max(0, iloscTotal - (ops.length ? Math.min(...ops.map(op => op.ilosc_wykonana||0)) : 0));

  let html = `
  <div class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="setState({qrZleceniePickerModal:null})">×</button>
      <h3>📋 ${z.numer}</h3>
      <div style="color:var(--dim);font-size:13px;margin-bottom:10px">${z.nazwa}</div>
      ${z.model_3d_url ? `
      <button class="btn btn-blue" style="width:100%;margin-bottom:12px;font-size:14px"
              onclick="openStep3DViewer('${z.model_3d_url.replace(/'/g,"\\'")}')">
        🧊 Podgląd modelu 3D (.STEP)
      </button>` : ''}
      <div style="background:var(--entry);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--dim)">Zlecona ilość:</span>
          <span style="font-weight:700;font-size:16px;color:var(--text)">${iloscTotal} szt.</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--dim)">Do wykonania:</span>
          <span style="font-weight:700;font-size:20px;color:${iloscPozostalo===0?'var(--green)':'var(--accent)'}">${iloscPozostalo} szt.</span>
        </div>
      </div>`;
  if (!dostepne.length) {
    html += `<div class="empty">Brak dostępnych operacji do rozpoczęcia</div>`;
  } else {
    html += `<div style="color:var(--dim);font-size:12px;margin-bottom:10px">Wybierz operację:</div>`;
    dostepne.forEach(op => {
      const opWykonana = op.ilosc_wykonana || 0;
      const opPozostalo = Math.max(0, iloscTotal - opWykonana);
      const opProg = iloscTotal > 0 ? Math.min(100, Math.round(opWykonana / iloscTotal * 100)) : 0;
      const opZbrMin = op.czas_zbrojenia_min || 0;
      // Zbrojenia z nowego systemu (osobne operacje typ='zbrojenie') dla tej operacji produkcji
      const linkedZbrojenia = zbrojeniaMap[op.id] || [];
      // Sesja zbrojenia może być na op.id lub na zbrojeniu linked
      const linkedZbrIds = linkedZbrojenia.map(z => z.id);

      // Stan sesji dla tej operacji
      const sesjaOp = (state.aktywnesje||[]).find(s => s.operacja_id === op.id && s.typ === 'operacja');
      const sesjaZbr = (state.aktywnesje||[]).find(s =>
        (s.operacja_id === op.id || linkedZbrIds.includes(s.operacja_id)) && s.typ === 'zbrojenie'

      const czyOpAktywna = !!sesjaOp;

const FREZARKI = ['frezarka','vmc','mazak','wytaczarka','centrum obróbcze','frezarki'];
const TOKARKI  = ['tokarka','tokarki'];

// Mapa typ_maszyny → kategoria (dla alternatyw w pickOperacjaFromQR)
const TYP_DO_KATEGORII = {
  'frezarka_cnc':    'frezarka',
  'tokarka_cnc':     'tokarka',
  'frezarka_konw':   'frezarka',
  'tokarka_konw':    'tokarka',
  'szlifierka':      'szlifierka',
  'operacja':        'operacja',
};

function _kategoriaMaszyny(stanowisko) {
  // Sprawdź najpierw czy stawka ma przypisany typ_maszyny (nowy system)
  const stawki = state.stawki || [];
  const stawka = stawki.find(s => s.stanowisko === stanowisko);
  if (stawka && stawka.typ_maszyny && TYP_DO_KATEGORII[stawka.typ_maszyny]) {
    return TYP_DO_KATEGORII[stawka.typ_maszyny];
  }
  // Fallback: rozpoznawanie po nazwie (stary system)
  if (!stanowisko) return null;
  const s = stanowisko.toLowerCase();
  if (FREZARKI.some(k => s.includes(k))) return 'frezarka';
  if (TOKARKI.some(k => s.includes(k))) return 'tokarka';
  return null;
}

async function pickOperacjaFromQR(opId) {
  const op = state.qrZleceniePickerModal?.operacje?.find(o => o.id === opId);
  const kat = op ? _kategoriaMaszyny(op.stanowisko) : null;

  if (kat) {
    // Pobierz pełną listę stanowisk o tym samym typ_maszyny
    try {
      const stawki = await get('/api/stawki');
      // Znajdź dokładny typ_maszyny maszyny docelowej
      const stawkaOryginal = stawki.find(s2 => s2.stanowisko === op.stanowisko);
      const typMaszynyOryginal = stawkaOryginal ? stawkaOryginal.typ_maszyny : null;
      let lista;
      if (typMaszynyOryginal) {
        // Filtruj po dokładnym typie maszyny (tak jak zapisano w edycji stawek)
        lista = stawki
          .filter(s2 => s2.typ_maszyny === typMaszynyOryginal && !s2.stanowisko.toLowerCase().includes('zbrojenie'))
          .map(s2 => s2.stanowisko);
      } else {
        // Fallback: filtruj po kategorii nazwy
        lista = stawki
          .filter(s2 => !s2.stanowisko.toLowerCase().includes('zbrojenie') && _kategoriaMaszyny(s2.stanowisko) === kat)
          .map(s2 => s2.stanowisko);
      }
      setState({
        qrZleceniePickerModal: null,
        zmianaMaszynyModal: {
          operacjaId: opId,
          stanowiskoOryginalne: op.stanowisko,
          typMaszyny: typMaszynyOryginal || kat,
          stanowiskoLista: lista
        }
      });
      return;
    } catch(e) { /* fallback do normalnego startu */ }
  }

  setState({qrZleceniePickerModal:null});
  await startSesja(opId);
}

let _savingZlecenie = false;
async function saveZlecenie(data) {
  if (_savingZlecenie) return;
  _savingZlecenie = true;
  try {
    if (data.id) {
      await put(`/api/zlecenia/${data.id}`, data);
      setState({zlecenieModal:null});
      await loadZlecenia();
    } else {
      const result = await post('/api/zlecenia', data);
      const newId = result.id;
      // Skopiuj operacje ze wzorcowego zlecenia
      const ops = state.autofillOperacje || [];
      if (ops.length && state.autofillSourceId && newId) {
        for (const op of ops) {
          try {
            await post('/api/operacje', {
              zlecenie_id: newId,
              nazwa: op.nazwa,
              kolejnosc: op.kolejnosc,
              czas_norma: op.czas_norma,
              stanowisko: op.stanowisko || '',
              opis_czynnosci: op.opis_czynnosci || '',
              czas_zbrojenia_min: op.czas_zbrojenia_min || 0,
            });
          } catch(e2) { console.error('Błąd kopiowania operacji:', e2); }
        }
      }
      // Skopiuj produkty ze wzorcowego zlecenia
      const prods = state.autofillProdukty || [];
      if (prods.length && state.autofillSourceId && newId) {
        for (const p of prods) {
          try {
            await post(`/api/zlecenia/${newId}/produkty`, {
              nazwa: p.nazwa,
              ilosc: p.ilosc,
              cena: p.cena,
            });
          } catch(e2) { console.error('Błąd kopiowania produktu:', e2); }
        }
      }
      // Najpierw odśwież listę zleceń, potem zamknij modal
      await loadZlecenia();
      setState({zlecenieModal:null, autofillSourceId:null, autofillOperacje:[], autofillProdukty:[], autofillStepUrl:null});
    }
  } catch(e) {
    alert('Błąd: ' + e.message);
  } finally {
    _savingZlecenie = false;
  }
}

function generateWorkerLink() {
  if (!SERVER_URL || !API_KEY) { alert('Najpierw skonfiguruj serwer i klucz API'); return; }
  const payload = btoa(JSON.stringify({s: SERVER_URL.replace(/\/$/, ''), k: API_KEY}))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const base = window.location.origin + window.location.pathname;
  const link = base + '#cfg=' + payload;
  const box = document.getElementById('worker-link-box');
  const input = document.getElementById('worker-link-input');
  if (box && input) { input.value = link; box.style.display = 'block'; input.select(); }
}
function copyWorkerLink() {
  const input = document.getElementById('worker-link-input');
  if (!input) return;
  navigator.clipboard.writeText(input.value).then(() => {
    const copied = document.getElementById('worker-link-copied');
    if (copied) { copied.style.display = 'block'; setTimeout(() => { copied.style.display = 'none'; }, 2000); }
  }).catch(() => { input.select(); document.execCommand('copy'); });
}

    </div>

    <button class="btn btn-accent" onclick="saveConfig()">💾 Zapisz i połącz</button>

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if (!url||!key) { alert('Wypełnij oba pola'); return; }
  SERVER_URL=url; API_KEY=key;
  localStorage.setItem('produkcja_config', JSON.stringify({server_url:url, api_key:key}));
  setState({screen:'login'});
}

function renderWarehouseLoginPanel(wi) {
  // Pokazujemy TYLKO zakończone operacje oczekujące na następną (coś do odbioru/przewiezienia)
  const zakonczone = (wi.zakonczone || []).filter(op => {
    const nxt = (wi.next_map || {})[String(op.id)];
    return true; // pokaż wszystkie zakończone – nawet ostatnią (żeby wiedzieć że gotowe)
  });
  const next_map = wi.next_map || {};
  let html = '';

  if (!zakonczone.length) {
    html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;text-align:center">'
          + '<div style="font-size:22px;margin-bottom:6px">✅</div>'
          + '<div style="font-size:13px;color:var(--dim)">Brak zakończonych operacji do odbioru</div>'
          + '</div>';
    return html;
  }

  html += '<div style="background:rgba(39,174,96,.10);border:1px solid var(--green);border-radius:12px;padding:14px 16px;margin-bottom:10px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        + '<span style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px">📦 Do odbioru (' + zakonczone.length + ')</span>'
        + '<span style="font-size:10px;color:var(--dim)">odśwież co 2 min</span>'
        + '</div>';

  zakonczone.forEach((op, i) => {
    const nxt = next_map[String(op.id)];
    const isLast = !nxt;
    html += '<div style="padding:8px 0;' + (i < zakonczone.length-1 ? 'border-bottom:1px solid rgba(39,174,96,.2)' : '') + '">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
          + '<div style="flex:1">'
          + '<div style="font-weight:700;font-size:13px">' + op.kolejnosc + '. ' + op.nazwa + '</div>'
          + '<div style="font-size:12px;color:var(--dim);margin-top:2px">📋 ' + op.zl_numer + ' – ' + op.zl_nazwa + '</div>'
          + '<div style="font-size:12px;color:var(--dim)">🏭 ' + (op.stanowisko||'—') + '</div>'
          + '</div>'
          + '<div style="text-align:right;margin-left:8px;white-space:nowrap">'
          + '<span style="font-size:13px;font-weight:700;color:var(--green)">' + op.ilosc_wykonana + '/' + op.ilosc_sztuk + ' szt.</span>'
          + '</div></div>'
          + '<div style="margin-top:5px;padding:5px 8px;border-radius:6px;font-size:12px;' + (isLast ? 'background:rgba(39,174,96,.15);color:var(--green)' : 'background:rgba(232,160,32,.12);color:var(--accent)') + '">'
          + (isLast
              ? '✅ Gotowe – ostatnia operacja, możliwy odbiór końcowy'
              : '▶ Następna: <b>' + nxt.kolejnosc + '. ' + nxt.nazwa + '</b>' + (nxt.stanowisko ? ' → <b>' + nxt.stanowisko + '</b>' : ''))
          + '</div></div>';
  });

  html += '</div>';
  return html;
}

function renderBottomNav() {
  const role = state.user?.role;
  const customTabs = state.currentUserTabs || [];
  const hasCustom = customTabs.length > 0;

  let tabs = [];
  if (hasCustom) {
    // Użytkownik ma niestandardowe uprawnienia
    ALL_TABS_DEF.forEach(td => {
      if (customTabs.includes(td.id)) tabs.push({id:td.id, icon:td.label.split(' ')[0], label:td.label.split(' ').slice(1).join(' ')});
    });
    // Ustawienia zawsze dostępne
    if (!customTabs.includes('ustawienia')) tabs.push({id:'ustawienia',icon:'🔩',label:'Ustawienia'});
  } else {
    // Domyślne wg roli
    if (role !== 'magazynier') tabs.push({id:'praca',icon:'👷',label:'Praca'});
    if (role === 'magazynier' || role === 'admin') tabs.push({id:'magazyn',icon:'📦',label:'Magazyn'});
    if (role === 'majster' || role === 'admin')    tabs.push({id:'majster',icon:'🔧',label:'Majster'});
    if (role !== 'pracownik' && role !== 'magazynier') tabs.push({id:'zlecenia',icon:'📋',label:'Zlecenia'});
    if (role === 'admin' || role === 'technolog')  tabs.push({id:'admin',icon:'⚙',label:'Admin'});
    tabs.push({id:'ustawienia',icon:'🔩',label:'Ustawienia'});
  }
  return `
  <nav class="bottom-nav">
    ${tabs.map(t => `
      <button class="nav-btn ${state.activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">
        <span class="icon">${t.icon}</span>${t.label}
      </button>`).join('')}
  </nav>`;
}

function renderPraca() {
  if (state.loading) return '<div class="spinner">⏳</div>';

  const subTabs = [{id:'praca',label:'🔧 Praca'},{id:'wydajnosc',label:'📊 Wydajność'}];
  let html = `
  <div class="sub-tabs">
    ${subTabs.map(t => `<button class="sub-tab ${state.pracaSubTab===t.id?'active':''}"
      onclick="switchPracaTab('${t.id}')">${t.label}</button>`).join('')}
  </div>`;

  if (state.pracaSubTab === 'wydajnosc') return html + renderPracaWydajnosc();
  return html + renderPracaGlowna();
}

function switchPracaTab(tab) {
  setState({pracaSubTab: tab}, true);
  if (tab === 'wydajnosc' && !state.pracaWydajnosc) {
    loadPracownikWydajnosc(state.pracaWydOkres);
  }
  render();
}

function renderPracaWydajnosc() {
  const w = state.pracaWydajnosc;
  const okres = state.pracaWydOkres;
  const okresLabels = {dzis:'Dziś', tydzien:'7 dni', miesiac:'30 dni'};

  let html = `
  <div class="chip-row">
    ${Object.entries(okresLabels).map(([k,v]) =>
      `<div class="chip ${okres===k?'active':''}" onclick="loadPracownikWydajnosc('${k}')">${v}</div>`
    ).join('')}
  </div>`;

  if (!w) {
    html += `<div class="empty">⏳ Ładowanie wydajności...</div>`;
    return html;
  }

  const wydPct = (w.norma_wydajnosc_pct !== null && w.norma_wydajnosc_pct !== undefined)
    ? w.norma_wydajnosc_pct
    : (w.normy_total > 0 ? Math.round(w.normy_ok/w.normy_total*100) : null);
  const barColor = wydPct === null ? 'var(--dim)' : wydPct >= 90 ? 'var(--green)' : wydPct >= 70 ? 'var(--orange)' : 'var(--red)';

  html += `
  <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:14px">
    <div class="stat-box"><div class="stat-val">${w.sesji}</div><div class="stat-lbl">Sesji</div></div>
    <div class="stat-box"><div class="stat-val">${w.sztuki}</div><div class="stat-lbl">Sztuk</div></div>
    <div class="stat-box"><div class="stat-val">${w.godz}h</div><div class="stat-lbl">Godz.</div></div>
  </div>`;

  if (wydPct !== null) {
    html += `
    <div class="card" style="margin-bottom:14px;border-color:${barColor}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--dim)">Realizacja norm (${w.normy_ok}/${w.normy_total})</span>
        <span style="font-weight:700;color:${barColor};font-size:18px">${wydPct}%</span>
      </div>
      <div class="wyd-bar-wrap"><div class="wyd-bar" style="width:${wydPct}%;background:${barColor}"></div></div>
    </div>`;
  }

  html += `<div class="section-hdr">Historia sesji (${w.sesje.length})</div>`;
  if (!w.sesje.length) {
    html += `<div class="empty">Brak danych za wybrany okres</div>`;
  } else {
    w.sesje.forEach(s => {
      const wPct = s.wyd_pct;
      const wColor = wPct===null ? 'var(--dim)' : wPct>=90 ? 'var(--green)' : wPct>=70 ? 'var(--orange)' : 'var(--red)';
      const sztuk = s.ilosc_sztuk || 1;
      const avgMin = sztuk > 0 ? (s.czas_min / sztuk).toFixed(1) : s.czas_min;
      html += `
      <div class="card" style="padding:10px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${s.op_nazwa}</div>
            <div style="font-size:11px;color:var(--accent)">📋 ${s.zl_numer}${s.zl_nazwa && s.zl_nazwa!==s.zl_numer ? ' – '+s.zl_nazwa : ''}</div>
            <div style="font-size:11px;color:var(--dim)">🏭 ${s.stanowisko||'—'} | 📅 ${s.data||s.end_time?.substring(0,10)||'—'}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px">
              ⏱ ${avgMin} min/szt.${s.norma_min ? ' | norma: '+s.norma_min+' min' : ''} | 📦 ${sztuk} szt.
            </div>
          </div>
          ${wPct !== null ? `
          <div style="text-align:right;margin-left:8px">
            <div style="font-weight:700;font-size:18px;color:${wColor}">${wPct}%</div>
            <div style="font-size:10px;color:var(--dim)">normy</div>
          </div>` : ''}
        </div>
        ${wPct !== null ? `
        <div class="wyd-bar-wrap" style="margin-top:6px">
          <div class="wyd-bar" style="width:${Math.min(100,wPct)}%;background:${wColor}"></div>
        </div>` : ''}
      </div>`;
    });
  }

  html += `<button class="btn-outline" style="margin-top:8px" onclick="loadPracownikWydajnosc()">🔄 Odśwież</button>`;
  return html;
}

function renderPracaGlowna() {
  let html = '';

  // QR skaner
  if (state.qrScanMode) {
    const hist = JSON.parse(localStorage.getItem('qr_historia')||'[]');
    const hasCameraAPI = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    html += `
    <div class="card" style="border-color:var(--blue)">
      <div class="section-hdr" style="margin-bottom:12px">📷 Skaner QR</div>`;
    if (hasCameraAPI && !state.qrManualMode) {
      html += `
      <video id="qr-video" style="width:100%;border-radius:8px;background:#000;display:block" playsinline autoplay muted></video>
      <canvas id="qr-cam-canvas" style="display:none"></canvas>
      <div id="qr-scan-status" style="text-align:center;color:var(--dim);font-size:13px;padding:6px">Uruchamiam aparat...</div>
      <button class="btn btn-outline" style="margin-top:6px" onclick="setState({qrManualMode:true})">⌨ Wpisz ręcznie</button>`;
    } else {
      html += `
      <div class="field" style="margin-bottom:10px;display:flex;gap:6px">
        <input id="qr-input" type="text" placeholder="Wpisz kod QR i naciśnij Enter" style="flex:1"
               autofocus onkeydown="if(event.key==='Enter')scanQR(this.value)">
        <button class="btn btn-accent" onclick="scanQR(document.getElementById('qr-input').value)">▶</button>
      </div>
      ${hasCameraAPI ? '<button class="btn btn-outline" style="margin-bottom:8px" onclick="setState({qrManualMode:false})">📷 Użyj aparatu</button>' : ''}`;
    }
    html += `
      ${hist.length ? `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <div class="section-hdr" style="margin-bottom:0">Historia QR</div>
        <button class="btn-sm btn-red" onclick="clearQRHistory()" style="font-size:11px">🗑 Wyczyść</button>
      </div>
      <div style="margin-top:8px">
      ${hist.map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <span class="tag">${c}</span>
          <button class="btn-sm btn-blue" onclick="scanQR('${c}')">Użyj</button>
        </div>`).join('')}
      </div>

      <button class="btn btn-outline" style="margin-top:10px"

    </div>`;
  } else {

    <div class="btn-row" style="margin-bottom:12px">

        ? 'background:linear-gradient(135deg,#2e2a1a,#2a2510);border:2px solid var(--orange)'
        : (isNieprod ? '' : '');
      const isGlowna = sesja.sesja_glowna === 1 || sesja.sesja_glowna === undefined;

      const timerColor = isZbrojenie ? 'var(--orange)' : (paused ? 'var(--orange)' : 'var(--green)');
      html += `
      <div class="timer-card ${paused?'paused':''} ${isNieprod?'nieprodukcyjna-card':''}" ${cardStyle?`style="${cardStyle}"`:''}>

        <div class="timer-display" id="timer-${sesja.id}" style="color:${timerColor}">00:00:00</div>

        <div style="color:var(--dim);font-size:12px;margin:4px 0 12px">${sesja.stanowisko||''}</div>

      </div>

  }

    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({kontynuacjaModal:null})">×</button>

        <p style="font-size:14px;margin-bottom:6px">Tę operację wykonuje już:</p>
        <div style="background:var(--entry);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px">
          ${inni}

        <p style="font-size:13px;color:var(--dim);margin-bottom:16px">
          Możesz dołączyć jako sesja dodatkowa. Twoje sztuki będą liczone niezależnie, 
          a koszt zostanie obliczony na podstawie normy czasowej.
        </p>
        <div style="display:flex;gap:8px;flex-direction:column">
          <button class="btn btn-accent" onclick="kontynuujOperacje(${m.operacjaId})">

          </button>
          <button class="btn" onclick="setState({kontynuacjaModal:null})">
            ✖ Anuluj
          </button>
        </div>
      </div>
    </div>`;
  }

  // Modal: wybór sesji głównej przy równoległych
  if (state.sesjaGlownaModal) {
    const m = state.sesjaGlownaModal;
    const aktywneLabels = (m.aktywne || []).map(s =>
      `${s.op_nazwa || s.uwagi || '—'} (${s.zl_numer || 'brak zlecenia'})`
    ).join('<br>');
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({sesjaGlownaModal:null})">×</button>
        <h3>⭐ Wybierz sesję główną</h3>
        <p style="font-size:13px;color:var(--dim);margin-bottom:10px">
          Masz już aktywne sesje produkcyjne:<br>
          <span style="font-size:12px">${aktywneLabels}</span>
        </p>
        <div style="background:var(--entry);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;line-height:1.6">
          <b>Sesja główna</b> – norma i wydajność liczone na podstawie czasu faktycznego<br>
          <b>Sesja dodatkowa</b> – koszt liczony normatywnie (sztuki × czas normy)
        </div>
        <p style="font-size:14px;font-weight:600;margin-bottom:12px">Którą sesją ma być <u>nowa</u> operacja?</p>
        <div style="display:flex;gap:8px;flex-direction:column">
          <button class="btn btn-green" onclick="potwierdzWyborGlownej(${m.operacjaId}, true)">
            ⭐ Nowa jest GŁÓWNA (tamte stają się dodatkowymi)
          </button>
          <button class="btn btn-accent" onclick="potwierdzWyborGlownej(${m.operacjaId}, false)">
            ➕ Nowa jest DODATKOWA (dotychczasowe główne bez zmian)
          </button>
          <button class="btn" onclick="setState({sesjaGlownaModal:null})">
            ✖ Anuluj
          </button>
        </div>
      </div>
    </div>`;
  }

  // ── Modal: obróbka równoległa na dwa stanowiska ──────────────
  if (state.parallelModal) {
    const m = state.parallelModal;
    const inni = (m.aktywne || []).map(s =>
      `<b>${s.full_name}</b> (od ${(s.start_time||'').slice(0,16).replace('T',' ')})`
    ).join('<br>');
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({parallelModal:null})">×</button>
        <h3>🔀 Operacja w toku</h3>
        <div style="background:rgba(232,160,32,0.1);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">
          <div style="font-weight:700;margin-bottom:4px">Stanowisko: ${m.stanowisko}</div>
          <div style="color:var(--dim)">Aktualnie pracuje:<br>${inni}</div>
        </div>
        <p style="font-size:13px;margin-bottom:16px">
          Czy chcesz uruchomić <b>obróbkę równoległą na dwa stanowiska</b>?<br>
          <span style="font-size:12px;color:var(--dim)">Twój czas będzie liczony niezależnie i dołączony do kosztów tego zlecenia.</span>
        </p>
        <div style="display:flex;gap:8px;flex-direction:column">
          <button class="btn btn-green" onclick="potwierdzRownolegle(${m.operacjaId}, ${JSON.stringify(m.rzeczywisteSt)})">
            ✅ Tak – obróbka równoległa
          </button>
          <button class="btn" onclick="setState({parallelModal:null})">
            ✖ Anuluj
          </button>
        </div>
      </div>
    </div>`;
  }

  // ── Modal: zmiana maszyny ──────────────────────────────────────
  if (state.zmianaMaszynyModal) {
    html += renderZmianaMaszynyModal();
  }

  // Modal nieprodukcyjna
  if (state.nieprodukcyjnaModal) {
    const opcje = ['Awaria maszyny','Brak materiału','Szkolenie','Spotkanie','Przerwa obiadowa','Sprzątanie','Inne'];
    html += `
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="setState({nieprodukcyjnaModal:false})">×</button>
        <h3>⏸ Praca nieprodukcyjna</h3>
        <div class="chip-row">
          ${opcje.map(o => `<div class="chip" onclick="document.getElementById('np-opis').value='${o}'">${o}</div>`).join('')}
        </div>
        <div class="field">
          <label>Opis</label>
          <input id="np-opis" type="text" placeholder="Co się dzieje?">
        </div>
        <button class="btn btn-purple" onclick="startNieprodukcyjna(document.getElementById('np-opis').value)">
          ▶ Rozpocznij rejestrację
        </button>
      </div>
    </div>`;
  }

  return html;
}


// ──────────────────────────────────────────────────────────────
//  HELPER: szacowany czas zakończenia zlecenia
// ──────────────────────────────────────────────────────────────
function szacowanyKoniec(z, ops) {
  // ops = lista operacji z cache (lub null)
  // z = zlecenie z polami: ilosc_sztuk, op_done, op_total
  if (!z) return null;
  const ilosc = z.ilosc_sztuk || 1;

  // Oblicz pozostały czas na bazie operacji z cache
  if (ops && ops.length > 0) {
    let pozostaleMin = 0;
    ops.forEach(op => {
      if (op.status === 'zakonczona') return;
      const norma = op.czas_norma || 0;
      const wykonano = op.ilosc_wykonana || 0;
      const pozostaloSztuk = Math.max(0, ilosc - wykonano);
      if (norma) pozostaleMin += norma * pozostaloSztuk;
      // zbrojenie: dolicz tylko jeśli nie ma aktywnej/zakończonej sesji zbrojenia dla tej op
      const zbrMin = op.czas_zbrojenia_min || 0;
      if (zbrMin) {
        // Sprawdź czy zbrojenie jest już aktywne lub wykonane (przez aktywne sesje)
        const zbrJuzAkt = (state.aktywnesje||[]).some(s => s.operacja_id === op.id && s.typ === 'zbrojenie');
        // Jeśli nie aktywne, zakładamy że zbrojenie jest do zrobienia (serwer weryfikuje czy zakończone)
        if (!zbrJuzAkt) pozostaleMin += zbrMin;
      }
    });
    if (pozostaleMin <= 0) return null;
    const koniec = new Date(Date.now() + pozostaleMin * 60 * 1000);
    return koniec;
  }

  // Fallback: brak szczegółów ops – nie szacuj
  return null;
}

function fmtEstimatedKoniec(dt) {
  if (!dt) return null;
  const today = new Date();
  const isToday = dt.toDateString() === today.toDateString();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const isTomorrow = dt.toDateString() === tomorrow.toDateString();
  const hm = dt.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
  if (isToday) return `dziś ~${hm}`;
  if (isTomorrow) return `jutro ~${hm}`;
  return dt.toLocaleDateString('pl-PL', {day:'2-digit',month:'2-digit'}) + ` ~${hm}`;
}

// ══════════════════════════════════════════════════════════════
//  TAB: MAJSTER
// ══════════════════════════════════════════════════════════════
function renderMajster() {
  if (state.loading) return '<div class="spinner">⏳</div>';
  const stats = state.majsterStats;
  if (!stats) return '<div class="empty">Ładowanie...</div>';

  const subTabs = [{id:'live',label:'📡 Live'},{id:'zlecenia',label:'📋 Zlecenia'},{id:'oblozenie',label:'🏭 Obłożenie'},{id:'podsumowanie',label:'📊 Podsumowanie'},{id:'wydajnosc',label:'🏆 Wydajność'},{id:'koszty',label:'💰 Koszty'},{id:'alerty',label:'⚠ Alerty'}];
  let html = `
  <div class="tabs" style="flex-wrap:wrap;gap:2px">
    ${subTabs.map(t => `<button class="tab ${state.majsterSubTab===t.id?'active':''}"
      onclick="switchMajsterTab('${t.id}')">${t.label}</button>`).join('')}
  </div>`;

  if (state.majsterSubTab === 'live') {
    html += `
    <div class="stats-grid-3">
      <div class="stat-box"><div class="stat-val">${stats.aktywne_sesje.length}</div><div class="stat-lbl">online</div></div>
      <div class="stat-box"><div class="stat-val">${stats.dzis_sztuk}</div><div class="stat-lbl">sztuk dziś</div></div>
      <div class="stat-box"><div class="stat-val">${(stats.dzis_godz||0).toFixed(1)}</div><div class="stat-lbl">godz. dziś</div></div>
    </div>
    <div class="section-hdr">🟢 Pracownicy aktywni</div>`;
    if (!stats.aktywne_sesje.length) {
      html += `<div class="empty" style="padding:20px">Brak aktywnych sesji</div>`;
    } else {
      stats.aktywne_sesje.forEach(s => {
        const pauzList = JSON.parse(s.pauzy||'[]');
        const hasPauza = pauzList.length > 0 && !pauzList[pauzList.length-1].koniec;
        let elapsed = Math.floor((Date.now() - parseServerDT(s.start_time))/1000);
        for (const p of pauzList) {
          if (p.koniec) {
            elapsed -= Math.floor((parseServerDT(p.koniec) - parseServerDT(p.start))/1000);
          } else {
            elapsed -= Math.floor((Date.now() - parseServerDT(p.start))/1000);
          }
        }
        elapsed = Math.max(0, elapsed);
        html += `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">👤 ${s.full_name} ${hasPauza?'<span class="badge badge-orange">PAUZA</span>':''}</div>
              <div class="card-sub">${s.typ==='nieprodukcyjna'?'⏸ Nieprodukcyjna':s.typ==='zbrojenie'?'⚙ Zbrojenie: '+(s.op_nazwa||'—'):s.typ==='inne_zlecenie'?'🔧 Inne: '+(s.uwagi||s.op_nazwa||'—'):'🔧 '+s.op_nazwa}</div>
              ${s.zl_numer?`<div class="card-sub">📋 ${s.zl_numer} – ${s.zl_nazwa}</div>`:''}
            </div>
            <div style="text-align:right">
              <div style="font-family:Consolas;color:var(--green);font-size:16px">${fmtTime(elapsed)}</div>
              ${s.czas_norma?`<div style="font-size:11px;color:var(--dim)">norma: ${s.czas_norma}min</div>`:''}
              <button class="btn-sm" style="margin-top:4px;font-size:11px" onclick="openEditSesjaModal(${s.sesja_id},'${s.start_time}','${s.end_time||''}')">✏ Koryguj czas</button>
              <button class="btn-sm" style="margin-top:2px;font-size:11px;background:rgba(231,76,60,0.15);color:var(--red);border-color:var(--red)" onclick="deleteSesjaConfirm(${s.sesja_id})">🗑 Usuń</button>
            </div>
          </div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'zlecenia') {
    html += `<div class="section-hdr">📋 Zlecenia w toku</div>`;
    // Show all started operations (even multiple from same zlecenie)
    const wTokuOps = (stats.aktywne_sesje || []).filter(s => s.op_nazwa);
    if (wTokuOps.length) {
      html += `<div class="section-hdr" style="margin-top:8px;color:var(--green)">▶ Aktywne operacje (${wTokuOps.length})</div>`;
      wTokuOps.forEach(s => {
        const pauzy = JSON.parse(s.pauzy||'[]');
        const hasPauza = pauzy.length > 0 && !pauzy[pauzy.length-1].koniec;
        html += `<div class="card" style="border-color:var(--green);margin-bottom:6px">
          <div class="card-header">
            <div style="flex:1;min-width:0">
              <div class="card-title" style="font-size:13px">${s.op_nazwa||'—'} ${hasPauza?'<span class="badge badge-orange">PAUZA</span>':''}</div>
              <div class="card-sub">📋 ${s.zl_numer||'—'} – ${s.zl_nazwa||''}</div>
              <div class="card-sub">👤 ${s.full_name||'—'}</div>
            </div>
            ${s.czas_norma?`<div style="font-size:11px;color:var(--dim);text-align:right">norma: ${s.czas_norma}min</div>`:''}
          </div>
        </div>`;
      });
      html += `<div class="section-hdr" style="margin-top:10px">📋 Postęp zleceń</div>`;
    }
    if (!stats.zlecenia.length) {
      html += `<div class="empty">Brak aktywnych zleceń</div>`;
    } else {
      stats.zlecenia.forEach(z => {
        const prog = z.op_total > 0 ? Math.round((z.op_done/z.op_total)*100) : 0;
        const sztProg = z.ilosc_sztuk > 0 ? Math.round(((z.sztuki_wykonane||0)/z.ilosc_sztuk)*100) : 0;
        const przeterminowane = z.termin && new Date(z.termin) < new Date();
        const expanded = state.majsterExpandedZlecenie === z.id;
        // Pobierz operacje z cache
        const ops = (state.majsterOpsCache && state.majsterOpsCache[z.id] !== undefined)
          ? state.majsterOpsCache[z.id] : null;
        html += `
        <div class="card" style="${przeterminowane?'border-color:var(--red)':''}">
          <div class="card-header" style="cursor:pointer" onclick="toggleMajsterZlecenie(${z.id})">
            <div style="flex:1">
              <div class="card-title">${z.numer} ${przeterminowane?'<span class="badge badge-red">TERMIN!</span>':''}</div>
              <div class="card-sub">${z.nazwa}</div>
              ${z.termin?`<div class="card-sub">📅 Termin: ${fmtDate(z.termin)}</div>`:''}
              ${(() => { const estOps = (state.majsterOpsCache&&state.majsterOpsCache[z.id])||null; const est=szacowanyKoniec(z,estOps); return est?`<div class="card-sub" style="color:var(--blue)">🕐 Szac. koniec: ${fmtEstimatedKoniec(est)}</div>`:''; })()}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${statusBadge(z.status)}
              <span style="color:var(--dim);font-size:16px">${expanded?'▲':'▼'}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px">
            <span>Operacje: ${z.op_done}/${z.op_total}</span><span>${prog}%</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${prog}%;background:${prog>=100?'var(--green)':'var(--accent)'}"></div>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">
            📦 Sztuki: <b style="color:${sztProg>=100?'var(--green)':'var(--text)'}">${z.sztuki_wykonane||0}/${z.ilosc_sztuk}</b> (${sztProg}%)
          </div>
          ${expanded ? `
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
            ${ops === null ? '<div style="font-size:12px;color:var(--dim);text-align:center;padding:8px">⏳ Ładowanie operacji...</div>' :
              ops.length === 0 ? '<div style="font-size:12px;color:var(--dim)">Brak operacji</div>' :
              ops.map(op => {
                const opProg = z.ilosc_sztuk > 0 ? Math.round((op.ilosc_wykonana||0)/z.ilosc_sztuk*100) : 0;
                const stColor = op.status==='zakonczona'?'var(--green)':op.status==='w_toku'?'var(--accent)':'var(--dim)';
                const stIcon = op.status==='zakonczona'?'✅':op.status==='w_toku'?'▶':'⏳';
                return `<div style="padding:6px 0;border-bottom:1px solid rgba(46,53,72,.3)">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <div style="flex:1">
                      <div style="font-size:12px;font-weight:600">${stIcon} ${op.kolejnosc}. ${op.nazwa}</div>
                      <div style="font-size:11px;color:var(--dim)">${op.stanowisko||'—'}${op.czas_norma?' | norma: '+op.czas_norma+' min':''}</div>
                    </div>
                    <div style="text-align:right;margin-left:8px">
                      <div style="font-size:12px;font-weight:700;color:${stColor}">${op.ilosc_wykonana||0}/${z.ilosc_sztuk} szt.</div>
                      <div style="font-size:10px;color:var(--dim)">${opProg}%</div>
                    </div>
                  </div>
                  <div class="progress-wrap" style="height:4px;margin:4px 0 0">
                    <div class="progress-bar" style="width:${Math.min(100,opProg)}%;background:${stColor}"></div>
                  </div>
                </div>`;
              }).join('')
            }
          </div>` : ''}
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'koszty') {
    html += `<div class="section-hdr">💰 Koszty pracowników dziś</div>`;
    const koszty = stats.koszty_dzis || [];
    if (!koszty.length) {
      html += `<div class="empty">Brak danych</div>`;
    } else {
      let total = 0;
      html += `<table class="data-table"><thead><tr><th>Pracownik</th><th>Stanowisko</th><th>Min.</th><th>Koszt</th></tr></thead><tbody>`;
      koszty.forEach(k => {
        const koszt = k.koszt || 0;
        total += koszt;
        const min = Math.round((k.godz||0) * 60);
        html += `<tr>
          <td>${k.full_name}</td>
          <td style="font-size:11px">${k.stanowisko||'—'}</td>
          <td>${min}</td>
          <td style="color:var(--accent)">${fmtPLN(koszt)}</td>
        </tr>`;
      });
      html += `</tbody></table>
      <div class="card" style="margin-top:10px;text-align:center">
        <div style="font-size:12px;color:var(--dim)">ŁĄCZNIE DZIŚ</div>
        <div style="font-size:28px;font-weight:700;color:var(--accent)">${fmtPLN(total)}</div>
      </div>`;
    }
  }

  if (state.majsterSubTab === 'alerty') {
    const alerty = stats.alerty_norm || [];
    html += `<div class="section-hdr">⚠ Alerty norm (${alerty.length})</div>`;
    if (!alerty.length) {
      html += `<div class="card" style="text-align:center;padding:20px;border-color:var(--green)">
        <div style="font-size:32px">✅</div>
        <div style="color:var(--green);margin-top:8px">Wszystkie operacje w normie</div>
      </div>`;
    } else {
      alerty.forEach(a => {
        html += `
        <div class="alert-banner">
          <div style="font-weight:700">⚠ Przekroczono normę – ${a.zlecenie}, operacja: ${a.operacja}</div>
          <div style="font-size:12px;margin-top:2px">👤 ${a.pracownik}</div>
          <div>Norma: ${a.norma_min} min/szt. × ${a.ilosc_sztuk} szt. = ${a.norma_calkowita_min} min | Czas: ${a.elapsed_min} min | <strong style="font-size:15px">+${a.przekroczenie_pct}%</strong></div>
        </div>`;
      });
    }
  }

  if (state.majsterSubTab === 'oblozenie') {
    html += renderOblozenie();
  }

  if (state.majsterSubTab === 'wydajnosc') {
    html += renderMajsterWydajnosc();
  }

  if (state.majsterSubTab === 'podsumowanie') {
    html += renderMajsterPodsumowanie(stats);
  }

  html += `<button class="btn-outline no-print" style="margin-top:8px" onclick="loadMajster()">🔄 Odśwież</button>`;
  return html;
}

function switchMajsterTab(tab) {
  setState({majsterSubTab: tab}, true);
  if (tab === 'wydajnosc' && !state.wydajnoscMajster) {
    loadWydajnoscMajster(state.wydajnoscOkres);
  }
  if (tab === 'oblozenie') {
    loadOblozenie();
  }
  render();
}

// ─── Obłożenie stanowisk ───────────────────────────────────────────────────────
async function loadOblozenie() {
  setState({oblozenieLading: true, oblozenie: null});
  render();
  try {
    const data = await get('/api/oblozenie');
    setState({oblozenie: data, oblozenieLading: false});
  } catch(e) {
    setState({oblozenie: {error: e.message}, oblozenieLading: false});
  }
  render();
}

function renderOblozenie() {
  if (state.oblozenieLading) return '<div class="spinner">⏳</div>';
  const ob = state.oblozenie;
  if (!ob) return '<div style="text-align:center;padding:30px;color:var(--dim)">Kliknij zakładkę aby załadować dane.</div>';
  if (ob.error) return `<div class="error-banner">⚠ ${ob.error}</div><button class="btn-outline" onclick="loadOblozenie()">🔄 Spróbuj ponownie</button>`;
  if (!ob.length) return '<div class="empty">Brak stanowisk – dodaj stanowiska w ustawieniach Stawki lub przypisz stanowisko do operacji.</div>';

  const selected = state.oblozenieSelected;
  let html = '';

  // Lista stanowisk jako karty/przyciski
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
  ob.forEach(st => {
    const opCount = st.operacje.length;
    const isActive = selected === st.stanowisko;
    const urgentCount = st.operacje.filter(o => {
      if (!o.termin) return false;
      const days = Math.ceil((new Date(o.termin) - new Date()) / 86400000);
      return days <= 3;
    }).length;
    const dotColor = urgentCount > 0 ? 'var(--red)' : opCount > 0 ? 'var(--green)' : 'var(--border)';
    html += `<button onclick="setState({oblozenieSelected:'${st.stanowisko.replace(/'/g,"\'")}'}); render();"
      style="display:flex;flex-direction:column;align-items:flex-start;padding:10px 14px;border:2px solid ${isActive ? 'var(--accent)' : 'var(--border)'};
             border-radius:10px;background:${isActive ? 'rgba(232,160,32,.1)' : 'var(--panel)'};cursor:pointer;text-align:left;min-width:130px;">
      <span style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;color:${isActive ? 'var(--accent)' : 'var(--text)'}">
        <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block"></span>
        ${st.stanowisko}
      </span>
      <span style="font-size:10px;color:var(--dim);margin-top:3px">${opCount} operacji${urgentCount > 0 ? ` · <span style="color:var(--red)">${urgentCount} pilnych</span>` : ''}</span>
    </button>`;
  });
  html += '</div>';

  // Szczegóły wybranego stanowiska
  if (!selected) {
    html += '<div class="empty" style="padding:20px">👆 Wybierz stanowisko aby zobaczyć operacje</div>';
    return html;
  }

  const stData = ob.find(s => s.stanowisko === selected);
  if (!stData) return html;

  html += `<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
    🏭 ${stData.stanowisko}${stData.stawka_godz ? ' · ' + stData.stawka_godz.toFixed(2) + ' zł/h' : ''}
    ${stData.opis ? '<span style="font-weight:400;text-transform:none;margin-left:6px">'+stData.opis+'</span>' : ''}
  </div>`;

  if (!stData.operacje.length) {
    html += '<div class="empty" style="padding:20px">Brak aktywnych operacji na tym stanowisku.</div>';
    return html;
  }

  // Grupuj po zleceniu (może być wiele operacji z jednego zlecenia)
  const byZlecenie = {};
  stData.operacje.forEach(o => {
    const key = o.zlecenie_id;
    if (!byZlecenie[key]) byZlecenie[key] = {zlecenie_numer: o.zlecenie_numer, zlecenie_nazwa: o.zlecenie_nazwa, termin: o.termin, ilosc_sztuk: o.ilosc_sztuk, zlecenie_status: o.zlecenie_status, ops: []};
    byZlecenie[key].ops.push(o);
  });

  // Sortuj grupy wg terminu
  const groups = Object.values(byZlecenie).sort((a,b) => {
    if (!a.termin && !b.termin) return 0;
    if (!a.termin) return 1;
    if (!b.termin) return -1;
    return new Date(a.termin) - new Date(b.termin);
  });

  groups.forEach(g => {
    const today = new Date(); today.setHours(0,0,0,0);
    const termin = g.termin ? new Date(g.termin) : null;
    const daysLeft = termin ? Math.ceil((termin - today) / 86400000) : null;
    let terminColor = 'var(--dim)';
    let terminLabel = g.termin ? g.termin.slice(0,10) : '—';
    if (daysLeft !== null) {
      if (daysLeft < 0) { terminColor = 'var(--red)'; terminLabel += ' ⚠ PRZEKROCZONY'; }
      else if (daysLeft === 0) { terminColor = 'var(--red)'; terminLabel += ' (dziś)'; }
      else if (daysLeft <= 3) { terminColor = 'var(--orange)'; terminLabel += ` (${daysLeft}d)`; }
      else { terminColor = 'var(--green)'; terminLabel += ` (${daysLeft}d)`; }
    }

    const statusColors = {nowe:'var(--blue)',w_realizacji:'var(--green)',zakonczone:'var(--dim)',anulowane:'var(--red)'};
    const zStatusColor = statusColors[g.zlecenie_status] || 'var(--dim)';

    html += `<div style="background:var(--entry);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid ${terminColor}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-weight:700;font-size:14px">${g.zlecenie_numer}</div>
          <div style="color:var(--dim);font-size:12px;margin-top:1px">${g.zlecenie_nazwa}</div>
        </div>
        <div style="text-align:right;font-size:11px">
          <div style="color:${terminColor};font-weight:700">📅 ${terminLabel}</div>
          <div style="color:var(--dim);margin-top:2px">Ilość: <b style="color:var(--text)">${g.ilosc_sztuk} szt.</b></div>
        </div>
      </div>`;

    // Oblicz harmonogram: operacje oczekujące ustawiamy sekwencyjnie od teraz (godz. 6-22)
    const WORK_START = 6, WORK_END = 22, WORK_MINS = (WORK_END - WORK_START) * 60;
    function addWorkMinutes(fromDate, minutes) {
      let d = new Date(fromDate);
      let rem = minutes;
      while (rem > 0) {
        const h = d.getHours(), m = d.getMinutes();
        const minsToDayEnd = Math.max(0, (WORK_END - h) * 60 - m);
        if (h < WORK_START) { d.setHours(WORK_START, 0, 0, 0); continue; }
        if (h >= WORK_END)  { d.setDate(d.getDate()+1); d.setHours(WORK_START,0,0,0); continue; }
        if (rem <= minsToDayEnd) { d = new Date(d.getTime() + rem*60000); rem = 0; }
        else { rem -= minsToDayEnd; d.setDate(d.getDate()+1); d.setHours(WORK_START,0,0,0); }
      }
      return d;
    }
    function fmtHHMM(date) {
      const h = ('0'+date.getHours()).slice(-2), m = ('0'+date.getMinutes()).slice(-2);
      const day = date.toLocaleDateString('pl-PL',{weekday:'short',day:'numeric',month:'numeric'});
      return `${day} ${h}:${m}`;
    }
    let schedulePtr = new Date();
    // Ustaw schedulePtr na aktualny czas roboczy
    if (schedulePtr.getHours() < WORK_START) schedulePtr.setHours(WORK_START,0,0,0);
    if (schedulePtr.getHours() >= WORK_END)  { schedulePtr.setDate(schedulePtr.getDate()+1); schedulePtr.setHours(WORK_START,0,0,0); }

    g.ops.forEach(o => {
      const prog = g.ilosc_sztuk > 0 ? Math.min(100, Math.round((o.ilosc_wykonana / g.ilosc_sztuk) * 100)) : 0;
      const opStatusColors = {oczekuje:'var(--dim)',w_toku:'var(--blue)',zakonczona:'var(--green)'};
      const opStatusLabels = {oczekuje:'⏳ oczekuje',w_toku:'▶ w toku',zakonczona:'✅ zakończona'};
      const opColor = opStatusColors[o.op_status] || 'var(--dim)';

      // Czas trwania operacji
      const ilosc = Math.max(1, g.ilosc_sztuk - (o.ilosc_wykonana||0));
      const czNorma = o.czas_norma || 0;
      const czZbr = o.czas_zbrojenia_min || 0;
      const totalMin = czNorma * ilosc + czZbr;
      const czLabel = totalMin > 0
        ? (czNorma > 0 ? `${czNorma} min/szt` : '') + (czZbr > 0 ? (czNorma>0?' + ':'')+`zbr ${czZbr} min` : '')
        : '';

      // Harmonogram dla operacji oczekujących
      let scheduleHtml = '';
      if (o.op_status === 'oczekuje' && totalMin > 0) {
        const start = new Date(schedulePtr);
        const end = addWorkMinutes(start, totalMin);
        scheduleHtml = `<div style="font-size:10px;color:var(--blue);margin-top:3px">
          🕐 <b>${fmtHHMM(start)}</b> → <b>${fmtHHMM(end)}</b>
          ${totalMin >= 60 ? `<span style="color:var(--dim)">(${(totalMin/60).toFixed(1)}h)</span>` : `<span style="color:var(--dim)">(${totalMin} min)</span>`}
        </div>`;
        schedulePtr = addWorkMinutes(end, 0); // następna operacja po tej
      } else if (o.op_status === 'w_toku') {
        scheduleHtml = `<div style="font-size:10px;color:var(--green);margin-top:3px">▶ W toku</div>`;
      }

      html += `<div style="padding:8px 10px;background:var(--panel);border-radius:7px;margin-top:6px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${g.ilosc_sztuk > 1 ? 5 : 2}px">
          <div style="flex:1">
            <span style="font-size:12px;font-weight:600">#${o.op_kolejnosc} ${o.op_nazwa}</span>
            ${czLabel ? `<span style="font-size:10px;color:var(--dim);margin-left:6px">(${czLabel})</span>` : ''}
            ${o.opis_czynnosci ? `<div style="font-size:10px;color:var(--dim);margin-top:2px;line-height:1.4">${o.opis_czynnosci.slice(0,120)}${o.opis_czynnosci.length>120?'…':''}</div>` : ''}
            ${scheduleHtml}
          </div>
          <span style="font-size:10px;color:${opColor};font-weight:700;margin-left:8px;white-space:nowrap">${opStatusLabels[o.op_status]||o.op_status}</span>
        </div>`;

      if (g.ilosc_sztuk > 1 || o.ilosc_wykonana > 0) {
        html += `<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <div style="flex:1;background:var(--border);border-radius:4px;height:5px;overflow:hidden">
            <div style="width:${prog}%;height:100%;border-radius:4px;background:${prog>=100?'var(--green)':prog>0?'var(--blue)':'var(--border)'}"></div>
          </div>
          <span style="font-size:10px;color:var(--dim);white-space:nowrap">${o.ilosc_wykonana}/${g.ilosc_sztuk} szt.</span>
        </div>`;
      }
      html += '</div>';
    });

    html += '</div>';
  });

  html += `<button class="btn-outline" style="margin-top:4px" onclick="loadOblozenie()">🔄 Odśwież</button>`;
  return html;
}

async function toggleMajsterZlecenie(zid) {
  if (state.majsterExpandedZlecenie === zid) {
    setState({majsterExpandedZlecenie: null});
    return;
  }
  setState({majsterExpandedZlecenie: zid});
  // Jeśli brak w cache – załaduj (zawsze przeładuj przy rozwijaniu dla aktualnych danych)
  const cache = state.majsterOpsCache || {};
  if (cache[zid] === undefined) {
    try {
      const ops = await get('/api/zlecenia/' + zid + '/operacje');
      const newCache = {...(state.majsterOpsCache || {}), [zid]: ops};
      setState({majsterOpsCache: newCache});
    } catch(e) {
      const newCache = {...(state.majsterOpsCache || {}), [zid]: []};
      setState({majsterOpsCache: newCache});
    }
  }
}

}

// ─── Formatowanie czasu hh:mm:ss / mm:ss ──────────────────────────────────────
function fmtHMS(totalMin) {
  // Przyjmuje minuty (może być ułamkowe), zwraca mm:ss lub hh:mm:ss
  const totalSec = Math.round((totalMin || 0) * 60);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const mm = ('0'+m).slice(-2);
  const ss = ('0'+s).slice(-2);
  if (h > 0) return ('0'+h).slice(-2) + ':' + mm + ':' + ss;
  return mm + ':' + ss;
}

    }

// ─── Raport PDF – Wydajność pracowników ──────────────────────────────────────
async function generateRaportWydajnoscPDF() {
  const od = document.getElementById('rwd-od')?.value || getTodayMinus(7);
  const do_ = document.getElementById('rwd-do')?.value || getToday();
  const typ = document.getElementById('rwd-typ')?.value || 'skrocony';
  setState({raportWydOkres:{od,do:do_}, raportWydTyp:typ});
  try {
    const data = await get('/api/stats/wydajnosc_raport?data_od=' + od + '&data_do=' + do_);
    printRaportWydajnosc(data, od, do_, typ);
  } catch(e) {
    alert('Błąd generowania raportu: ' + e.message);
